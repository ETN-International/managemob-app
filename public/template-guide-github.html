<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guida Template GitHub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
:root{
  --bg:#f7f5f0;--white:#fff;--ink:#1a1814;--ink2:#3a3730;--muted:#888075;--border:#e2ddd6;
  --gh:#1a1a2e;--gh-lt:#f0f0ff;--gh-bd:#c8c8e8;
  --vc:#0066b8;--vc-lt:#e8f4ff;--vc-bd:#b8d8f8;
  --ai:#7c3aed;--ai-lt:#f5f0ff;--ai-bd:#ddd0f8;
  --nl:#00ad9f;--nl-lt:#e8fffe;--nl-bd:#a0ece8;
  --green:#16a34a;--green-lt:#f0fdf4;--green-bd:#bbf7d0;
  --serif:'Lora',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;}

/* lang bar */
.lang-bar{position:sticky;top:0;z-index:200;background:var(--ink);padding:0 40px;display:flex;align-items:center;gap:10px;height:44px;}
.lang-bar-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.32);font-weight:600;margin-right:4px;white-space:nowrap;}
.lang-btn{padding:4px 11px;border-radius:6px;border:1.5px solid rgba(255,255,255,.18);background:transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:all .18s;font-family:var(--sans);}
.lang-btn:hover{border-color:rgba(255,255,255,.5);color:rgba(255,255,255,.85);}
.lang-btn.active{background:white;color:var(--ink);border-color:white;}

/* topnav */
.topnav{position:sticky;top:44px;z-index:100;background:rgba(247,245,240,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;gap:0;height:52px;overflow-x:auto;}
.topnav-logo{font-family:var(--serif);font-size:13px;font-weight:600;color:var(--ink);margin-right:24px;white-space:nowrap;flex-shrink:0;}
.nav-step{display:flex;align-items:center;gap:7px;padding:0 13px;height:100%;font-size:11px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:color .2s,border-color .2s;text-decoration:none;}
.nav-step.gh:hover,.nav-step.gh.active{color:var(--gh);border-color:var(--gh);}
.nav-step.vc:hover,.nav-step.vc.active{color:var(--vc);border-color:var(--vc);}
.nav-step.ai:hover,.nav-step.ai.active{color:var(--ai);border-color:var(--ai);}
.nav-step.nl:hover,.nav-step.nl.active{color:var(--nl);border-color:var(--nl);}
.nav-step-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;flex-shrink:0;}

/* layout */
.page{max-width:860px;margin:0 auto;padding:0 32px 120px;}

/* hero */
.hero{padding:60px 0 48px;border-bottom:1px solid var(--border);margin-bottom:52px;}
.hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.hero-title{font-family:var(--serif);font-size:clamp(32px,4.8vw,50px);line-height:1.1;font-weight:700;margin-bottom:16px;}
.hero-title em{font-style:italic;color:var(--vc);}
.hero-lead{font-size:16px;line-height:1.7;color:var(--ink2);max-width:600px;margin-bottom:26px;}
.hero-tools{display:flex;gap:8px;flex-wrap:wrap;}
.tool-pill{display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:100px;font-size:12px;font-weight:600;border:1.5px solid;}

/* progress */
.progress-bar{display:flex;align-items:stretch;background:white;border:1.5px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:52px;}
.pb-step{flex:1;padding:14px 10px;text-align:center;border-right:1.5px solid var(--border);}
.pb-step:last-child{border-right:none;}
.pb-num{font-family:var(--serif);font-size:24px;font-weight:700;line-height:1;margin-bottom:4px;}
.pb-label{font-size:11px;font-weight:600;line-height:1.3;}
.pb-tool{font-size:9px;color:var(--muted);margin-top:2px;}

/* section */
.section{margin-bottom:64px;scroll-margin-top:100px;}
.section-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:26px;padding-bottom:20px;border-bottom:1.5px solid var(--border);}
.section-badge{width:46px;height:46px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;}
.section-meta{flex:1;}
.section-phase{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px;}
.section-title{font-family:var(--serif);font-size:clamp(19px,2.6vw,28px);font-weight:700;line-height:1.2;margin-bottom:6px;}
.section-lead{font-size:13.5px;line-height:1.65;color:var(--ink2);}

/* divider */
.phase-divider{display:flex;align-items:center;gap:12px;margin:48px 0 32px;}
.phase-divider-line{flex:1;height:1px;background:var(--border);}
.phase-divider-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:5px 12px;border-radius:100px;border:1.5px solid;white-space:nowrap;}

/* steps */
.steps{display:flex;flex-direction:column;gap:9px;}
.step{display:flex;gap:13px;align-items:flex-start;background:white;border:1.5px solid var(--border);border-radius:11px;padding:15px 17px;transition:box-shadow .2s;}
.step:hover{box-shadow:0 4px 16px rgba(0,0,0,.06);}
.step-num{width:27px;height:27px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;}
.step-body{flex:1;}
.step-title{font-size:14px;font-weight:700;margin-bottom:5px;line-height:1.3;}
.step-desc{font-size:13px;line-height:1.65;color:var(--ink2);}
.step-desc strong{color:var(--ink);font-weight:600;}
.step-desc code{font-family:'Courier New',monospace;font-size:11px;background:var(--bg);padding:2px 5px;border-radius:4px;border:1px solid var(--border);}
.step-note{margin-top:8px;padding:8px 12px;border-radius:7px;font-size:12.5px;line-height:1.55;display:flex;gap:7px;align-items:flex-start;}
.step-note strong{font-weight:600;}
.tip{background:var(--green-lt);border:1.5px solid var(--green-bd);}
.warn{background:#fffbeb;border:1.5px solid #fde68a;}
.info{background:#eff6ff;border:1.5px solid #bfdbfe;}

/* terminal */
.terminal{background:#12101c;border-radius:10px;overflow:hidden;margin-top:12px;}
.term-bar{display:flex;align-items:center;gap:5px;padding:8px 14px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);}
.term-dot{width:10px;height:10px;border-radius:50%;}
.term-name{font-size:10px;color:rgba(255,255,255,.27);margin-left:5px;font-family:monospace;}
.term-body{padding:13px 17px;font-family:'Courier New',monospace;font-size:12px;line-height:1.9;color:#c8c6d4;}
.td{color:#3e3a58;}.tg{color:#4ade80;}.tb{color:#60a5fa;}.ta{color:#fbbf24;}.tp{color:#f472b6;}.tw{color:#f0eeff;}.tt{color:#2dd4bf;}

/* two col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px;}
@media(max-width:580px){.two-col{grid-template-columns:1fr;}}
.mini-card{background:white;border:1.5px solid var(--border);border-radius:9px;padding:13px 15px;}
.mini-card-lbl{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;margin-bottom:6px;}
.mini-card-body{font-size:12px;line-height:1.65;color:var(--ink2);}
.mini-card-body strong{color:var(--ink);}

/* flow */
.flow-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:13px 15px;background:white;border:1.5px solid var(--border);border-radius:9px;font-size:12.5px;font-weight:600;font-family:monospace;margin-top:11px;}
.flow-arr{color:var(--border);font-size:15px;}

/* banner */
.banner{background:var(--ink);color:white;border-radius:14px;padding:32px 36px;text-align:center;margin-top:40px;}
.banner-title{font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:9px;line-height:1.2;}
.banner-sub{font-size:14px;color:rgba(255,255,255,.58);margin-bottom:20px;line-height:1.6;}
.banner-flow{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border-radius:8px;padding:10px 16px;font-family:monospace;font-size:12.5px;flex-wrap:wrap;justify-content:center;}
.banner-flow .arr{color:rgba(255,255,255,.28);}
.banner-flow .live{color:#4ade80;font-weight:700;}

pre{font-family:'Courier New',monospace;font-size:11.5px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:11px 15px;line-height:1.8;overflow-x:auto;margin-top:9px;color:var(--ink2);user-select:all;cursor:text;}

.reveal{opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s;}
.reveal.visible{opacity:1;transform:none;}
</style>
</head>
<body>

<!-- LANG BAR -->
<div class="lang-bar">
  <a href="/" style="padding:4px 12px;border-radius:6px;background:white;color:var(--ink);font-size:11px;font-weight:700;text-decoration:none;margin-right:8px;">&larr; Home</a>
  <button onclick="downloadPDF()" style="padding:4px 12px;border-radius:6px;background:#e53935;color:white;border:none;font-size:11px;font-weight:700;cursor:pointer;margin-right:8px;">PDF</button>
  <span class="lang-bar-label" id="lang-label">Lingua</span>
  <button class="lang-btn active" data-lang="it">🇮🇹 IT</button>
  <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
  <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
  <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
  <button class="lang-btn" data-lang="de">🇩🇪 DE</button>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="topnav-logo" id="nav-logo">Guida Template</div>

  <a class="nav-step vc" href="#s-vscode"><div class="nav-step-num" style="background:var(--vc);">2</div><span id="nav2">VS Code</span></a>

</nav>

<div class="page">
  <!-- HERO -->
  <div class="hero">
    <div class="hero-eyebrow" id="hero-eyebrow"></div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-lead" id="hero-lead"></p>
    <div class="hero-tools">
      <div class="tool-pill" style="border-color:var(--gh-bd);color:var(--gh);background:var(--gh-lt);">🐙 GitHub</div>
      <div class="tool-pill" style="border-color:var(--vc-bd);color:var(--vc);background:var(--vc-lt);">💙 VS Code</div>
      <div class="tool-pill" style="border-color:var(--ai-bd);color:var(--ai);background:var(--ai-lt);">🤖 AI Agent</div>
      <div class="tool-pill" style="border-color:var(--nl-bd);color:var(--nl);background:var(--nl-lt);">🌍 Netlify</div>
    </div>

  <!-- PROGRESS -->
  <div class="progress-bar reveal">
    <div class="pb-step"><div class="pb-num" style="color:var(--gh);">1</div><div class="pb-label" id="pb1"></div><div class="pb-tool">GitHub.com</div></div>
    <div class="pb-step"><div class="pb-num" style="color:var(--vc);">2</div><div class="pb-label" id="pb2"></div><div class="pb-tool">GitHub Desktop + VS Code</div></div>
    <div class="pb-step"><div class="pb-num" style="color:var(--ai);">3</div><div class="pb-label" id="pb3"></div><div class="pb-tool">Copilot / Cursor</div></div>
    <div class="pb-step"><div class="pb-num" style="color:var(--nl);">4</div><div class="pb-label" id="pb4"></div><div class="pb-tool">Netlify</div></div>
  </div>

  <!-- SECTION 1 -->
  <div id="s-github" class="section">
    <div class="phase-divider reveal"><div class="phase-divider-line"></div><div class="phase-divider-label" style="color:var(--gh);border-color:var(--gh-bd);background:var(--gh-lt);" id="div1"></div><div class="phase-divider-line"></div></div>
    <div class="section-header reveal">
      <div class="section-badge" style="background:var(--gh-lt);border:1.5px solid var(--gh-bd);">🐙</div>
      <div class="section-meta"><div class="section-phase" style="color:var(--gh);">GitHub.com</div><h2 class="section-title" id="s1-title"></h2><p class="section-lead" id="s1-lead"></p></div>
    </div>
    <div class="steps reveal" id="steps-github"></div>
  </div>

  <!-- SECTION 2 -->
  <div id="s-vscode" class="section">
    <div class="phase-divider reveal"><div class="phase-divider-line"></div><div class="phase-divider-label" style="color:var(--vc);border-color:var(--vc-bd);background:var(--vc-lt);" id="div2"></div><div class="phase-divider-line"></div></div>
    <div class="section-header reveal">
      <div class="section-badge" style="background:var(--vc-lt);border:1.5px solid var(--vc-bd);">💙</div>
      <div class="section-meta"><div class="section-phase" style="color:var(--vc);">GitHub Desktop + VS Code</div><h2 class="section-title" id="s2-title"></h2><p class="section-lead" id="s2-lead"></p></div>

  <!-- SECTION 3 -->
  <div id="s-ai" class="section">

      <div class="section-badge" style="background:var(--ai-lt);border:1.5px solid var(--ai-bd);">🤖</div>

  <!-- SECTION 4 -->
  <div id="s-netlify" class="section">
    <div class="phase-divider reveal"><div class="phase-divider-line"></div><div class="phase-divider-label" style="color:var(--nl);border-color:var(--nl-bd);background:var(--nl-lt);" id="div4"></div><div class="phase-divider-line"></div></div>
    <div class="section-header reveal">
      <div class="section-badge" style="background:var(--nl-lt);border:1.5px solid var(--nl-bd);">🌍</div>
      <div class="section-meta"><div class="section-phase" style="color:var(--nl);">Netlify</div><h2 class="section-title" id="s4-title"></h2><p class="section-lead" id="s4-lead"></p></div>

    <div class="steps reveal" id="steps-netlify"></div>

  <!-- BANNER -->

<script>
// ═══════════════════════ SHARED TERMINALS ═══════════════════════
const tDev=`<div class="terminal"><div class="term-bar"><div class="term-dot" style="background:#ff5f57"></div><div class="term-dot" style="background:#febc2e"></div><div class="term-dot" style="background:#28c840"></div><span class="term-name">VS Code — Terminal</span></div><div class="term-body"><span class="td"># Install dependencies</span><br><span class="tb">$ </span><span class="tg">npm install</span><br><br><span class="td"># Start dev server</span><br><span class="tb">$ </span><span class="ta">npm run dev</span><br><br><span class="tt">  VITE v5.0  ready in 312 ms</span><br><span class="tt">  ➜  Local: http://localhost:5173/</span><br><span class="tg">  ➜  ready ✓</span></div></div>`;
const tNL=`<div class="terminal"><div class="term-bar"><div class="term-dot" style="background:#ff5f57"></div><div class="term-dot" style="background:#febc2e"></div><div class="term-dot" style="background:#28c840"></div><span class="term-name">Netlify — Deploy log</span></div><div class="term-body"><span class="td">// Auto-triggered on git push</span><br><span class="tw">10:42:01  Build started (Node 20)</span><br><span class="tw">10:42:20  npm run build</span><br><span class="ta">10:42:27  Vite v5 — building...</span><br><span class="ta">10:42:29  ✓ 847 modules transformed</span><br><span class="tg">10:42:31  ✔  Build succeeded!</span><br><span class="tg">10:42:32  ✔  Deploy succeeded!</span><br><span class="tp">🌍  https://my-app.netlify.app</span></div></div>`;
const tAI={
explore:`<div class="terminal"><div class="term-bar"><div class="term-dot" style="background:#ff5f57"></div><div class="term-dot" style="background:#febc2e"></div><div class="term-dot" style="background:#28c840"></div><span class="term-name">Copilot Chat / Cursor</span></div><div class="term-body"><span class="tb">@workspace</span> <span class="tw">Analyze the project structure.</span><br><span class="tw">List main folders, technologies,</span><br><span class="tw">and how the code is organized.</span><br><br><span class="td">// Agent replies with a full project map.</span><br><span class="td">// Read it before making any changes.</span></div></div>`,
modify:`<div class="terminal"><div class="term-bar"><div class="term-dot" style="background:#ff5f57"></div><div class="term-dot" style="background:#febc2e"></div><div class="term-dot" style="background:#28c840"></div><span class="term-name">Prompt examples</span></div><div class="term-body"><span class="td">// Rename the app</span><br><span class="tw">Rename "Template App" to "My App" everywhere.</span><br><br><span class="td">// Add a page</span><br><span class="tw">Create a /contact page with a form:</span><br><span class="tw">name, email, message → save to Supabase.</span><br><br><span class="td">// Change colors</span><br><span class="tw">Set primary color to #059669 (emerald).</span><br><span class="tw">Update all Tailwind components.</span></div></div>`
};

function nc(t){return t==='tip'?'step-note tip':t==='warn'?'step-note warn':t==='info'?'step-note info':'';}

function renderSteps(steps){
  return steps.map(s=>{
    let ex='';
    if(s.terminal)ex+=tDev;
    if(s.terminal2)ex+=tNL;
    if(s.terminalAI)ex+=tAI[s.terminalAI];
    if(s.pre)ex+=`<pre>${s.pre}</pre>`;
    if(s.flow)ex+=`<div class="flow-row"><span style="color:var(--ai)">VS Code</span><span class="flow-arr">→</span><span style="color:var(--gh)">GitHub Desktop</span><span class="flow-arr">→</span><span style="color:var(--gh)">Push</span><span class="flow-arr">→</span><span style="color:var(--nl)">Netlify auto-deploy</span><span class="flow-arr">→</span><span style="color:var(--green)">Live 🚀</span></div>`;
    const note=s.note&&s.noteType?`<div class="${nc(s.noteType)}">${s.note}</div>`:'';
    return`<div class="step"><div class="step-num" style="background:${s.col}">${s.n}</div><div class="step-body"><div class="step-title">${s.title}</div><div class="step-desc">${s.body}</div>${ex}${note}</div></div>`;
  }).join('');
}

it:{langLabel:"Lingua",navLogo:"Guida Template",nav:["GitHub Template","VS Code & Clone","Agente IA","Deploy Netlify"],heroEyebrow:"Guida pratica · Step by step",heroTitle:"Dal template GitHub alla tua <em>app in produzione</em>",heroLead:"Questa guida ti porta dalla prima copia del template fino all'app deployata su Netlify. Ogni sezione corrisponde a uno strumento. Segui l'ordine e in meno di un'ora sei operativo.",pb:["Crea il repo<br>dal template","Clona in<br>locale","Personalizza<br>con l'IA","Deploy<br>in un click"],dividers:["🐙 Fase 1 — GitHub","💙 Fase 2 — VS Code & GitHub Desktop","🤖 Fase 3 — Agente IA","🌍 Fase 4 — Deploy su Netlify"],s1:{title:"Crea il tuo repository dal template",lead:"In questa fase usi solo il browser. Niente terminale, niente codice. GitHub crea una copia pulita e indipendente del progetto direttamente sul tuo account."},s2:{title:"Clona il repo e aprilo in locale",lead:"Ora porti il codice dalla nuvola al tuo computer. Usi GitHub Desktop per clonare il repo e VS Code per aprirlo e lavorarci."},s3:{title:"Personalizza il progetto con l'agente IA",lead:"Ora che il progetto gira in locale, usi l'agente IA integrato in VS Code per adattare il template alle tue esigenze — senza riscrivere tutto da zero."},s4:{title:"Pubblica l'app su internet in meno di 2 minuti",lead:"Netlify si collega al tuo repository GitHub. Da questo momento, ogni push ricompila e ridistribuisce l'app automaticamente."},bannerTitle:"Sei operativo. 🎉",bannerSub:"Hai il tuo repository, il codice in locale, l'agente IA pronto e l'app deployata automaticamente ad ogni push.",bannerFlow:["Template GitHub","Clone locale","Agente IA","Commit + Push","Live su Netlify 🚀"],
stepsGH:[
{n:"1",col:"var(--gh)",title:"Apri il link del template",body:"Clicca il link diretto fornito oppure vai sulla pagina del repository e clicca il pulsante verde <strong>\"Use this template\"</strong>. Atterrerai direttamente sulla pagina di creazione con il template già preselezionato.",note:"",noteType:""},
{n:"2",col:"var(--gh)",title:"Scegli il nome del tuo repository",body:"Nel campo <strong>\"Repository name\"</strong> digita il nome del tuo progetto. Usa lettere minuscole e trattini: <code>mia-app-turismo</code>.",note:"⚠️ Scegli bene il nome ora — sarà parte dell'URL del tuo sito su Netlify.",noteType:"warn"},
{n:"3",col:"var(--gh)",title:"Scegli la visibilità: Private o Public",body:"Seleziona <strong>Private</strong> se vuoi che il codice rimanga riservato, oppure <strong>Public</strong> per condividerlo. Entrambe le opzioni funzionano con Netlify gratuito.",note:"",noteType:""},
{n:"✓",col:"var(--green)",title:"Clicca \"Create repository from template\"",body:"GitHub impiega qualche secondo poi ti porta al tuo nuovo repository. <strong>Hai una copia completa e indipendente</strong> del progetto. Il template originale non viene toccato.",note:"✅ Fatto! Il repo è ora sul tuo account GitHub.",noteType:"tip"}
],
stepsVC:[
{n:"1",col:"var(--gh)",title:"Apri GitHub Desktop",body:"Se non lo hai ancora, scaricalo da <strong>desktop.github.com</strong> e accedi con il tuo account GitHub.",note:"",noteType:""},
{n:"2",col:"var(--gh)",title:"Clona il tuo nuovo repository",body:"Vai su <strong>File → Clone repository…</strong> Nella tab <strong>\"GitHub.com\"</strong> trova il tuo repo. Scegli la cartella locale (es. <code>Desktop/Progetti</code>) e clicca <strong>\"Clone\"</strong>.",note:"ℹ️ Il clone crea una copia locale sincronizzata. Ogni modifica può essere pushata su GitHub in un click.",noteType:"info"},
{n:"3",col:"var(--vc)",title:"Apri il progetto in VS Code",body:"Da GitHub Desktop clicca <strong>\"Open in Visual Studio Code\"</strong>. VS Code si apre con la cartella già caricata. In alternativa: <strong>File → Open Folder…</strong>",note:"",noteType:""},
{n:"4",col:"var(--vc)",title:"Installa le dipendenze e avvia l'app",body:"Apri il terminale con <code>Ctrl + `</code> (Windows) o <code>Cmd + `</code> (Mac) ed esegui i comandi.",terminal:true,note:"✅ Apri localhost:5173 nel browser. Vedi l'app? Perfetto — il progetto è installato correttamente.",noteType:"tip"},
{n:"5",col:"var(--vc)",title:"Configura le variabili d'ambiente",body:"Duplica <code>.env.example</code> e rinomina la copia <code>.env</code>. Inserisci le tue chiavi Supabase (in <strong>Settings → API</strong> nel tuo progetto Supabase).",pre:"VITE_SUPABASE_URL=https://xxxx.supabase.co\nVITE_SUPABASE_ANON_KEY=eyJhbGci...",note:"⚠️ Il file .env non viene mai caricato su GitHub — è già nel .gitignore.",noteType:"warn"}
],
stepsAI:[
{n:"1",col:"var(--ai)",title:"Installa l'estensione AI in VS Code",body:"Vai nel pannello <strong>Extensions</strong> (<code>Ctrl+Shift+X</code>). Installa <strong>GitHub Copilot</strong> (piano a pagamento con trial) oppure usa <strong>Cursor</strong> (cursor.sh) — fork di VS Code con IA integrata e piano gratuito.",note:"",noteType:""},
{n:"2",col:"var(--ai)",title:"Apri la chat dell'agente",body:"Con Copilot: icona chat o <code>Ctrl+Shift+I</code>. Con Cursor: <code>Ctrl+L</code>. Usa sempre la modalità <strong>@workspace</strong> o <strong>Agent mode</strong> — così l'IA vede l'intero progetto.",note:"",noteType:""},
{n:"3",col:"var(--ai)",title:"Prima richiesta: esplora il progetto",body:"Prima di modificare qualcosa, fai mappare il progetto all'agente.",terminalAI:"explore",note:"",noteType:""},
{n:"4",col:"var(--ai)",title:"Fai le modifiche una alla volta",body:"Non chiedere tutto insieme. Una funzionalità, testa, poi avanti.",terminalAI:"modify",note:"✅ Regola d'oro: dopo ogni modifica, controlla nel browser prima di andare avanti.",noteType:"tip"},
{n:"5",col:"var(--ai)",title:"Salva con un commit su GitHub Desktop",body:"Funzionalità pronta → GitHub Desktop → scrivi un messaggio (es. <em>\"feat: aggiunta pagina contatti\"</em>) → <strong>\"Commit to main\"</strong> → <strong>\"Push origin\"</strong>.",note:"💾 Il commit è il tuo punto di salvataggio — puoi sempre tornare all'ultima versione funzionante.",noteType:"info"}
],
stepsNL:[
{n:"1",col:"var(--nl)",title:"Crea un account su Netlify",body:"Vai su <strong>netlify.com</strong> e registrati gratuitamente. Il modo più rapido è <strong>\"Sign up with GitHub\"</strong> — i due servizi vengono collegati automaticamente.",note:"",noteType:""},
{n:"2",col:"var(--nl)",title:"Aggiungi un nuovo sito",body:"Dashboard → <strong>\"Add new site\"</strong> → <strong>\"Import an existing project\"</strong> → <strong>\"Deploy with GitHub\"</strong>. Autorizza Netlify e seleziona il tuo repository.",note:"",noteType:""},
{n:"3",col:"var(--nl)",title:"Configura le impostazioni di build",body:"Netlify rileva automaticamente Vite/React. Verifica: <strong>Build command:</strong> <code>npm run build</code> · <strong>Publish directory:</strong> <code>dist</code> · <strong>Branch:</strong> <code>main</code>",note:"",noteType:""},
{n:"4",col:"var(--nl)",title:"Aggiungi le variabili d'ambiente su Netlify",body:"<strong>Site configuration → Environment variables</strong>. Inserisci le stesse variabili del tuo file <code>.env</code> locale. Senza di esse l'app non si connette a Supabase.",note:"⚠️ Le variabili vanno reinserite manualmente — Netlify non legge il file .env locale.",noteType:"warn"},
{n:"✓",col:"var(--green)",title:"Clicca \"Deploy site\" — è live! 🎉",body:"Netlify compila in ~30-60 secondi. Il sito è live su <code>nome.netlify.app</code>. Personalizza il sottodominio in <strong>Site configuration → Site details</strong>.",terminal2:true,note:"",noteType:""},
{n:"6",col:"var(--nl)",title:"Da qui in poi — tutto automatico",body:"Ogni push su GitHub rideploya automaticamente l'app in meno di 2 minuti.",flow:true,note:"⏱️ Dal commit alla versione live: meno di 2 minuti, senza fare nulla manualmente.",noteType:"tip"}
]},

en:{langLabel:"Language",navLogo:"Template Guide",nav:["GitHub Template","VS Code & Clone","AI Agent","Netlify Deploy"],heroEyebrow:"Practical guide · Step by step",heroTitle:"From GitHub template to your <em>app in production</em>",heroLead:"This guide takes you from your first copy of the template to an app deployed on Netlify. Each section covers one tool. Follow the order and you'll be running in under an hour.",pb:["Create repo<br>from template","Clone<br>locally","Customise<br>with AI","Deploy<br>one click"],dividers:["🐙 Phase 1 — GitHub","💙 Phase 2 — VS Code & GitHub Desktop","🤖 Phase 3 — AI Agent in VS Code","🌍 Phase 4 — Deploy on Netlify"],s1:{title:"Create your repository from the template",lead:"This phase is all browser. No terminal, no code. GitHub creates a clean, independent copy of the project directly on your account."},s2:{title:"Clone the repo and open it locally",lead:"Now you bring the code from the cloud to your computer. Use GitHub Desktop to clone the repo and VS Code to open and work on it."},s3:{title:"Customise the project with the AI agent",lead:"With the project running locally, use the AI agent in VS Code to adapt the template to your needs — without rewriting everything from scratch."},s4:{title:"Publish the app to the internet in under 2 minutes",lead:"Netlify connects to your GitHub repository. From now on, every push automatically rebuilds and redeploys the app."},bannerTitle:"You're live. 🎉",bannerSub:"You have your repository, code running locally, the AI agent ready, and the app deploying automatically on every push.",bannerFlow:["GitHub Template","Local clone","AI Agent","Commit + Push","Live on Netlify 🚀"],
stepsGH:[
{n:"1",col:"var(--gh)",title:"Open the template link",body:"Click the direct link provided, or go to the repository page and click the green <strong>\"Use this template\"</strong> button. You land on the creation page with the template already selected.",note:"",noteType:""},
{n:"2",col:"var(--gh)",title:"Choose your repository name",body:"In <strong>\"Repository name\"</strong>, type your project name. Use lowercase letters and hyphens: <code>my-tourism-app</code>.",note:"⚠️ Choose the name carefully — it will be part of your site URL on Netlify.",noteType:"warn"},
{n:"3",col:"var(--gh)",title:"Choose visibility: Private or Public",body:"Select <strong>Private</strong> to keep the code confidential, or <strong>Public</strong> to share it. Both work with the free Netlify plan.",note:"",noteType:""},
{n:"✓",col:"var(--green)",title:"Click \"Create repository from template\"",body:"GitHub takes a few seconds and takes you to your new repository. <strong>You now have a complete, independent copy</strong> of the project. The original template is untouched.",note:"✅ Done! The repo is now on your GitHub account.",noteType:"tip"}
],
stepsVC:[
{n:"1",col:"var(--gh)",title:"Open GitHub Desktop",body:"If you don't have it, download it from <strong>desktop.github.com</strong> and sign in with your GitHub account.",note:"",noteType:""},
{n:"2",col:"var(--gh)",title:"Clone your new repository",body:"Go to <strong>File → Clone repository…</strong> In the <strong>\"GitHub.com\"</strong> tab, find your repo. Choose a local folder (e.g. <code>Desktop/Projects</code>) and click <strong>\"Clone\"</strong>.",note:"ℹ️ Cloning creates a local synced copy. Any local change can be pushed to GitHub in one click.",noteType:"info"},
{n:"3",col:"var(--vc)",title:"Open the project in VS Code",body:"From GitHub Desktop click <strong>\"Open in Visual Studio Code\"</strong>. VS Code opens with the folder already loaded. Or use <strong>File → Open Folder…</strong>",note:"",noteType:""},
{n:"4",col:"var(--vc)",title:"Install dependencies and start the app",body:"Open the integrated terminal with <code>Ctrl + `</code> (Windows) or <code>Cmd + `</code> (Mac) and run the commands.",terminal:true,note:"✅ Open localhost:5173 in your browser. Can you see the app? Great — project is installed correctly.",noteType:"tip"},
{n:"5",col:"var(--vc)",title:"Configure environment variables",body:"Duplicate <code>.env.example</code> and rename the copy <code>.env</code>. Enter your Supabase keys (under <strong>Settings → API</strong> in your Supabase project).",pre:"VITE_SUPABASE_URL=https://xxxx.supabase.co\nVITE_SUPABASE_ANON_KEY=eyJhbGci...",note:"⚠️ The .env file is never uploaded to GitHub — it's already in .gitignore. Your keys stay private.",noteType:"warn"}
],
stepsAI:[
{n:"1",col:"var(--ai)",title:"Install the AI extension in VS Code",body:"Go to <strong>Extensions</strong> panel (<code>Ctrl+Shift+X</code>). Install <strong>GitHub Copilot</strong> (paid, with trial) or use <strong>Cursor</strong> (cursor.sh) — a VS Code fork with built-in AI and a free plan.",note:"",noteType:""},
{n:"2",col:"var(--ai)",title:"Open the agent chat",body:"Copilot: chat icon or <code>Ctrl+Shift+I</code>. Cursor: <code>Ctrl+L</code>. Always use <strong>@workspace</strong> or <strong>Agent mode</strong> — the AI sees the full project.",note:"",noteType:""},
{n:"3",col:"var(--ai)",title:"First request: explore the project",body:"Before changing anything, have the agent map the project.",terminalAI:"explore",note:"",noteType:""},
{n:"4",col:"var(--ai)",title:"Make changes one at a time",body:"Don't ask for everything at once. One feature, test it, then move on.",terminalAI:"modify",note:"✅ Golden rule: after every change, save and check the browser before going further.",noteType:"tip"},
{n:"5",col:"var(--ai)",title:"Save with a commit on GitHub Desktop",body:"Feature ready → GitHub Desktop → write a message (e.g. <em>\"feat: add contact page\"</em>) → <strong>\"Commit to main\"</strong> → <strong>\"Push origin\"</strong>.",note:"💾 The commit is your save point — you can always roll back to the last working version.",noteType:"info"}
],
stepsNL:[
{n:"1",col:"var(--nl)",title:"Create a Netlify account",body:"Go to <strong>netlify.com</strong> and sign up free. Fastest way: <strong>\"Sign up with GitHub\"</strong> — the two services link automatically.",note:"",noteType:""},
{n:"2",col:"var(--nl)",title:"Add a new site",body:"Dashboard → <strong>\"Add new site\"</strong> → <strong>\"Import an existing project\"</strong> → <strong>\"Deploy with GitHub\"</strong>. Authorise Netlify and select your repository.",note:"",noteType:""},
{n:"3",col:"var(--nl)",title:"Configure build settings",body:"Netlify auto-detects Vite/React. Verify: <strong>Build command:</strong> <code>npm run build</code> · <strong>Publish directory:</strong> <code>dist</code> · <strong>Branch:</strong> <code>main</code>",note:"",noteType:""},
{n:"4",col:"var(--nl)",title:"Add environment variables on Netlify",body:"<strong>Site configuration → Environment variables</strong>. Add the same variables from your local <code>.env</code> file. Without them the app can't connect to Supabase.",note:"⚠️ Netlify environment variables must be entered manually — Netlify does not read your local .env file.",noteType:"warn"},
{n:"✓",col:"var(--green)",title:"Click \"Deploy site\" — it's live! 🎉",body:"Netlify builds in ~30-60 seconds. Your site is live at <code>name.netlify.app</code>. Customise the subdomain under <strong>Site configuration → Site details</strong>.",terminal2:true,note:"",noteType:""},
{n:"6",col:"var(--nl)",title:"From here on — everything is automatic",body:"Every push to GitHub automatically redeploys the app in under 2 minutes.",flow:true,note:"⏱️ From commit to live version: less than 2 minutes, hands-free.",noteType:"tip"}
]},

fr:{langLabel:"Langue",navLogo:"Guide Template",nav:["GitHub Template","VS Code & Clone","Agent IA","Deploy Netlify"],heroEyebrow:"Guide pratique · Pas à pas",heroTitle:"Du template GitHub à votre <em>appli en production</em>",heroLead:"Ce guide vous accompagne de la première copie du template jusqu'à l'appli déployée sur Netlify. Chaque section correspond à un outil. Suivez l'ordre et vous serez opérationnel en moins d'une heure.",pb:["Créer le dépôt<br>depuis le template","Cloner<br>en local","Personnaliser<br>avec l'IA","Déployer<br>en un clic"],dividers:["🐙 Phase 1 — GitHub","💙 Phase 2 — VS Code & GitHub Desktop","🤖 Phase 3 — Agent IA dans VS Code","🌍 Phase 4 — Déploiement sur Netlify"],s1:{title:"Créer votre dépôt depuis le template",lead:"Cette phase se passe entièrement dans le navigateur. Pas de terminal, pas de code. GitHub crée une copie propre et indépendante du projet directement sur votre compte."},s2:{title:"Cloner le dépôt et l'ouvrir en local",lead:"Vous transférez maintenant le code du cloud vers votre ordinateur. Utilisez GitHub Desktop pour cloner le dépôt et VS Code pour l'ouvrir et travailler dessus."},s3:{title:"Personnaliser le projet avec l'agent IA",lead:"Le projet tournant en local, utilisez l'agent IA intégré à VS Code pour adapter le template à vos besoins — sans tout réécrire depuis zéro."},s4:{title:"Publier l'appli sur internet en moins de 2 minutes",lead:"Netlify se connecte à votre dépôt GitHub. Désormais, chaque push recompile et redéploie l'appli automatiquement."},bannerTitle:"Vous êtes en ligne. 🎉",bannerSub:"Vous avez votre dépôt, le code en local, l'agent IA prêt et l'appli se déployant automatiquement à chaque push.",bannerFlow:["Template GitHub","Clone local","Agent IA","Commit + Push","En ligne sur Netlify 🚀"],
stepsGH:[
{n:"1",col:"var(--gh)",title:"Ouvrez le lien du template",body:"Cliquez le lien direct fourni ou allez sur la page du dépôt et cliquez le bouton vert <strong>\"Use this template\"</strong>. Vous arrivez directement sur la page de création avec le template déjà sélectionné.",note:"",noteType:""},
{n:"2",col:"var(--gh)",title:"Choisissez le nom de votre dépôt",body:"Dans <strong>\"Repository name\"</strong>, saisissez le nom de votre projet. Utilisez des minuscules et des tirets : <code>mon-appli-tourisme</code>.",note:"⚠️ Choisissez bien le nom maintenant — il fera partie de l'URL de votre site sur Netlify.",noteType:"warn"},
{n:"3",col:"var(--gh)",title:"Choisissez la visibilité : Privé ou Public",body:"<strong>Private</strong> pour garder le code confidentiel, <strong>Public</strong> pour le partager. Les deux options fonctionnent avec le plan gratuit Netlify.",note:"",noteType:""},
{n:"✓",col:"var(--green)",title:"Cliquez \"Create repository from template\"",body:"GitHub prend quelques secondes puis vous amène à votre nouveau dépôt. <strong>Vous avez une copie complète et indépendante</strong> du projet. Le template original n'est pas touché.",note:"✅ Fait ! Le dépôt est maintenant sur votre compte GitHub.",noteType:"tip"}
],
stepsVC:[
{n:"1",col:"var(--gh)",title:"Ouvrez GitHub Desktop",body:"Téléchargez-le sur <strong>desktop.github.com</strong> si besoin, puis connectez-vous avec votre compte GitHub.",note:"",noteType:""},
{n:"2",col:"var(--gh)",title:"Clonez votre nouveau dépôt",body:"<strong>File → Clone repository…</strong> → onglet <strong>\"GitHub.com\"</strong> → trouvez votre dépôt → choisissez un dossier local → <strong>\"Clone\"</strong>.",note:"ℹ️ Le clone crée une copie locale synchronisée. Toute modification locale peut être poussée sur GitHub en un clic.",noteType:"info"},
{n:"3",col:"var(--vc)",title:"Ouvrez le projet dans VS Code",body:"Depuis GitHub Desktop cliquez <strong>\"Open in Visual Studio Code\"</strong>. VS Code s'ouvre avec le dossier déjà chargé. Sinon : <strong>File → Open Folder…</strong>",note:"",noteType:""},
{n:"4",col:"var(--vc)",title:"Installez les dépendances et lancez l'appli",body:"Terminal intégré : <code>Ctrl + `</code> (Windows) ou <code>Cmd + `</code> (Mac). Exécutez les commandes.",terminal:true,note:"✅ Ouvrez localhost:5173 dans le navigateur. Vous voyez l'appli ? Parfait.",noteType:"tip"},
{n:"5",col:"var(--vc)",title:"Configurez les variables d'environnement",body:"Dupliquez <code>.env.example</code> → renommez la copie <code>.env</code> → entrez vos clés Supabase (<strong>Settings → API</strong>).",pre:"VITE_SUPABASE_URL=https://xxxx.supabase.co\nVITE_SUPABASE_ANON_KEY=eyJhbGci...",note:"⚠️ Le fichier .env n'est jamais chargé sur GitHub — il est déjà dans .gitignore.",noteType:"warn"}
],
stepsAI:[
{n:"1",col:"var(--ai)",title:"Installez l'extension IA dans VS Code",body:"Panneau <strong>Extensions</strong> (<code>Ctrl+Shift+X</code>) → <strong>GitHub Copilot</strong> (payant avec essai) ou <strong>Cursor</strong> (cursor.sh) — fork de VS Code avec IA intégrée et plan gratuit.",note:"",noteType:""},
{n:"2",col:"var(--ai)",title:"Ouvrez le chat de l'agent",body:"Copilot : icône chat ou <code>Ctrl+Shift+I</code>. Cursor : <code>Ctrl+L</code>. Utilisez toujours le mode <strong>@workspace</strong> — l'IA voit ainsi tout le projet.",note:"",noteType:""},
{n:"3",col:"var(--ai)",title:"Première requête : explorez le projet",body:"Avant de modifier quoi que ce soit, faites cartographier le projet par l'agent.",terminalAI:"explore",note:"",noteType:""},
{n:"4",col:"var(--ai)",title:"Faites les modifications une par une",body:"Une fonctionnalité à la fois. Testez, puis passez à la suivante.",terminalAI:"modify",note:"✅ Règle d'or : après chaque modification, vérifiez dans le navigateur avant de continuer.",noteType:"tip"},
{n:"5",col:"var(--ai)",title:"Sauvegardez avec un commit sur GitHub Desktop",body:"Fonctionnalité prête → GitHub Desktop → message (ex. <em>\"feat: ajout page contact\"</em>) → <strong>\"Commit to main\"</strong> → <strong>\"Push origin\"</strong>.",note:"💾 Le commit est votre point de sauvegarde — revenez toujours à la dernière version fonctionnelle.",noteType:"info"}
],
stepsNL:[
{n:"1",col:"var(--nl)",title:"Créez un compte Netlify",body:"<strong>netlify.com</strong> → inscrivez-vous gratuitement. Méthode la plus rapide : <strong>\"Sign up with GitHub\"</strong>.",note:"",noteType:""},
{n:"2",col:"var(--nl)",title:"Ajoutez un nouveau site",body:"<strong>\"Add new site\"</strong> → <strong>\"Import an existing project\"</strong> → <strong>\"Deploy with GitHub\"</strong> → autorisez Netlify → sélectionnez votre dépôt.",note:"",noteType:""},
{n:"3",col:"var(--nl)",title:"Configurez les paramètres de build",body:"Netlify détecte automatiquement Vite/React. Vérifiez : <strong>Build command :</strong> <code>npm run build</code> · <strong>Publish directory :</strong> <code>dist</code> · <strong>Branch :</strong> <code>main</code>",note:"",noteType:""},
{n:"4",col:"var(--nl)",title:"Ajoutez les variables d'environnement sur Netlify",body:"<strong>Site configuration → Environment variables</strong>. Ajoutez les mêmes variables que dans votre fichier <code>.env</code> local.",note:"⚠️ Les variables Netlify doivent être saisies manuellement — Netlify ne lit pas votre fichier .env local.",noteType:"warn"},
{n:"✓",col:"var(--green)",title:"Cliquez \"Deploy site\" — c'est en ligne ! 🎉",body:"Netlify compile en ~30-60 secondes. Site live sur <code>nom.netlify.app</code>. Personnalisez le sous-domaine dans <strong>Site configuration → Site details</strong>.",terminal2:true,note:"",noteType:""},
{n:"6",col:"var(--nl)",title:"Désormais — tout est automatique",body:"Chaque push sur GitHub redéploie l'appli en moins de 2 minutes.",flow:true,note:"⏱️ Du commit à la version en ligne : moins de 2 minutes, sans rien faire manuellement.",noteType:"tip"}
]},

es:{langLabel:"Idioma",navLogo:"Guía Template",nav:["GitHub Template","VS Code & Clonar","Agente IA","Deploy Netlify"],heroEyebrow:"Guía práctica · Paso a paso",heroTitle:"Del template de GitHub a tu <em>app en producción</em>",heroLead:"Esta guía te lleva desde la primera copia del template hasta la app desplegada en Netlify. Cada sección corresponde a una herramienta. Sigue el orden y en menos de una hora estarás operativo.",pb:["Crear repo<br>desde template","Clonar<br>en local","Personalizar<br>con IA","Deploy<br>en un clic"],dividers:["🐙 Fase 1 — GitHub","💙 Fase 2 — VS Code & GitHub Desktop","🤖 Fase 3 — Agente IA en VS Code","🌍 Fase 4 — Deploy en Netlify"],s1:{title:"Crea tu repositorio desde el template",lead:"En esta fase solo usas el navegador. Sin terminal, sin código. GitHub crea una copia limpia e independiente del proyecto directamente en tu cuenta."},s2:{title:"Clona el repo y ábrelo en local",lead:"Ahora llevas el código desde la nube a tu ordenador. Usas GitHub Desktop para clonar el repo y VS Code para abrirlo y trabajar en él."},s3:{title:"Personaliza el proyecto con el agente IA",lead:"Con el proyecto corriendo en local, usa el agente IA integrado en VS Code para adaptar el template a tus necesidades — sin reescribir todo desde cero."},s4:{title:"Publica la app en internet en menos de 2 minutos",lead:"Netlify se conecta a tu repositorio de GitHub. A partir de ahora, cada push recompila y redistribuye la app automáticamente."},bannerTitle:"Estás en producción. 🎉",bannerSub:"Tienes tu repositorio, el código en local, el agente IA listo y la app desplegándose automáticamente en cada push.",bannerFlow:["Template GitHub","Clon local","Agente IA","Commit + Push","En vivo en Netlify 🚀"],
stepsGH:[
{n:"1",col:"var(--gh)",title:"Abre el enlace del template",body:"Haz clic en el enlace directo proporcionado o ve a la página del repositorio y haz clic en el botón verde <strong>\"Use this template\"</strong>.",note:"",noteType:""},
{n:"2",col:"var(--gh)",title:"Elige el nombre de tu repositorio",body:"En <strong>\"Repository name\"</strong>, escribe el nombre de tu proyecto. Usa minúsculas y guiones: <code>mi-app-turismo</code>.",note:"⚠️ Elige bien el nombre ahora — formará parte de la URL de tu sitio en Netlify.",noteType:"warn"},
{n:"3",col:"var(--gh)",title:"Elige visibilidad: Privado o Público",body:"<strong>Private</strong> para código confidencial, <strong>Public</strong> para compartir. Ambas opciones funcionan con el plan gratuito de Netlify.",note:"",noteType:""},
{n:"✓",col:"var(--green)",title:"Haz clic en \"Create repository from template\"",body:"GitHub tarda unos segundos y te lleva a tu nuevo repositorio. <strong>Tienes una copia completa e independiente</strong> del proyecto. El template original no se toca.",note:"✅ ¡Listo! El repo está ahora en tu cuenta de GitHub.",noteType:"tip"}
],
stepsVC:[
{n:"1",col:"var(--gh)",title:"Abre GitHub Desktop",body:"Descárgalo en <strong>desktop.github.com</strong> si no lo tienes e inicia sesión con tu cuenta GitHub.",note:"",noteType:""},
{n:"2",col:"var(--gh)",title:"Clona tu nuevo repositorio",body:"<strong>File → Clone repository…</strong> → pestaña <strong>\"GitHub.com\"</strong> → encuentra tu repo → elige carpeta local → <strong>\"Clone\"</strong>.",note:"ℹ️ El clon crea una copia local sincronizada. Cualquier cambio se puede subir a GitHub en un clic.",noteType:"info"},
{n:"3",col:"var(--vc)",title:"Abre el proyecto en VS Code",body:"Desde GitHub Desktop haz clic en <strong>\"Open in Visual Studio Code\"</strong>. VS Code se abre con la carpeta ya cargada.",note:"",noteType:""},
{n:"4",col:"var(--vc)",title:"Instala las dependencias e inicia la app",body:"Terminal integrado: <code>Ctrl + `</code> (Windows) o <code>Cmd + `</code> (Mac). Ejecuta los comandos.",terminal:true,note:"✅ Abre localhost:5173 en el navegador. ¿Ves la app? Perfecto.",noteType:"tip"},
{n:"5",col:"var(--vc)",title:"Configura las variables de entorno",body:"Duplica <code>.env.example</code> → renombra la copia <code>.env</code> → introduce tus claves Supabase (<strong>Settings → API</strong>).",pre:"VITE_SUPABASE_URL=https://xxxx.supabase.co\nVITE_SUPABASE_ANON_KEY=eyJhbGci...",note:"⚠️ El archivo .env nunca se sube a GitHub — ya está en .gitignore.",noteType:"warn"}
],
stepsAI:[
{n:"1",col:"var(--ai)",title:"Instala la extensión IA en VS Code",body:"Panel <strong>Extensions</strong> (<code>Ctrl+Shift+X</code>) → <strong>GitHub Copilot</strong> (pago con prueba) o <strong>Cursor</strong> (cursor.sh) — fork de VS Code con IA y plan gratuito.",note:"",noteType:""},
{n:"2",col:"var(--ai)",title:"Abre el chat del agente",body:"Copilot: icono chat o <code>Ctrl+Shift+I</code>. Cursor: <code>Ctrl+L</code>. Usa siempre el modo <strong>@workspace</strong>.",note:"",noteType:""},
{n:"3",col:"var(--ai)",title:"Primera petición: explora el proyecto",body:"Antes de modificar nada, haz que el agente mapee el proyecto.",terminalAI:"explore",note:"",noteType:""},
{n:"4",col:"var(--ai)",title:"Haz los cambios de uno en uno",body:"Una funcionalidad, pruébala, luego sigue.",terminalAI:"modify",note:"✅ Regla de oro: después de cada cambio, comprueba en el navegador antes de avanzar.",noteType:"tip"},
{n:"5",col:"var(--ai)",title:"Guarda con un commit en GitHub Desktop",body:"Funcionalidad lista → GitHub Desktop → mensaje (ej. <em>\"feat: añadir página contacto\"</em>) → <strong>\"Commit to main\"</strong> → <strong>\"Push origin\"</strong>.",note:"💾 El commit es tu punto de guardado — siempre puedes volver a la última versión funcional.",noteType:"info"}
],
stepsNL:[
{n:"1",col:"var(--nl)",title:"Crea una cuenta en Netlify",body:"<strong>netlify.com</strong> → regístrate gratis. Más rápido: <strong>\"Sign up with GitHub\"</strong>.",note:"",noteType:""},
{n:"2",col:"var(--nl)",title:"Añade un nuevo sitio",body:"<strong>\"Add new site\"</strong> → <strong>\"Import an existing project\"</strong> → <strong>\"Deploy with GitHub\"</strong> → autoriza → selecciona tu repo.",note:"",noteType:""},
{n:"3",col:"var(--nl)",title:"Configura los ajustes de build",body:"Netlify detecta automáticamente Vite/React. Verifica: <strong>Build command:</strong> <code>npm run build</code> · <strong>Publish directory:</strong> <code>dist</code> · <strong>Branch:</strong> <code>main</code>",note:"",noteType:""},
{n:"4",col:"var(--nl)",title:"Añade las variables de entorno en Netlify",body:"<strong>Site configuration → Environment variables</strong> → añade las mismas variables de tu <code>.env</code> local.",note:"⚠️ Las variables de Netlify deben introducirse manualmente.",noteType:"warn"},
{n:"✓",col:"var(--green)",title:"Haz clic en \"Deploy site\" — ¡está en vivo! 🎉",body:"Netlify compila en ~30-60 segundos. Sitio live en <code>nombre.netlify.app</code>.",terminal2:true,note:"",noteType:""},
{n:"6",col:"var(--nl)",title:"A partir de ahora — todo es automático",body:"Cada push a GitHub redespliega la app en menos de 2 minutos.",flow:true,note:"⏱️ Del commit a la versión en vivo: menos de 2 minutos, sin hacer nada manualmente.",noteType:"tip"}
]},

// ═══════════════════════ APPLY LANG ═══════════════════════
const revObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');revObs.unobserve(e.target);}});
},{threshold:0.08});

function applyLang(code){
  const d=T[code];
  document.documentElement.lang=code;
  document.getElementById('lang-label').textContent=d.langLabel;
  document.getElementById('nav-logo').textContent=d.navLogo;
  ['nav1','nav2','nav3','nav4'].forEach((id,i)=>document.getElementById(id).textContent=d.nav[i]);
  document.getElementById('hero-eyebrow').textContent=d.heroEyebrow;
  document.getElementById('hero-title').innerHTML=d.heroTitle;
  document.getElementById('hero-lead').textContent=d.heroLead;
  ['pb1','pb2','pb3','pb4'].forEach((id,i)=>document.getElementById(id).innerHTML=d.pb[i]);
  ['div1','div2','div3','div4'].forEach((id,i)=>document.getElementById(id).textContent=d.dividers[i]);
  document.getElementById('s1-title').textContent=d.s1.title;
  document.getElementById('s1-lead').textContent=d.s1.lead;
  document.getElementById('s2-title').textContent=d.s2.title;
  document.getElementById('s2-lead').textContent=d.s2.lead;
  document.getElementById('s3-title').textContent=d.s3.title;
  document.getElementById('s3-lead').textContent=d.s3.lead;
  document.getElementById('s4-title').textContent=d.s4.title;
  document.getElementById('s4-lead').textContent=d.s4.lead;
  document.getElementById('steps-github').innerHTML=renderSteps(d.stepsGH);
  document.getElementById('steps-vscode').innerHTML=renderSteps(d.stepsVC);
  document.getElementById('steps-ai').innerHTML=renderSteps(d.stepsAI);
  document.getElementById('steps-netlify').innerHTML=renderSteps(d.stepsNL);
  document.getElementById('banner-title').textContent=d.bannerTitle;
  document.getElementById('banner-sub').textContent=d.bannerSub;
  const f=d.bannerFlow;
  document.getElementById('banner-flow').innerHTML=`<span>${f[0]}</span><span class="arr">→</span><span>${f[1]}</span><span class="arr">→</span><span>${f[2]}</span><span class="arr">→</span><span>${f[3]}</span><span class="arr">→</span><span class="live">${f[4]}</span>`;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===code));
  document.querySelectorAll('.reveal').forEach(el=>{el.classList.remove('visible');revObs.observe(el);});
}

// active nav on scroll
const secObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      document.querySelectorAll('.nav-step').forEach(l=>l.classList.remove('active'));
      const m={'s-github':'gh','s-vscode':'vc','s-ai':'ai','s-netlify':'nl'};
      const lnk=document.querySelector(`.nav-step.${m[e.target.id]}`);
      if(lnk)lnk.classList.add('active');
    }
  });
},{threshold:0.3,rootMargin:'-96px 0px 0px 0px'});
['s-github','s-vscode','s-ai','s-netlify'].forEach(id=>{
  const el=document.getElementById(id);if(el)secObs.observe(el);
});

document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click',()=>applyLang(btn.dataset.lang));
});

(function(){
  var h=(location.hash||'').replace('#','');
  applyLang(['it','en','fr','es','de','sv','pt'].indexOf(h)>=0 ? h : 'it');
})();

function downloadPDF(){
  const el=document.querySelector('.page');
  const bar=document.querySelector('.lang-bar');
  const nav=document.querySelector('.topnav');
  bar.style.display='none';nav.style.display='none';
  html2pdf().set({margin:10,filename:'Guida_Template_GitHub.pdf',image:{type:'jpeg',quality:0.95},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save().then(()=>{bar.style.display='';nav.style.display='';});
}
