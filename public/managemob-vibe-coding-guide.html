. Escolhe algo curto e em minúsculas, do tipo <em>pessoa-mobility</em>. Em poucos segundos a cópia é tua.", "Na página do teu novo fork, clica no botão verde <strong>&lt;&gt; Code</strong> em cima à direita. Abre um menu: escolhe <strong>Open with GitHub Desktop</strong>. O browser vai pedir autorização para abrir a app — aceita.", "O GitHub Desktop sugere uma pasta local para guardar o projeto. Aceita o caminho por defeito ou escolhe um cómodo (ex. <em>Documentos</em> ou <em>Ambiente de Trabalho/Projetos</em>) e clica <strong>Clone</strong>. Em poucos segundos todos os ficheiros do projeto estão no teu computador.", "Em cima à direita no GitHub Desktop clica <strong>Open in Visual Studio Code</strong>: o VS Code abre com a pasta certa já carregada. À esquerda vês o <em>Explorer</em> com toda a estrutura do projeto.", "Abre o chat do assistente de IA no VS Code e cola este prompt: <code>Instala as dependências do projeto</code>. A IA descarrega por ti todas as bibliotecas de que o projeto precisa (uns dois minutos). Quando te disser que terminou sem erros, estás pronto para o passo seguinte."], "prompt_label": "Prompt para colar no assistente de IA", "prompt_body": "\"Explica-me num parágrafo o que tem a pasta src/ — quais são as subpastas principais e para que serve cada uma. Não modifiques nada agora, só quero perceber o mapa do projeto.\""}, {"n": "03", "label": "BASE DE DADOS SUPABASE", "title_html": "Prepare o <em>armazém de dados</em>", "why": "O Supabase é o \"armazém\" online onde a app guarda tudo: utilizadores, participantes, mobilidades, documentos. Neste passo crias o teu espaço Supabase, ficas com as duas credenciais (URL + chave) que o site precisa para falar com ele, e crias o teu primeiro utilizador administrador. O resto — encher a base de dados com as tabelas certas, blindar a segurança — fá-lo o assistente de IA por ti no passo seguinte. Tu pensas só nos cliques.", "actions": ["Vai a <a href=\"https://supabase.com\" target=\"_blank\" rel=\"noopener\">supabase.com</a>, faz login (ou regista-te se for a primeira vez) e clica <strong>New project</strong>. Escolhe um nome (ex. <em>pessoa-mobility</em>), uma <strong>região na Europa</strong> (Frankfurt, Ireland ou Stockholm — quanto mais perto dos teus utilizadores, mais rápida a app responde) e uma palavra-passe forte. <strong>Guarda a palavra-passe</strong> num sítio seguro: não se recupera, e podes vir a precisar dela mais tarde.", "Espera 1-2 minutos. O Supabase está a preparar-te um espaço dedicado. É normal o painel ficar inativo uns segundos — não está bloqueado.", "Na barra lateral esquerda clica <strong>Project Settings → API</strong>. Encontras dois valores escritos em claro: <strong>Project URL</strong> (um endereço que começa por <em>https://</em>) e <strong>anon public key</strong> (uma cadeia longa). Copia ambos para um bloco de notas temporário: vais precisar deles num instante, no passo 04. Nada de técnico — só duas operações de copy-paste.", "Continuando na barra lateral, vai a <strong>Authentication → Providers</strong>. Verifica que <strong>Email</strong> está ativo (geralmente está por defeito). Para os testes, desativa <em>Confirm email</em>: assim, quando criares o teu utilizador no passo seguinte, não tens de ir ao email confirmar nenhum link. Vais reativá-lo antes de passar a produção real (ver passo 10).", "Sidebar → <strong>Authentication → Users → Add user → Create new user</strong>. Cria o teu primeiro acesso de administrador: um email e uma palavra-passe que te lembres. É o utilizador com que vais entrar no passo 05 para experimentar o site."], "prompt_label": "Prompt para colar no assistente de IA"}, {"n": "04", "label": "CONFIGURAR O PROJETO", "title_html": "Deixa o <em>assistente de IA</em> ligar tudo", "why": "O site agora sabe que existe um armazém Supabase, mas ainda não tem as credenciais para falar com ele, e o armazém está vazio. Neste passo o assistente de IA faz por ti três coisas técnicas de uma vez: guarda as credenciais no sítio certo, enche a base de dados com as tabelas da app, e ativa a segurança. Tu colas um único prompt e dizes \"sim\" quando ele te pedir confirmação.", "actions": ["Abre o chat do assistente de IA dentro do Visual Studio Code (no Gemini Code Assist é o ícone de estrela na barra lateral; no Cursor prime <code>Ctrl+L</code> / <code>Cmd+L</code>). Se vires uma opção tipo <em>Agent mode</em> ou <em>@workspace</em>, ativa-a: significa que a IA pode ver e modificar os ficheiros do projeto.", "Copia este prompt todo (já está escrito, não precisas de perceber cada palavra) e cola-o no chat da IA:", "<code class=\"code-block\">Configura o projeto Managemob com estas credenciais Supabase:<br>URL = https://&lt;teu-projeto&gt;.supabase.co<br>KEY = &lt;a tua anon key&gt;<br><br>Por favor faz três coisas: (1) cria o ficheiro .env com estas duas variáveis (VITE_SUPABASE_URL e VITE_SUPABASE_ANON_KEY) e garante que .env está em .gitignore para nunca acabar no GitHub; (2) executa o ficheiro supabase/schema.sql contra a minha base de dados Supabase para criar as tabelas da app; (3) ativa Row Level Security em todas as tabelas, para que só os utilizadores autenticados possam ler e escrever. Mostra-me passo a passo o que vais fazer e pede confirmação antes de cada ação.</code>", "Substitui <em>https://&lt;teu-projeto&gt;.supabase.co</em> e <em>&lt;a tua anon key&gt;</em> pelos dois valores que copiaste do dashboard Supabase no passo 03. Carrega Enter.", "A IA mostra-te cada operação uma a uma: \"Vou criar o ficheiro .env, ok?\", \"Vou executar este SQL, ok?\", \"Vou ativar a segurança, ok?\". A cada pergunta responde <strong>sim</strong> (ou aceita o diff). Quando te disser que terminou, estás pronto: o site está ligado ao Supabase, a base de dados tem as tabelas, a segurança está ativa — e tudo isto sem teres tocado num ficheiro à mão."], "tip_label": "Se a IA pedir para fazer algo que não percebes", "tip_body": "Está perfeitamente bem dizer-lhe \"explica-me em português simples o que vais fazer, antes de fazeres\". É o trabalho dela — não precisas de aprender SQL nem variáveis de ambiente para concluíres esta guia. Se algo te parecer estranho (ex. quer apagar ficheiros que não vêm ao caso), diz \"pára, não dei o ok\" e tenta de novo com instruções mais precisas."}, {"n": "05", "label": "TESTE NO SEU COMPUTADOR", "title_html": "Corra o site <em>localmente</em>", "why": "Antes de pôr o site online, vale a pena testá-lo no teu computador. É a altura em que descobres se o Supabase está bem ligado, se o login funciona, se os dados ficam mesmo guardados. Se algo não bater certo vês aqui — sem fazeres mal a ninguém.", "actions": ["No VS Code abre o chat do assistente de IA e cola: <code>Arranca o site em local para o ver no browser</code>. A IA vai correr o comando certo (é <code>npm run dev</code>, se quiseres saber). Se preferires fazer à mão, abre o Terminal (<em>View → Terminal</em>), escreve <code>npm run dev</code> e carrega Enter.", "No terminal vai aparecer uma linha tipo <code>➜ Local: http://localhost:XXXX</code>. Abre esse endereço no browser (normalmente é <code>http://localhost:3000</code>; se a porta estiver ocupada, o Vite escolhe outra e mostra-ta). Se a IA arrancou por ti, diz-te o endereço diretamente no chat.", "Vais ver o ecrã de login. Entra com email e palavra-passe do administrador criado no passo 03. Se te disser \"Invalid login credentials\", pede à IA: <code>O login não está a funcionar, verifica as credenciais Supabase</code>. Quase sempre é um valor mal copiado ou um espaço a mais.", "Já dentro, experimenta criar um participante de teste a partir da home (basta nome, apelido, país de destino). Guarda, depois carrega <code>F5</code> para recarregar: se o participante continuar lá, a base de dados online está mesmo a guardar.", "Carrega no seletor de idioma (em cima, tanto no login como na sidebar): a interface tem de mudar de idioma instantaneamente nos 7 idiomas. Se faltar alguma tradução ou algo parecer estranho, dás por isso aqui."], "prompt_label": "Se algo falhar, prompt útil", "prompt_body": "\"Se algo não funcionar quando arranco o site, diz-me o que diz o terminal e propõe uma correção simples. Não modifiques ficheiros sem me perguntar antes.\""}, {"n": "06", "label": "TRADUZA OS TEXTOS", "title_html": "Personalize em <em>7 línguas</em>", "why": "O Managemob já fala 7 idiomas de origem. Tu não precisas de traduzir do zero — só reescrever os textos visíveis (etiquetas, títulos, textos dos botões) para se adaptarem à TUA organização, e de forma natural em cada idioma. Fá-lo o assistente de IA com um único prompt: tu escolhes o tom, a IA aplica-o aos 7 ficheiros de uma vez.", "actions": ["No VS Code abre o chat do assistente de IA. Não tens de abrir os 7 ficheiros de idioma um a um — ele trata disso.", "Cola este prompt (substituindo \"Pessoa Academy\" pelo nome da tua organização e descrevendo o tom que queres):", "<code class=\"code-block\">Reescreve todos os textos visíveis da app para a marca 'Pessoa Academy', com um tom caloroso e profissional (muda isto se quiseres outro estilo). Abre os 7 ficheiros em src/locales/ (it.ts, en.ts, es.ts, fr.ts, de.ts, pt.ts, se.ts), modifica apenas os valores (as strings entre aspas), não toques nas chaves (os nomes antes dos dois pontos). Traduz de forma natural em cada idioma, não palavra a palavra. Mostra-me o diff antes de aplicar.</code>", "A IA propõe todas as alterações numa única revisão. Percorre o diff: se gostares das frases, aceita. Se quiseres outro tom (mais formal, mais jovem, menos corporativo), diz-lhe — por exemplo \"reescreve mais formal, tratando por você\" — e ela refaz tudo."], "prompt_label": "Prompt para colar no assistente de IA", "tip_label": "Adicionar um 8.º idioma", "tip_body": "Queres um idioma extra (ex. polaco)? Pede à IA: <em>\"Adiciona o polaco como 8.º idioma da app, copiando do en.ts e traduzindo. Adiciona também a bandeira no seletor de idioma.\"</em> Fá-lo em 30 segundos, sem teres de mexer em código."}, {"n": "07", "label": "LOGÓTIPO E CORES", "title_html": "Dê-lhe <em>a sua identidade visual</em>", "why": "O aspeto é a primeira coisa que os teus utilizadores notam. Mudando o logótipo, as cores e o título do site, o Managemob deixa de se chamar Managemob e passa a ser visivelmente a TUA plataforma. São alterações puramente estéticas — a lógica fica intacta — mas mudam por completo a perceção.", "actions": ["Prepara o teu logótipo como ficheiro <code>logo.svg</code> (preferido — vetorial, escala bem em qualquer tamanho) ou <code>logo.png</code> (formato quadrado, no mínimo 256×256 pixels, fundo transparente). Arrasta o ficheiro para a pasta <code>public/</code> do projeto no VS Code: vês o novo ícone aparecer no Explorer.", "Decide as tuas duas cores: a <strong>primária</strong> (a cor principal da app, ex. o azul da tua organização) e a <strong>de destaque</strong> (uma complementar para detalhes e botões). Se ainda não tens paleta, vai a <a href=\"https://coolors.co\" target=\"_blank\" rel=\"noopener\">coolors.co</a>, brinca até gostares e anota os dois códigos hexadecimais (ex. #1D72B8 e #38BDF8).", "Abre o chat da IA e cola este prompt (substituindo nome da organização e códigos de cor):", "<code class=\"code-block\">Rebrand completo da app para a minha organização 'Pessoa Academy'. (1) Substitui o logótipo placeholder 'M' pelo ficheiro public/logo.svg em Sidebar.tsx e Login.tsx. (2) Atualiza as cores em src/styles/main.css: --primary = #XXXXXX, --accent = #YYYYYY. (3) Muda o título do site (separador do browser) para 'Pessoa Academy' em index.html, e faz o favicon apontar para o meu novo logótipo. (4) Substitui a palavra 'Managemob' por 'Pessoa Academy' nos textos visíveis dos 7 ficheiros em src/locales/. Mostra-me o diff antes de aplicar.</code>", "A IA propõe todas as alterações. Aprova. Recarrega o browser em <code>localhost:3000</code>: já vês a tua identidade visual aplicada."], "prompt_label": "Prompt para colar no assistente de IA"}, {"n": "08", "label": "MODELOS WORD", "title_html": "Automatize os seus <em>documentos</em>", "why": "Uma das coisas mais poderosas do Managemob: pegas num documento Word qualquer (Learning Agreement, Europass Mobility, contrato de mobilidade...) e transformá-lo num modelo que se preenche automaticamente com os dados do participante que selecionares. Adeus copy-paste manual: 50 participantes, 50 documentos, 30 segundos.", "actions": ["Abre o documento Word que queres automatizar no Microsoft Word, LibreOffice ou Google Docs. Se estiver em PDF ou for uma digitalização, primeiro tens de o reconstruir como <code>.docx</code> — a app só aceita ficheiros .docx.", "Procura os pontos onde vão os dados variáveis (nome do participante, datas, empresa de acolhimento, país...) e substitui-os por etiquetas entre chavetas. Exemplos práticos:<br>[Nome] [Apelido] → <code>{name} {surname}</code><br>[Data de início] → <code>{arrival_date}</code><br>[Email] → <code>{email}</code><br>[Empresa de acolhimento] → <code>{host_company_name}</code>. A lista completa de etiquetas disponíveis está na página <em>Documentos</em> da app, em \"Export Placeholders\".", "Guarda no formato <strong>.docx</strong> (não .doc, não .pdf, não Google Docs). Do Word: <em>Guardar como → Documento Word (*.docx)</em>.", "Na app Managemob: <em>Documentos → Carregar Modelo</em>. Dá um nome ao modelo (ex. \"Learning Agreement PT\"), seleciona o ficheiro .docx, confirma. O modelo aparece na lista.", "Seleciona-o, procura e marca um ou vários participantes na lista, clica <strong>Gerar</strong>. Para um participante descarregas um ficheiro único; para vários, um ZIP com um documento por pessoa. A formatação (negrito, itálico, tabelas) é preservada: a app só substitui as etiquetas."], "tip_label": "Regras importantes das etiquetas", "tip_body": "As etiquetas são <strong>sensíveis a maiúsculas</strong>: escreve <code>{name}</code>, não <code>{Name}</code>. Sem espaços dentro das chavetas (<code>{ name }</code> não funciona). Etiquetas inexistentes ficam como texto literal (\"{nomeErrado}\"): se o documento gerado ainda tem chavetas, escreveste mal o nome de um campo. Para a lista exata vai a <em>Documentos → Export Placeholders (CSV)</em>."}, {"n": "09", "label": "PÔR ONLINE", "title_html": "Publique o site <em>no Netlify</em>", "why": "Por agora o site só corre no teu computador e ninguém mais o vê. Para o partilhares com o mundo coloca-lo no Netlify, gratuito, ligado diretamente ao teu repositório GitHub. A partir desse momento, sempre que fizeres push para o GitHub, o Netlify reconstrói o site e redistribui-o automaticamente — nada de FTP, nada de comandos de deploy, nada de nada.", "subsections": [{"title": "A · Envia as alterações para o GitHub (com GitHub Desktop)", "items": ["Abre o GitHub Desktop. Se modificaste ficheiros (e depois dos passos 06-07 modificaste muitos), em cima à esquerda vês a lista de ficheiros alterados com um diff colorido (verde = adicionado, vermelho = removido).", "Em baixo à esquerda há um campo para a mensagem de gravação: escreve uma descrição breve do que fizeste (ex. \"Personalização Pessoa Academy: logótipo, cores, textos\"). Clica <strong>Commit to main</strong>: selaste um ponto de gravação.", "Em cima, clica <strong>Push origin</strong>. As tuas alterações foram para o teu repositório GitHub — finalmente com cópia de segurança, finalmente prontas para o Netlify."]}, {"title": "B · Publica no Netlify (ligado ao teu repositório)", "items": ["Vai a <a href=\"https://netlify.com\" target=\"_blank\" rel=\"noopener\">netlify.com</a> e faz login (a via mais rápida é <em>Sign up with GitHub</em>). Dashboard → <strong>Add new site → Import an existing project → Deploy with GitHub</strong>.", "Da primeira vez o Netlify pede autorização para ler os teus repositórios — concede. Depois seleciona da lista o <strong>fork</strong> que criaste no passo 02.", "O Netlify deteta automaticamente que é um projeto Vite e propõe as configurações certas. Verifica apenas: <em>Build command:</em> <code>npm run build</code> · <em>Publish directory:</em> <code>dist</code> · <em>Branch:</em> <code>main</code>.", "Abre <strong>Show advanced → Add environment variable</strong>. Adiciona as DUAS variáveis que a IA pôs no teu <code>.env</code> no passo 04: <code>VITE_SUPABASE_URL</code> e <code>VITE_SUPABASE_ANON_KEY</code> (com os mesmos valores). Sem estas, a app online não saberá como falar com o Supabase.", "Clica <strong>Deploy</strong>. O primeiro build demora 1-3 minutos — podes ver o log a correr em direto. Quando aparecer \"Site is live\", terminaste.", "O Netlify dá-te um endereço aleatório tipo <code>https://&lt;palavras-estranhas-123&gt;.netlify.app</code>. <strong>Esse é o teu site online!</strong> Em <em>Site settings → Change site name</em> podes renomeá-lo (ex. <code>pessoa-mobility.netlify.app</code>); em <em>Domain management</em> podes ligar um domínio teu se tiveres um (ex. <code>mobility.pessoa-academy.com</code>)."]}], "prompt_label": "Prompt para colar no assistente de IA", "prompt_body": "\"Adiciona ao projeto a configuração que faz com que todas as páginas internas funcionem corretamente quando o site está online no Netlify (de forma que, se eu recarregar uma página como /dashboard, não veja o erro 404 Not Found). Mostra-me o ficheiro antes de o criares.\""}, {"n": "10", "label": "VERIFICAÇÃO FINAL", "title_html": "Está <em>online</em>, última verificação", "why": "Estás online. Antes de abrir o site a utilizadores reais, verificamos que tudo funciona a partir do URL público do Netlify (já não do localhost). São 7 verificações rápidas: se passarem todas, lanças. Se alguma falhar, ainda há tempo de corrigir — sem que ninguém dê por isso.", "checklist": ["O login a partir do URL público Netlify funciona (com o administrador criado no passo 03).", "O seletor de idioma mostra os 7 idiomas e os textos mudam mesmo quando carrego.", "Adiciono um participante de teste, carrego F5: se ainda lá estiver, a base de dados online está a guardar.", "Gero um documento Word para um participante: as etiquetas <code>{name}</code> etc. no ficheiro descarregado estão substituídas por dados reais.", "O Calendar mostra o participante nas datas corretas.", "Recarregar uma sub-página como <code>/dashboard</code> não dá erro 404 (= o prompt do passo 09 foi aplicado).", "O logout devolve-me ao ecrã de login sem erros."], "tip_label": "Antes do lançamento oficial", "tip_body": "Quando passas do beta interno aos utilizadores reais, faz esta limpeza no Supabase: (1) <strong>reativa Confirm email</strong> em Authentication → Providers (assim os novos registos têm de confirmar o email); (2) <strong>roda a palavra-passe da BD</strong> em Project Settings → Database (substitui a que guardaste no passo 03); (3) apaga o <strong>administrador de teste</strong> e cria os reais; (4) faz um <strong>backup</strong> da base de dados (Project Settings → Database → Backups). Vinte minutos de trabalho que te vão salvar a pele cem vezes."}], "conclusion_label": "Conclusão", "conclusion_title_html": "Uma plataforma <em>sua</em>, em 7 línguas, sem código à mão", "conclusion_body": "O Visual Studio Code abre os ficheiros. O assistente de IA escreve o código. O GitHub Desktop sincroniza online. O Supabase guarda os dados. O Netlify põe o site na montra. Tu orquestras o todo e ficas com as decisões que importam: nome, cores, textos, documentos automatizados, idiomas. É o Vibe Coding Workflow™: zero linhas de código escritas à mão, mas o resultado é uma plataforma a 100% tua.", "tags": ["Vibe Coding", "Pessoa Academy", "Managemob", "VS Code", "Gemini Code Assist", "GitHub Desktop", "Supabase", "Netlify", "Erasmus+", "Mobilidade formativa"], "footer_creator": "© Pessoa Academy", "footer_brand": "Managemob × Vibe Coding Workflow™"}, "sv": {"lang": "sv", "page_title": "Steg-för-steg-procedur för att skapa din egen anpassade version av plattformen", "doc_title": "Bygg din egen version av Managemob", "doc_subtitle": "Steg-för-steg-guide, på 7 språk, utan att skriva kod.", "creator_line": "En guide från Pessoa Academy · Vibe Coding Workflow™", "tools_line": "Visual Studio Code + gratis AI-assistent + GitHub Desktop + Supabase + Netlify", "hero_eyebrow": "Vibe Coding Workflow™", "hero_title_html": "Steg-för-steg-procedur för att skapa din <em>egen anpassade</em> version av plattformen", "hero_body": "Managemob är en plattform för att hantera utbildningsmobilitet (Erasmus+, ESC, utbyten). Den här guiden tar dig steg för steg till DIN egen anpassade version: logotyp, färger, texter på dina språk, automatiserade dokument. Du behöver inte kunna programmera – AI:n skriver, du bestämmer.", "stats": [["10", "steg"], ["7", "språk klara"], ["0", "rader skrivna för hand"], ["~2 h", "snittid"]], "principle_label": "Vibe Coding-principen", "principle_title_html": "Du är <em>regissören</em>, AI:n är skrivmaskinisten", "principle_body": "Hela guiden vilar på en idé: du beskriver i vanligt språk vad du vill ha, AI-assistenten skriver koden i din editor. När du ser ett PROMPT-avsnitt, kopiera meningen och klistra in den i AI-assistentens chatt i Visual Studio Code.", "lang_switch_label": "Språk", "steps": [{"n": "01", "label": "INNAN DU BÖRJAR", "title_html": "Förbered din <em>verktygslåda</em>", "why": "Innan du skriver något alls behöver du en handfull verktyg, alla gratis och numera standard i mjukvaruvärlden. Det är inte slumpmässiga appar: var och en har en mycket bestämd uppgift och hakar i de andra. Tänk på en verkstad — <strong>GitHub</strong> är onlinelagret, <strong>Visual Studio Code</strong> arbetsbänken där du öppnar filerna, <strong>AI-assistenten</strong> din lärling som skriver kod efter diktamen, <strong>GitHub Desktop</strong> kärran som flyttar grejer mellan lager och bänk, <strong>Supabase</strong> datalagret, <strong>Netlify</strong> strålkastaren som ställer ut allt i skyltfönstret. Idag är det bara registreringar och installationer: ingen kod ännu.", "actions": ["Gå till <strong>github.com</strong> och skapa ett gratiskonto (en mejladress räcker). GitHub är dagboken där varje förändring i din kod blir tidsstämplad och sparad: om du gör fel hoppar du tillbaka till igår eftermiddag med ett klick. Härifrån är det ankaret som allt annat hänger på.", "Hämta <strong>Visual Studio Code</strong> från <a href=\"https://code.visualstudio.com\" target=\"_blank\" rel=\"noopener\">code.visualstudio.com</a> (Windows/Mac/Linux, ~100 MB). Det är programmet där du öppnar, läser och redigerar projektets filer — tänk på det som Word, fast för kod. Första gången ser det ut som vilken textredigerare som helst: magin kommer i nästa steg, när du sätter AI:n ovanpå.", "I VS Code, klicka på <em>Extensions</em>-ikonen i vänstermenyn (fyra rutor, kortkommando <code>Ctrl+Shift+X</code> på Windows/Linux, <code>Cmd+Shift+X</code> på Mac). Sök efter en gratis AI-assistent: enklast är <strong>Gemini Code Assist</strong> från Google, men <strong>Codeium</strong>, <strong>Continue</strong> eller <strong>Cody</strong> funkar också utmärkt. Installera och logga in med ett Google-konto: härifrån har du en chatt inuti VS Code som du kan ge instruktioner till på vanlig svenska.", "Hämta <strong>GitHub Desktop</strong> från <a href=\"https://desktop.github.com\" target=\"_blank\" rel=\"noopener\">desktop.github.com</a> och logga in med samma konto som i punkt 1. Det är en liten app som broar din dator och GitHub: med två klick åker dina lokala ändringar upp i molnet (commit + push). Utan den hade du fått lära dig Gits terminalkommandon — vi slipper det.", "Gå till <strong>supabase.com</strong> och registrera dig (med Google eller GitHub går det snabbast). Supabase är onlinelagret där din app kommer att spara allt: användare, deltagare, mobiliteter, uppladdade dokument. Just nu räcker det att kontot är öppet — själva projektet skapar du i steg 03, när vi behöver dess inloggningsuppgifter.", "Gå till <strong>netlify.com</strong> och registrera dig — \"Sign up with GitHub\" är snabbaste vägen, då pratar de två tjänsterna automatiskt med varandra. Netlify är det som förvandlar din kod till en webbplats som vem som helst på internet kan nå, gratis. Ingen server att konfigurera, ingen FTP, ingenting: den kompilerar om och publicerar igen automatiskt varje gång du pushar till GitHub.", "Hämta <strong>Node.js</strong> i <strong>LTS</strong>-versionen (Long Term Support, den stabila) från <a href=\"https://nodejs.org\" target=\"_blank\" rel=\"noopener\">nodejs.org</a>. Node.js är motorn som kör webbplatsen på din dator medan du testar: utan den vet kommandot <code>npm run dev</code> i steg 05 inte vad det ska köra. Installationen är guidad — Nästa, Nästa, Klart."], "tip_label": "Lugn med kostnaderna", "tip_body": "Alla dessa verktyg är gratis för personligt bruk: ingen frågar efter kreditkort för att komma igång. Om någon plötsligt frågar efter ett — stanna upp och dubbelkolla: du är på väg att aktivera ett betalabonnemang av misstag, och inget i den här guiden kräver det."}, {"n": "02", "label": "FORK & CLONE", "title_html": "Skapa din <em>personliga kopia</em> av projektet", "why": "Att \"forka\" betyder att göra en personlig kopia av Managemob-projektet på GitHub: du jobbar på din kopia, originalet förblir orört. Att \"klona\" betyder att hämta den kopian till din dator så att du kan öppna den i VS Code. Två klick och ett kommando — i slutet av det här steget har du själva projektet på disken, redo att starta.", "actions": ["Gå till GitHub-sidan för Managemob-mallen — t.ex. <a href=\"https://github.com/ETN-International/managemob-app\" target=\"_blank\" rel=\"noopener\">github.com/ETN-International/managemob-app</a>, eller den mall-URL du fått. Uppe till höger klickar du <strong>Fork</strong>: GitHub frågar vilket konto kopian ska tillhöra (ditt) och vad den ska heta. Välj något kort i gemener, typ <em>pessoa-mobility</em>. På några sekunder är kopian din.", "På sidan för din nya fork klickar du den gröna knappen <strong>&lt;&gt; Code</strong> uppe till höger. En meny öppnas: välj <strong>Open with GitHub Desktop</strong>. Webbläsaren frågar om den får öppna appen — godkänn.", "GitHub Desktop föreslår en lokal mapp att spara projektet i. Lämna standardvägen eller välj en bekväm (t.ex. <em>Dokument</em> eller <em>Skrivbord/Projekt</em>) och klicka <strong>Clone</strong>. På några sekunder ligger alla projektfiler på din dator.", "Uppe till höger i GitHub Desktop, klicka <strong>Open in Visual Studio Code</strong>: VS Code öppnas med rätt mapp redan inläst. Till vänster ser du <em>Explorer</em> med hela projektstrukturen.", "Öppna AI-assistentens chatt i VS Code och klistra in den här prompten: <code>Installera projektets beroenden</code>. AI:n laddar ner alla bibliotek som projektet bygger på (ett par minuter). När den säger att den är klar utan fel är du redo för nästa steg."], "prompt_label": "Prompt att klistra in i AI-assistenten", "prompt_body": "\"Förklara i ett stycke vad mappen src/ innehåller — vilka är de viktigaste undermapparna och vad gör var och en. Ändra inget än, jag vill bara förstå projektets karta.\""}, {"n": "03", "label": "SUPABASE-DATABAS", "title_html": "Förbered <em>datalagret</em>", "why": "Supabase är onlinelagret där appen sparar allt: användare, deltagare, mobiliteter, uppladdade dokument. I det här steget skapar du ditt Supabase-utrymme, hämtar de två inloggningsuppgifterna (URL + nyckel) som webbplatsen behöver för att prata med det, och skapar din första administratörsanvändare. Resten — fylla databasen med rätt tabeller, låsa säkerheten — sköter AI-assistenten åt dig i nästa steg. Du klickar.", "actions": ["Gå till <a href=\"https://supabase.com\" target=\"_blank\" rel=\"noopener\">supabase.com</a>, logga in (eller registrera dig om det är första gången) och klicka <strong>New project</strong>. Välj ett namn (t.ex. <em>pessoa-mobility</em>), en <strong>region i Europa</strong> (Frankfurt, Ireland eller Stockholm — ju närmare dina användare, desto snabbare svarar appen) och ett starkt lösenord. <strong>Spara lösenordet</strong> på en säker plats: det går inte att återställa, och du kan komma att behöva det senare.", "Vänta 1-2 minuter. Supabase håller på att rigga ett dedikerat utrymme åt dig. Det är normalt att panelen är passiv några sekunder — den har inte hängt sig.", "I vänstermenyn klickar du <strong>Project Settings → API</strong>. Du hittar två värden i klartext: <strong>Project URL</strong> (en adress som börjar med <em>https://</em>) och <strong>anon public key</strong> (en lång teckensträng). Kopiera båda till ett tillfälligt anteckningsblock: du behöver dem strax, i steg 04. Inget tekniskt — bara två kopiera-klistra.", "Stanna i vänstermenyn, gå till <strong>Authentication → Providers</strong>. Kontrollera att <strong>Email</strong> är aktivt (det brukar vara det som standard). För testerna, stäng av <em>Confirm email</em>: så slipper du, när du skapar din användare i nästa steg, gå till mejlen och klicka på en bekräftelselänk. Du slår på det igen innan riktig produktion (se steg 10).", "Sidebar → <strong>Authentication → Users → Add user → Create new user</strong>. Skapa din första administratörsåtkomst: en mejladress och ett lösenord du minns. Det är användaren du loggar in med i steg 05 för att testa webbplatsen."], "prompt_label": "Prompt att klistra in i AI-assistenten"}, {"n": "04", "label": "KONFIGURERA PROJEKTET", "title_html": "Låt <em>AI-assistenten</em> koppla ihop allt", "why": "Webbplatsen vet nu att det finns ett Supabase-lager, men har ännu inte uppgifterna att prata med det, och lagret är tomt. I det här steget gör AI-assistenten tre tekniska saker åt dig på en gång: sparar dina inloggningsuppgifter på rätt plats, fyller databasen med appens tabeller och slår på säkerheten. Du klistrar in en enda prompt och säger \"ja\" när den frågar om bekräftelse.", "actions": ["Öppna AI-assistentens chatt inuti Visual Studio Code (i Gemini Code Assist är det stjärnikonen i sidopanelen; i Cursor trycker du <code>Ctrl+L</code> / <code>Cmd+L</code>). Om du ser ett alternativ som <em>Agent mode</em> eller <em>@workspace</em>, slå på det: det betyder att AI:n får läsa och ändra projektets filer.", "Kopiera hela den här prompten (den är redan skriven, du behöver inte förstå varje ord) och klistra in den i AI-chatten:", "<code class=\"code-block\">Konfigurera Managemob-projektet med dessa Supabase-uppgifter:<br>URL = https://&lt;ditt-projekt&gt;.supabase.co<br>KEY = &lt;din anon key&gt;<br><br>Snälla, gör tre saker: (1) skapa filen .env med de här två variablerna (VITE_SUPABASE_URL och VITE_SUPABASE_ANON_KEY) och se till att .env finns i .gitignore så att den aldrig hamnar på GitHub; (2) kör filen supabase/schema.sql mot min Supabase-databas för att skapa appens tabeller; (3) aktivera Row Level Security på alla tabeller, så att bara inloggade användare får läsa och skriva. Visa mig steg för steg vad du tänker göra och be om bekräftelse innan varje åtgärd.</code>", "Byt ut <em>https://&lt;ditt-projekt&gt;.supabase.co</em> och <em>&lt;din anon key&gt;</em> mot de två värdena du kopierade från Supabase-instrumentpanelen i steg 03. Tryck Enter.", "AI:n visar varje operation en i taget: \"Jag skapar .env-filen, ok?\", \"Jag kör den här SQL-koden, ok?\", \"Jag slår på säkerheten, ok?\". På varje fråga svarar du <strong>ja</strong> (eller godkänner diffen). När den säger att den är klar är du framme: webbplatsen är kopplad till Supabase, databasen har sina tabeller, säkerheten är på — och du har inte rört en enda fil för hand."], "tip_label": "Om AI:n vill göra något du inte förstår", "tip_body": "Det är helt okej att säga \"förklara på enkel svenska vad du tänker göra, innan du gör det\". Det är dess jobb — du behöver inte lära dig SQL eller miljövariabler för att slutföra den här guiden. Om något känns konstigt (t.ex. den vill radera filer som inte hör till), säg \"stopp, jag har inte godkänt det\" och försök igen med tydligare instruktioner."}, {"n": "05", "label": "TESTA PÅ DIN DATOR", "title_html": "Kör sajten <em>lokalt</em>", "why": "Innan du lägger ut webbplatsen online är det smart att testa den på din dator. Det är här du upptäcker om Supabase är rätt kopplat, om inloggningen fungerar, om data verkligen sparas. Om något skaver märker du det här — utan att skada någon.", "actions": ["I VS Code, öppna AI-assistentens chatt och klistra in: <code>Starta webbplatsen lokalt så jag kan se den i webbläsaren</code>. AI:n kör rätt kommando (det är <code>npm run dev</code>, för den nyfikne). Föredrar du att göra det själv: öppna terminalen (<em>View → Terminal</em>), skriv <code>npm run dev</code>, tryck Enter.", "I terminalen dyker en rad upp som <code>➜ Local: http://localhost:XXXX</code>. Öppna den adressen i webbläsaren (oftast <code>http://localhost:3000</code>; om porten är upptagen väljer Vite en annan och visar den). Om AI:n startade åt dig så säger den adressen direkt i chatten.", "Du ser inloggningsskärmen. Logga in med mejladressen och lösenordet för administratören du skapade i steg 03. Om den svarar \"Invalid login credentials\", be AI:n: <code>Inloggningen funkar inte, kolla Supabase-uppgifterna</code>. Nio gånger av tio är det ett felkopierat värde eller ett extra mellanslag.", "Väl inne, prova att skapa en testdeltagare från startsidan (det räcker med förnamn, efternamn, destinationsland). Spara, tryck sedan <code>F5</code> för att ladda om: om deltagaren fortfarande är där sparar onlinedatabasen på riktigt.", "Klicka på språkväljaren (uppe, både i inloggningen och i sidopanelen): gränssnittet ska byta språk direkt på alla 7 språken. Saknas en översättning eller ser något konstigt ut, märker du det här."], "prompt_label": "Om något fallerar, användbar prompt", "prompt_body": "\"Om något inte funkar när jag startar webbplatsen, säg vad som står i terminalen och föreslå en enkel rättning. Ändra inga filer utan att fråga mig först.\""}, {"n": "06", "label": "ÖVERSÄTT TEXTERNA", "title_html": "Anpassa på <em>7 språk</em>", "why": "Managemob talar redan 7 språk från start. Du behöver inte översätta från noll — du behöver bara skriva om de synliga texterna (etiketter, rubriker, knapptexter) så att de passar DIN organisation, och naturligt på varje språk. AI-assistenten gör det med en enda prompt: du väljer tonen, AI:n applicerar den på alla 7 filer på en gång.", "actions": ["I VS Code, öppna AI-assistentens chatt. Du behöver inte öppna de 7 språkfilerna en i taget — den sköter det.", "Klistra in den här prompten (byt ut \"Pessoa Academy\" mot din organisations namn och beskriv tonen du vill ha):", "<code class=\"code-block\">Skriv om alla synliga texter i appen för varumärket 'Pessoa Academy', med en varm och professionell ton (ändra detta om du vill ha en annan stil). Öppna alla 7 filer i src/locales/ (it.ts, en.ts, es.ts, fr.ts, de.ts, pt.ts, se.ts), ändra bara värdena (strängarna inom citattecken), rör inte nycklarna (namnen före kolon). Översätt naturligt på varje språk, inte ord för ord. Visa mig diffen innan du applicerar.</code>", "AI:n föreslår alla ändringar i en enda granskning. Bläddra igenom diffen: gillar du formuleringarna, godkänn. Vill du ha en annan ton (mer formell, mer ung, mindre corporate), säg det — t.ex. \"skriv om mer formellt, med ni-tilltal\" — och den gör om allt."], "prompt_label": "Prompt att klistra in i AI-assistenten", "tip_label": "Lägga till ett 8:e språk", "tip_body": "Vill du ha ett extra språk (t.ex. polska)? Be AI:n: <em>\"Lägg till polska som 8:e språk i appen genom att kopiera från en.ts och översätta. Lägg också till flaggan i språkväljaren.\"</em> Den fixar det på 30 sekunder, utan att du rör vid kod."}, {"n": "07", "label": "LOGOTYP OCH FÄRGER", "title_html": "Ge den <em>din visuella identitet</em>", "why": "Utseendet är det första dina användare märker. När du byter logotyp, färger och webbplatstitel slutar Managemob heta Managemob och blir synligt DIN plattform. Det är rent kosmetiska ändringar — logiken förblir orörd — men de förändrar känslan totalt.", "actions": ["Förbered din logotyp som en <code>logo.svg</code>-fil (rekommenderas — vektor, skalar perfekt) eller <code>logo.png</code> (kvadratiskt format, minst 256×256 pixlar, transparent bakgrund). Dra filen till projektets <code>public/</code>-mapp i VS Code: du ser den nya ikonen dyka upp i Explorer.", "Bestäm dina två färger: den <strong>primära</strong> (appens huvudfärg, t.ex. din organisations blå) och <strong>accentfärgen</strong> (en kompletterande för detaljer och knappar). Har du ingen palett klar, gå till <a href=\"https://coolors.co\" target=\"_blank\" rel=\"noopener\">coolors.co</a>, lek tills det känns rätt och anteckna de två hexkoderna (t.ex. #1D72B8 och #38BDF8).", "Öppna AI-chatten och klistra in den här prompten (byt ut organisationsnamn och färgkoder):", "<code class=\"code-block\">Komplett ombrandning av appen för min organisation 'Pessoa Academy'. (1) Byt ut platshållarlogotypen 'M' mot filen public/logo.svg i Sidebar.tsx och Login.tsx. (2) Uppdatera färgerna i src/styles/main.css: --primary = #XXXXXX, --accent = #YYYYYY. (3) Ändra webbplatsens titel (webbläsarflik) till 'Pessoa Academy' i index.html, och låt favicon peka på min nya logotyp. (4) Byt ut ordet 'Managemob' mot 'Pessoa Academy' i de synliga texterna i de 7 filerna i src/locales/. Visa mig diffen innan du applicerar varje ändring.</code>", "AI:n föreslår alla ändringar. Godkänn. Ladda om webbläsaren på <code>localhost:3000</code>: din visuella identitet syns redan."], "prompt_label": "Prompt att klistra in i AI-assistenten"}, {"n": "08", "label": "WORD-MALLAR", "title_html": "Automatisera dina <em>dokument</em>", "why": "En av Managemobs starkaste sidor: du tar ett valfritt Word-dokument (Learning Agreement, Europass Mobility, mobilitetsavtal...) och förvandlar det till en mall som fylls i automatiskt med data från den deltagare du väljer. Slut på manuellt copy-paste: 50 deltagare, 50 dokument, 30 sekunder.", "actions": ["Öppna Word-dokumentet du vill automatisera i Microsoft Word, LibreOffice eller Google Docs. Om det är i PDF eller en skanning måste du först bygga om det som <code>.docx</code> — appen tar bara emot .docx-filer.", "Hitta ställena där variabel data ska in (deltagarens namn, datum, värdföretag, land...) och byt ut dem mot taggar inom klamrar. Praktiska exempel:<br>[Förnamn] [Efternamn] → <code>{name} {surname}</code><br>[Startdatum] → <code>{arrival_date}</code><br>[E-post] → <code>{email}</code><br>[Värdföretag] → <code>{host_company_name}</code>. Hela listan med tillgängliga taggar finns på <em>Documents</em>-sidan i appen, under \"Export Placeholders\".", "Spara i formatet <strong>.docx</strong> (inte .doc, inte .pdf, inte Google Docs). Från Word: <em>Spara som → Word-dokument (*.docx)</em>.", "I Managemob-appen: <em>Documents → Ladda upp Mall</em>. Ge mallen ett namn (t.ex. \"Learning Agreement SV\"), välj .docx-filen, bekräfta. Mallen syns i listan.", "Markera den, sök och kryssa för en eller flera deltagare i listan, klicka <strong>Generera</strong>. För en deltagare laddar du ner en ensam fil; för flera, en ZIP med ett dokument per person. Formateringen (fet, kursiv, tabeller) bevaras: appen byter bara ut taggarna."], "tip_label": "Viktiga regler för taggar", "tip_body": "Taggar är <strong>versalkänsliga</strong>: skriv <code>{name}</code>, inte <code>{Name}</code>. Inga mellanslag inuti klamrarna (<code>{ name }</code> funkar inte). Taggar som inte finns blir kvar som vanlig text i dokumentet (\"{felaktigtNamn}\"): om ditt genererade dokument fortfarande har klamrar har du stavat ett fältnamn fel. För exakt lista, gå till <em>Documents → Export Placeholders (CSV)</em>."}, {"n": "09", "label": "GÅ LIVE", "title_html": "Publicera sajten <em>på Netlify</em>", "why": "Just nu kör webbplatsen bara på din dator och ingen annan ser den. För att dela den med världen lägger du upp den på Netlify, gratis, kopplat direkt till ditt GitHub-repo. Från och med nu kommer Netlify att bygga om webbplatsen och distribuera den automatiskt varje gång du pushar till GitHub — ingen FTP, inga deploy-kommandon, ingenting.", "subsections": [{"title": "A · Spara ändringarna till GitHub (med GitHub Desktop)", "items": ["Öppna GitHub Desktop. Om du har ändrat filer (och efter steg 06-07 har du gjort det rejält) ser du uppe till vänster listan med ändrade filer och en färgkodad diff (grönt = tillagt, rött = borttaget).", "Nere till vänster finns ett fält för sparmeddelandet: skriv en kort beskrivning av vad du gjort (t.ex. \"Anpassning Pessoa Academy: logo, färger, texter\"). Klicka <strong>Commit to main</strong>: du har förseglat en sparpunkt.", "Uppe, klicka <strong>Push origin</strong>. Dina ändringar har flugit upp till ditt GitHub-repo — äntligen säkerhetskopierade, äntligen redo för Netlify."]}, {"title": "B · Publicera på Netlify (kopplat till ditt repo)", "items": ["Gå till <a href=\"https://netlify.com\" target=\"_blank\" rel=\"noopener\">netlify.com</a> och logga in (snabbaste vägen är <em>Sign up with GitHub</em>). Dashboard → <strong>Add new site → Import an existing project → Deploy with GitHub</strong>.", "Första gången frågar Netlify om tillåtelse att läsa dina repon — godkänn. Välj sedan från listan den <strong>fork</strong> du skapade i steg 02.", "Netlify upptäcker automatiskt att det är ett Vite-projekt och föreslår rätt build-inställningar. Kontrollera bara att det står: <em>Build command:</em> <code>npm run build</code> · <em>Publish directory:</em> <code>dist</code> · <em>Branch:</em> <code>main</code>.", "Öppna <strong>Show advanced → Add environment variable</strong>. Lägg till de TVÅ variablerna som AI:n satte i din <code>.env</code> i steg 04: <code>VITE_SUPABASE_URL</code> och <code>VITE_SUPABASE_ANON_KEY</code> (med samma värden). Utan dessa kan den utlagda appen inte prata med Supabase.", "Klicka <strong>Deploy</strong>. Första bygget tar 1-3 minuter — du kan följa loggen i realtid. När det står \"Site is live\" är du klar.", "Netlify ger dig en slumpmässig adress som <code>https://&lt;konstiga-ord-123&gt;.netlify.app</code>. <strong>Det är din webbplats, live!</strong> Från <em>Site settings → Change site name</em> kan du döpa om den (t.ex. <code>pessoa-mobility.netlify.app</code>); från <em>Domain management</em> kan du koppla en egen domän om du har en (t.ex. <code>mobility.pessoa-academy.com</code>)."]}], "prompt_label": "Prompt att klistra in i AI-assistenten", "prompt_body": "\"Lägg till projektets konfiguration så att alla interna sidor fungerar korrekt när webbplatsen är online på Netlify (så att jag inte får ett 404 Not Found-fel om jag laddar om en sida som /dashboard). Visa mig filen innan du skapar den.\""}, {"n": "10", "label": "SLUTKONTROLL", "title_html": "Du är <em>online</em>, sista verifikationen", "why": "Du är online. Innan du öppnar webbplatsen för riktiga användare kollar vi att allt fungerar från den publika Netlify-URL:en (inte längre från localhost). Sju snabba kontroller: går alla igenom så lanserar du. Faller någon, har du fortfarande tid att fixa — utan att någon märker det.", "checklist": ["Inloggning från den publika Netlify-URL:en fungerar (med administratören som skapades i steg 03).", "Språkväljaren visar alla 7 språken och texterna byts faktiskt när jag klickar.", "Jag lägger till en testdeltagare, trycker F5: om den fortfarande är där sparar onlinedatabasen.", "Jag genererar ett Word-dokument för en deltagare: taggarna <code>{name}</code> osv. i den nedladdade filen är ersatta av riktiga data.", "Calendar visar deltagaren på rätt datum.", "Att ladda om en undersida som <code>/dashboard</code> ger inget 404-fel (= prompten från steg 09 har applicerats).", "Utloggning tar mig tillbaka till inloggningssidan utan fel."], "tip_label": "Före officiell go-live", "tip_body": "När du går från intern beta till riktiga användare, gör den här uppstädningen i Supabase: (1) <strong>slå på Confirm email igen</strong> i Authentication → Providers (så nya registreringar måste bekräfta sin mejl); (2) <strong>rotera DB-lösenordet</strong> i Project Settings → Database (byt ut det du sparade i steg 03); (3) ta bort <strong>testadministratören</strong> och skapa de riktiga; (4) ta en <strong>backup</strong> av databasen (Project Settings → Database → Backups). Tjugo minuters arbete som räddar din rygg hundra gånger."}], "conclusion_label": "Avslutning", "conclusion_title_html": "En plattform <em>som är din</em>, på 7 språk, utan handskriven kod", "conclusion_body": "Visual Studio Code öppnar filerna. AI-assistenten skriver koden. GitHub Desktop synkar online. Supabase förvarar datan. Netlify ställer webbplatsen i skyltfönstret. Du orkestrerar helheten och behåller besluten som spelar roll: namn, färger, texter, automatiserade dokument, språk. Det är Vibe Coding Workflow™: noll handskrivna kodrader, men resultatet är en plattform som är 100 % din.", "tags": ["Vibe Coding", "Pessoa Academy", "Managemob", "VS Code", "Gemini Code Assist", "GitHub Desktop", "Supabase", "Netlify", "Erasmus+", "Utbildningsmobilitet"], "footer_creator": "© Pessoa Academy", "footer_brand": "Managemob × Vibe Coding Workflow™"}};
  const ORDER = ["it", "en", "es", "fr", "de", "pt", "sv"];
  const NAMES = {"it": "Italiano", "en": "English", "es": "Español", "fr": "Français", "de": "Deutsch", "pt": "Português", "sv": "Svenska"};

  function $(sel) { return document.querySelector(sel); }
  function $all(sel) { return Array.from(document.querySelectorAll(sel)); }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // Render an inline action that may contain trusted HTML (the content
  // dictionaries supply pre-marked-up strings with <strong>, <code>, <em>,
  // <br>). We pass them through unchanged.
  function actionHtml(s) { return s; }

  function renderStep(step, loc) {
    const subsections = (step.subsections || []).map(sub => {
      const items = sub.items.map(it => `<li>${actionHtml(it)}</li>`).join('');
      return `
        <div class="subsec">
          <div class="subsec-title">${escapeHtml(sub.title)}</div>
          <ol class="actions">${items}</ol>
        </div>`;
    }).join('');

    const actions = (step.actions || []).map(a => `<li>${actionHtml(a)}</li>`).join('');
    const actionsBlock = step.actions
      ? `<div class="actions-label">${escapeHtml(loc.actions)}</div>
         <ol class="actions">${actions}</ol>`
      : '';

    const promptBlock = step.prompt_body
      ? `<div class="prompt-box" data-label="${escapeHtml(step.prompt_label || loc.prompt)}">
           <div class="prompt-text">${actionHtml(step.prompt_body)}</div>
         </div>`
      : '';

    const tipBlock = step.tip_body
      ? `<div class="tip-box">
           <span class="tip-label">${escapeHtml(step.tip_label || loc.tip)}</span>
           ${actionHtml(step.tip_body)}
         </div>`
      : '';

    const checklistBlock = step.checklist
      ? `<div class="checklist-box">
           <div class="checklist-label">${escapeHtml(loc.checklist)}</div>
           <ul class="checklist-list">
             ${step.checklist.map(c => `<li>${actionHtml(c)}</li>`).join('')}
           </ul>
         </div>`
      : '';

    return `
      <section class="step" id="step-${step.n}">
        <div class="step-head">
          <div class="step-num">${escapeHtml(step.n)}</div>
          <div class="step-meta">
            <div class="step-label">${escapeHtml(step.label)}</div>
            <h2 class="step-title">${actionHtml(step.title_html)}</h2>
          </div>
        </div>
        <div class="step-body">
          <div class="why-block">
            <div class="why-label">${escapeHtml(loc.why)}</div>
            <div class="why-text">${actionHtml(step.why)}</div>
          </div>
          ${actionsBlock}
          ${subsections}
          ${promptBlock}
          ${tipBlock}
          ${checklistBlock}
        </div>
      </section>`;
  }

  function renderNav(content) {
    const items = content.steps.map(s => `
      <li class="nav-item" data-target="step-${s.n}">
        <span class="nav-num">${escapeHtml(s.n)}</span>
        <span class="nav-text">${escapeHtml(s.label)}</span>
      </li>
    `).join('');
    return `
      <div class="sidebar-eyebrow">${escapeHtml(content.lang_switch_label || 'Index')}</div>
      <ul class="nav-list">${items}</ul>
      <div class="sidebar-foot">
        ${escapeHtml(content.footer_creator)}<br>
        ${escapeHtml(content.footer_brand)}
      </div>
    `;
  }

  let currentLang = 'it';

  const PDF_LABELS = {
    it: 'Scarica PDF', en: 'Download PDF', es: 'Descargar PDF',
    fr: 'Télécharger PDF', de: 'PDF herunterladen', pt: 'Descarregar PDF',
    sv: 'Ladda ner PDF',
  };

  const BACK_LABELS = {
    it: 'Torna a Managemob',
    en: 'Back to Managemob',
    es: 'Volver a Managemob',
    fr: 'Retour à Managemob',
    de: 'Zurück zu Managemob',
    pt: 'Voltar para Managemob',
    sv: 'Tillbaka till Managemob',
  };

  function downloadPDF() {
    const btn = $('#pdf-btn');
    const target = document.querySelector('main');
    if (!target || btn.disabled) return;
    btn.disabled = true;
    const originalLabel = $('#pdf-btn-label').textContent;
    $('#pdf-btn-label').textContent = '…';
    const filename = `Managemob-Vibe-Guide-${currentLang.toUpperCase()}.pdf`;
    html2pdf()
      .set({
        margin: [14, 12, 16, 12],
        filename,
        image: { type: 'jpeg', quality: 0.95 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor: '#f5f0e8', windowWidth: 900 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true },
        pagebreak: {
          mode: ['css', 'legacy'],
          avoid: ['.why-block', '.tip-box', '.checklist-box', '.subsec', 'code.code-block', '.actions li', '.prompt-box', '.step-head'],
        },
      })
      .from(target)
      .save()
      .then(() => {
        btn.disabled = false;
        $('#pdf-btn-label').textContent = originalLabel;
      })
      .catch(() => {
        btn.disabled = false;
        $('#pdf-btn-label').textContent = originalLabel;
      });
  }

  function applyLang(lang) {
    const c = DATA[lang];
    if (!c) return;
    currentLang = lang;
    document.documentElement.lang = lang;
    document.title = c.page_title;
    $('#pdf-btn-label').textContent = PDF_LABELS[lang] || 'PDF';
    $('#pdf-btn').setAttribute('aria-label', PDF_LABELS[lang] || 'Download PDF');
    const backLabel = BACK_LABELS[lang] || 'Back to Managemob';
    $('#back-btn-label').textContent = backLabel;
    $('#back-btn').setAttribute('aria-label', backLabel);

    // Header brand stays static; just switch lang pill state
    $all('.lang-pill').forEach(p => p.classList.toggle('active', p.dataset.lang === lang));

    // Sidebar
    $('#sidebar-inner').innerHTML = renderNav(c);

    // Hero
    $('#hero-eyebrow').textContent = c.hero_eyebrow;
    $('#hero-title').innerHTML = c.hero_title_html;
    $('#hero-body').textContent = c.hero_body;
    $('#creator-line').textContent = c.creator_line;
    $('#tools-line').textContent = c.tools_line;

    // Stats
    $('#stats').innerHTML = c.stats.map(([num, label]) => `
      <div>
        <div class="stat-num">${escapeHtml(num)}</div>
        <div class="stat-label">${escapeHtml(label)}</div>
      </div>
    `).join('');

    // Principle
    $('#principle-label').textContent = c.principle_label;
    $('#principle-title').innerHTML = c.principle_title_html;
    $('#principle-body').textContent = c.principle_body;

    // Steps
    const localized = {
      why: ({it:'Perché lo fai',en:'Why',es:'Por qué',fr:'Pourquoi',de:'Warum',pt:'Porquê',sv:'Varför'})[lang],
      actions: ({it:'Cosa fai',en:'What you do',es:'Qué haces',fr:'Ce que tu fais',de:'Was du tust',pt:'O que fazer',sv:'Vad du gör'})[lang],
      prompt: ({it:'Prompt da incollare',en:'Prompt to paste',es:'Prompt para pegar',fr:'Prompt à coller',de:'Prompt zum Einfügen',pt:'Prompt para colar',sv:'Prompt att klistra in'})[lang],
      tip: ({it:'Suggerimento',en:'Tip',es:'Consejo',fr:'Astuce',de:'Tipp',pt:'Dica',sv:'Tips'})[lang],
      checklist: ({it:'Checklist finale',en:'Final checklist',es:'Lista final',fr:'Checklist finale',de:'Abschlussliste',pt:'Checklist final',sv:'Slutlig checklista'})[lang],
    };

    $('#steps').innerHTML = c.steps.map(s => renderStep(s, localized)).join('');

    // Conclusion
    $('#conclusion-label').textContent = c.conclusion_label;
    $('#conclusion-title').innerHTML = c.conclusion_title_html;
    $('#conclusion-body').textContent = c.conclusion_body;

    // Tags
    $('#tags').innerHTML = c.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');

    // Footer
    $('#footer-creator').textContent = c.footer_creator;
    $('#footer-brand').textContent = c.footer_brand;

    // Wire nav clicks
    $all('.nav-item').forEach(it => {
      it.addEventListener('click', () => {
        const target = document.getElementById(it.dataset.target);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // Wire checklist toggle
    $all('.checklist-list li').forEach(li => {
      li.addEventListener('click', () => li.classList.toggle('checked'));
    });

    // Persist language
    try { localStorage.setItem('mm_lang', lang); } catch (e) {}
    // Update URL hash for share
    if (location.hash !== '#' + lang) history.replaceState(null, '', '#' + lang);

    // Reset scroll-spy active item to first
    setActiveNav('step-01');
  }

  function setActiveNav(targetId) {
    $all('.nav-item').forEach(n =>
      n.classList.toggle('active', n.dataset.target === targetId)
    );
  }

  // Scroll spy
  function initScrollSpy() {
    const observer = new IntersectionObserver((entries) => {
      let topMost = null;
      entries.forEach(en => {
        if (en.isIntersecting) {
          if (!topMost || en.boundingClientRect.top < topMost.boundingClientRect.top) {
            topMost = en;
          }
        }
      });
      if (topMost) setActiveNav(topMost.target.id);
    }, { rootMargin: '-100px 0px -60% 0px' });

    $all('.step').forEach(s => observer.observe(s));
  }

  function init() {
    // Wire PDF button
    $('#pdf-btn').addEventListener('click', downloadPDF);

    // Build language pill bar
    const ls = $('#lang-switch');
    ls.innerHTML = ORDER.map(l => `<button class="lang-pill" data-lang="${l}">${l.toUpperCase()}</button>`).join('');
    ls.addEventListener('click', (e) => {
      const btn = e.target.closest('.lang-pill');
      if (!btn) return;
      applyLang(btn.dataset.lang);
      // Re-init scroll spy since DOM was rebuilt
      initScrollSpy();
    });

    // Determine starting lang: hash > localStorage > navigator > 'it'
    let lang = (location.hash || '').replace('#', '');
    if (!DATA[lang]) {
      try { lang = localStorage.getItem('mm_lang') || ''; } catch (e) { lang = ''; }
    }
    if (!DATA[lang]) {
      const navLang = (navigator.language || 'it').slice(0, 2);
      lang = DATA[navLang] ? navLang : 'it';
    }
    applyLang(lang);
    initScrollSpy();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
</body>
</html>
