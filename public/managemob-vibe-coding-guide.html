 y una contraseña fuerte. <strong>Guarda la contraseña</strong> en un sitio seguro: no se recupera, y eventualmente te hará falta más adelante.", "Espera 1-2 minutos. Supabase está preparándote un espacio dedicado. Es normal que el panel quede inactivo unos segundos — no se ha colgado.", "En la barra lateral izquierda pulsa <strong>Project Settings → API</strong>. Encuentras dos valores escritos en claro: <strong>Project URL</strong> (una dirección que empieza por <em>https://</em>) y <strong>anon public key</strong> (una cadena larga). Copia los dos en un bloc de notas temporal: los necesitas en un momento, en el paso 04. Nada técnico — solo dos copia-pega.", "Sigue en la barra lateral, ve a <strong>Authentication → Providers</strong>. Verifica que <strong>Email</strong> esté activo (suele estarlo por defecto). Para las pruebas, desactiva <em>Confirm email</em>: así, cuando crees tu usuario en el siguiente paso, no tendrás que ir al correo a confirmar nada. Lo reactivarás antes de pasar a producción real (lo verás en el paso 10).", "Sidebar → <strong>Authentication → Users → Add user → Create new user</strong>. Crea tu primer acceso de administrador: un email y una contraseña que recuerdes. Es el usuario con el que entrarás en el paso 05 para probar el sitio."], "prompt_label": "Prompt para pegar en el asistente IA"}, {"n": "04", "label": "CONFIGURAR EL PROYECTO", "title_html": "Deja que el <em>asistente IA</em> conecte todo", "why": "Ahora el sitio sabe que existe un almacén Supabase, pero todavía no tiene las credenciales para hablar con él, y el almacén está vacío. En este paso el asistente IA hace por ti tres cosas técnicas de un tirón: guarda tus credenciales en el sitio correcto, llena la base de datos con las tablas de la app y activa la seguridad. Tú pegas un único prompt y dices \"sí\" cuando te pida confirmación.", "actions": ["Abre el chat del asistente IA dentro de Visual Studio Code (en Gemini Code Assist es el icono de estrella en la barra lateral; en Cursor pulsa <code>Ctrl+L</code> / <code>Cmd+L</code>). Si ves una opción tipo <em>Agent mode</em> o <em>@workspace</em>, actívala: significa que la IA puede ver y modificar los archivos del proyecto.", "Copia este prompt entero (ya está escrito, no hace falta entender cada palabra) y pégalo en el chat de la IA:", "<code class=\"code-block\">Configura el proyecto Managemob con estas credenciales de Supabase:<br>URL = https://&lt;tu-proyecto&gt;.supabase.co<br>KEY = &lt;tu anon key&gt;<br><br>Por favor haz tres cosas: (1) crea el archivo .env con estas dos variables (VITE_SUPABASE_URL y VITE_SUPABASE_ANON_KEY) y asegúrate de que .env esté en .gitignore para que no termine en GitHub; (2) ejecuta el archivo supabase/schema.sql contra mi base de datos Supabase para crear las tablas de la app; (3) activa Row Level Security en todas las tablas, para que solo los usuarios autenticados puedan leer y escribir. Muéstrame paso a paso qué vas a hacer y pídeme confirmación antes de aplicar.</code>", "Sustituye <em>https://&lt;tu-proyecto&gt;.supabase.co</em> y <em>&lt;tu anon key&gt;</em> por los dos valores que copiaste del dashboard Supabase en el paso 03. Pulsa Enter.", "La IA te muestra cada operación una a una: \"Voy a crear el archivo .env, ¿ok?\", \"Voy a ejecutar este SQL, ¿ok?\", \"Voy a activar la seguridad, ¿ok?\". A cada pregunta responde <strong>sí</strong> (o acepta el diff). Cuando te diga que ha terminado, estás listo: el sitio está conectado a Supabase, la base de datos tiene las tablas, la seguridad está activa — y todo sin que hayas tocado un solo archivo a mano."], "tip_label": "Si la IA pide hacer algo que no entiendes", "tip_body": "Está perfectamente bien decirle \"explícame qué vas a hacer en español sencillo, antes de hacerlo\". Ese es su trabajo — no necesitas estudiar SQL ni variables de entorno para acabar esta guía. Si te parece que está haciendo algo raro (ej. borrar archivos que no vienen al caso), dile \"para, no he dado el ok\" y vuelve a intentar con instrucciones más precisas."}, {"n": "05", "label": "PRUEBA EN TU ORDENADOR", "title_html": "Ejecuta el sitio <em>en local</em>", "why": "Antes de meter el sitio online, conviene probarlo en tu ordenador. Es el momento en que descubres si Supabase está bien conectado, si el login funciona, si los datos se guardan de verdad. Si algo falla lo ves aquí — sin hacer daño a nadie.", "actions": ["En VS Code abre el chat del asistente IA y pega: <code>Arranca el sitio en local para verlo en el navegador</code>. La IA ejecutará el comando correcto (es <code>npm run dev</code>, por si te interesa). Si prefieres hacerlo a mano, abre el Terminal (<em>View → Terminal</em>), escribe <code>npm run dev</code> y pulsa Enter.", "En el terminal aparecerá una línea tipo <code>➜ Local: http://localhost:XXXX</code>. Abre esa dirección en el navegador (suele ser <code>http://localhost:3000</code>; si el puerto está ocupado, Vite elige otro y te lo muestra). Si la IA lo ha arrancado por ti, te dice la dirección directamente en el chat.", "Verás la pantalla de login. Entra con email y contraseña del administrador creado en el paso 03. Si te dice \"Invalid login credentials\", pídele a la IA: <code>El login no funciona, revisa las credenciales Supabase</code>. Casi siempre es un valor mal copiado o un espacio de más.", "Una vez dentro, prueba a crear un participante de prueba desde la home (basta con nombre, apellido, país de destino). Guarda, luego pulsa <code>F5</code> para recargar: si el participante sigue ahí, la base de datos online está guardando de verdad.", "Pulsa el selector de idioma (arriba, tanto en el login como en la sidebar): la interfaz tiene que cambiar de idioma al instante en los 7 idiomas. Si falta alguna traducción o ves algo raro, te das cuenta aquí."], "prompt_label": "Si algo falla, prompt útil", "prompt_body": "\"Si algo no funciona al arrancar el sitio, dime qué pone el terminal y propón una corrección sencilla. No modifiques archivos sin preguntarme antes.\""}, {"n": "06", "label": "TRADUCE LOS TEXTOS", "title_html": "Personaliza en <em>7 idiomas</em>", "why": "Managemob ya habla 7 idiomas de serie. Tú no tienes que traducir desde cero — solo reescribir los textos visibles (etiquetas, títulos, frases en los botones) para adaptarlos a TU organización, y de forma natural en cada idioma. Lo hace el asistente IA con un solo prompt: tú eliges el tono, la IA lo aplica a los 7 archivos de una vez.", "actions": ["En VS Code abre el chat del asistente IA. No tienes que abrir los 7 archivos de idioma uno por uno — él se encarga.", "Pega este prompt (sustituyendo \"Pessoa Academy\" por el nombre de tu organización y describiendo el tono que quieres):", "<code class=\"code-block\">Reescribe todos los textos visibles de la app para la marca 'Pessoa Academy', con un tono cálido y profesional (cambia esto si quieres otro estilo). Abre los 7 archivos en src/locales/ (it.ts, en.ts, es.ts, fr.ts, de.ts, pt.ts, se.ts), modifica solo los valores (las cadenas entre comillas), no toques las claves (los nombres antes de los dos puntos). Traduce de forma natural en cada idioma, no palabra por palabra. Muéstrame el diff antes de aplicar.</code>", "La IA te propone todos los cambios en una única revisión. Recorre el diff: si te gustan las frases, acepta. Si quieres otro tono (más formal, más juvenil, menos corporativo), dile, por ejemplo, \"reescribe más formal, tratando de usted\" y te lo rehace."], "prompt_label": "Prompt para pegar en el asistente IA", "tip_label": "Añadir un 8º idioma", "tip_body": "¿Quieres un idioma extra (ej. polaco)? Pídele a la IA: <em>\"Añade el polaco como octavo idioma de la app, copiando de en.ts y traduciendo. Añade también la bandera en el selector de idioma.\"</em> Lo hace en 30 segundos, sin que tengas que tocar código."}, {"n": "07", "label": "LOGO Y COLORES", "title_html": "Pon tu <em>identidad visual</em>", "why": "El aspecto es lo primero que ven tus usuarios. Cambiando logo, colores y título del sitio, Managemob deja de llamarse Managemob y se convierte visiblemente en TU plataforma. Son cambios puramente estéticos — la lógica sigue intacta — pero cambian completamente la percepción.", "actions": ["Prepara tu logo como archivo <code>logo.svg</code> (preferido, vectorial, escala perfecto a cualquier tamaño) o <code>logo.png</code> (formato cuadrado, mínimo 256×256 píxeles, fondo transparente). Arrastra el archivo a la carpeta <code>public/</code> del proyecto en VS Code: verás aparecer el nuevo icono en el Explorer.", "Decide tus dos colores: <strong>primario</strong> (el color principal de la app, ej. el azul de tu organización) y <strong>acento</strong> (un complementario para detalles y botones). Si no tienes paleta lista, ve a <a href=\"https://coolors.co\" target=\"_blank\" rel=\"noopener\">coolors.co</a>, juega hasta que te guste y anota los dos códigos hexadecimales (ej. #1D72B8 y #38BDF8).", "Abre el chat de la IA y pega este prompt (sustituyendo nombre de la organización y códigos de color):", "<code class=\"code-block\">Rebrand completo de la app para mi organización 'Pessoa Academy'. (1) Sustituye el logo placeholder 'M' con el archivo public/logo.svg en Sidebar.tsx y Login.tsx. (2) Actualiza los colores en src/styles/main.css: --primary = #XXXXXX, --accent = #YYYYYY. (3) Cambia el título del sitio (pestaña del navegador) a 'Pessoa Academy' en index.html, y haz que el favicon apunte a mi nuevo logo. (4) Sustituye la palabra 'Managemob' por 'Pessoa Academy' en los textos visibles de los 7 archivos en src/locales/. Muéstrame el diff antes de aplicar.</code>", "La IA propone todos los cambios. Apruébalos. Recarga el navegador en <code>localhost:3000</code>: ya ves tu identidad visual aplicada."], "prompt_label": "Prompt para pegar en el asistente IA"}, {"n": "08", "label": "PLANTILLAS WORD", "title_html": "Automatiza tus <em>documentos</em>", "why": "Una de las cosas más potentes de Managemob: coges un documento Word cualquiera (Learning Agreement, Europass Mobility, contrato de movilidad...) y lo conviertes en una plantilla que se rellena automáticamente con los datos del participante que selecciones. Adiós al copia-pega manual: 50 participantes, 50 documentos, 30 segundos.", "actions": ["Abre el documento Word que quieres automatizar en Microsoft Word, LibreOffice o Google Docs. Si está en PDF o es un escaneo, primero tendrás que reconstruirlo como <code>.docx</code> — la app solo acepta archivos .docx.", "Localiza los puntos donde van datos variables (nombre del participante, fechas, empresa de acogida, país...) y sustitúyelos por etiquetas entre llaves. Ejemplos prácticos:<br>[Nombre] [Apellido] → <code>{name} {surname}</code><br>[Fecha de inicio] → <code>{arrival_date}</code><br>[Email] → <code>{email}</code><br>[Empresa de acogida] → <code>{host_company_name}</code>. La lista completa de etiquetas disponibles está en la página <em>Documentos</em> de la app, en \"Export Placeholders\".", "Guarda en formato <strong>.docx</strong> (no .doc, no .pdf, no Google Docs). Desde Word: <em>Guardar como → Documento de Word (*.docx)</em>.", "En la app Managemob: <em>Documentos → Cargar Plantilla</em>. Pon nombre a la plantilla (ej. \"Learning Agreement ES\"), elige el archivo .docx, confirma. La plantilla aparece en la lista.", "Selecciónala, busca y marca uno o varios participantes en la lista, pulsa <strong>Generar</strong>. Para un solo participante descargas un archivo único; para varios, un ZIP con un documento por persona. El formato (negrita, cursiva, tablas) se conserva: la app solo sustituye las etiquetas."], "tip_label": "Reglas importantes de las etiquetas", "tip_body": "Las etiquetas distinguen mayúsculas: escribe <code>{name}</code>, no <code>{Name}</code>. Sin espacios dentro de las llaves (<code>{ name }</code> no funciona). Las etiquetas inexistentes se quedan como texto literal (\"{nombreErrado}\"): si tu documento generado todavía tiene llaves, has escrito mal el nombre del campo. Para la lista exacta entra en <em>Documentos → Export Placeholders (CSV)</em>."}, {"n": "09", "label": "PUBLICAR ONLINE", "title_html": "Pon el sitio <em>en Netlify</em>", "why": "De momento el sitio solo corre en tu ordenador y nadie más lo ve. Para compartirlo con el mundo lo subes a Netlify, gratis, conectado directamente con tu repositorio GitHub. Desde ese momento, cada vez que subas cambios a GitHub, Netlify reconstruirá el sitio y lo redistribuirá automáticamente — nada de FTP, nada de comandos de despliegue, nada de nada.", "subsections": [{"title": "A · Sube los cambios a GitHub (con GitHub Desktop)", "items": ["Abre GitHub Desktop. Si has modificado archivos (y después de los pasos 06-07 lo has hecho de sobra), arriba a la izquierda ves la lista de archivos cambiados con un diff en colores (verde = añadido, rojo = quitado).", "Abajo a la izquierda hay un campo para el mensaje de guardado: escribe una descripción breve de lo que has hecho (ej. \"Personalización Pessoa Academy: logo, colores, textos\"). Pulsa <strong>Commit to main</strong>: has sellado un punto de guardado.", "Arriba, pulsa <strong>Push origin</strong>. Tus cambios viajan a tu repositorio GitHub — por fin con copia de seguridad, por fin listos para Netlify."]}, {"title": "B · Publica en Netlify (conectado a tu repositorio)", "items": ["Ve a <a href=\"https://netlify.com\" target=\"_blank\" rel=\"noopener\">netlify.com</a> e inicia sesión (la vía rápida es <em>Sign up with GitHub</em>). Dashboard → <strong>Add new site → Import an existing project → Deploy with GitHub</strong>.", "La primera vez Netlify te pide permiso para leer tus repositorios — acepta. Luego selecciona de la lista el <strong>fork</strong> creado en el paso 02.", "Netlify reconoce automáticamente que es un proyecto Vite y propone los ajustes correctos. Solo verifica que ponga: <em>Build command:</em> <code>npm run build</code> · <em>Publish directory:</em> <code>dist</code> · <em>Branch:</em> <code>main</code>.", "Abre <strong>Show advanced → Add environment variable</strong>. Añade las DOS variables que la IA puso en tu <code>.env</code> en el paso 04: <code>VITE_SUPABASE_URL</code> y <code>VITE_SUPABASE_ANON_KEY</code> (con los mismos valores). Sin estas, la app online no sabrá cómo hablar con Supabase.", "Pulsa <strong>Deploy</strong>. El primer build dura 1-3 minutos — puedes ver el log en directo. Cuando ponga \"Site is live\", has terminado.", "Netlify te da una dirección aleatoria tipo <code>https://&lt;palabras-extranas-123&gt;.netlify.app</code>. <strong>¡Ese es tu sitio online!</strong> Desde <em>Site settings → Change site name</em> puedes renombrarla (ej. <code>pessoa-mobility.netlify.app</code>); desde <em>Domain management</em> puedes conectar un dominio propio si lo tienes (ej. <code>mobility.pessoa-academy.com</code>)."]}], "prompt_label": "Prompt para pegar en el asistente IA", "prompt_body": "\"Añade al proyecto la configuración que hace que todas las páginas internas funcionen correctamente cuando el sitio está online en Netlify (de modo que, si recargo una página como /dashboard, no vea el error 404 Not Found). Muéstrame el archivo antes de crearlo.\""}, {"n": "10", "label": "CONTROL FINAL", "title_html": "Estás <em>online</em>, última verificación", "why": "Estás online. Antes de abrir el sitio a usuarios reales, comprobamos que todo funcione desde la URL pública de Netlify (no desde localhost). Son 7 comprobaciones rápidas: si pasan todas, lanzas. Si alguna falla, todavía hay tiempo para arreglarlo — sin que nadie se entere.", "checklist": ["El login desde la URL pública Netlify funciona (con el administrador creado en el paso 03).", "El selector de idioma muestra los 7 idiomas y los textos cambian de verdad cuando los pulso.", "Añado un participante de prueba, pulso F5: si sigue ahí, la base de datos online está guardando.", "Genero un documento Word para un participante: las etiquetas <code>{name}</code> etc. del archivo descargado están sustituidas por datos reales.", "El Calendar muestra el participante en las fechas correctas.", "Recargar una sub-página como <code>/dashboard</code> no da error 404 (= se ha aplicado el prompt del paso 09).", "El logout me devuelve a la pantalla de login sin errores."], "tip_label": "Antes del lanzamiento oficial", "tip_body": "Cuando pases del beta interno a usuarios reales, haz esta limpieza en Supabase: (1) <strong>reactiva Confirm email</strong> en Authentication → Providers (así los nuevos registros tienen que confirmar su email); (2) <strong>rota la contraseña de la BD</strong> en Project Settings → Database (cambia la contraseña que guardaste en el paso 03); (3) borra el <strong>administrador de prueba</strong> y crea los reales; (4) haz un <strong>backup</strong> de la base de datos (Project Settings → Database → Backups). Veinte minutos de trabajo que te salvarán el cuello cien veces."}], "conclusion_label": "Conclusión", "conclusion_title_html": "Una plataforma <em>tuya</em>, en 7 idiomas, sin código a mano", "conclusion_body": "Visual Studio Code abre los archivos. El asistente IA escribe el código. GitHub Desktop sincroniza online. Supabase guarda los datos. Netlify pone el sitio en el escaparate. Tú orquestas el conjunto y te quedas las decisiones que importan: nombre, colores, textos, documentos automatizados, idiomas. Es el Vibe Coding Workflow™: cero líneas de código escritas a mano, pero el resultado es una plataforma 100% tuya.", "tags": ["Vibe Coding", "Pessoa Academy", "Managemob", "VS Code", "Gemini Code Assist", "GitHub Desktop", "Supabase", "Netlify", "Erasmus+", "Movilidad formativa"], "footer_creator": "© Pessoa Academy", "footer_brand": "Managemob × Vibe Coding Workflow™"}, "fr": {"lang": "fr", "page_title": "Procédure pas à pas pour créer votre propre version personnalisée de la plateforme", "doc_title": "Créez votre version de Managemob", "doc_subtitle": "Procédure pas à pas, en 7 langues, sans écrire de code.", "creator_line": "Un guide de Pessoa Academy · Vibe Coding Workflow™", "tools_line": "Visual Studio Code + assistant IA gratuit + GitHub Desktop + Supabase + Netlify", "hero_eyebrow": "Vibe Coding Workflow™", "hero_title_html": "Procédure <em>pas à pas</em> pour créer votre version personnalisée de la plateforme", "hero_body": "Managemob est une plateforme pour gérer les mobilités formatives (Erasmus+, ESC, échanges). Ce guide vous accompagne étape par étape pour créer VOTRE version personnalisée : logo, couleurs, textes dans vos langues, documents automatisés. Pas besoin de savoir coder : l'IA tape, vous décidez.", "stats": [["10", "étapes"], ["7", "langues prêtes"], ["0", "ligne écrite à la main"], ["~2 h", "temps moyen"]], "principle_label": "Principe Vibe Coding", "principle_title_html": "Vous êtes le <em>metteur en scène</em>, l'IA est le dactylographe", "principle_body": "Tout le guide repose sur une seule idée : vous décrivez ce que vous voulez en langage naturel, l'assistant IA écrit le code dans votre éditeur. Quand vous voyez une section PROMPT, copiez la phrase et collez-la dans le chat de l'assistant IA dans Visual Studio Code.", "lang_switch_label": "Langue", "steps": [{"n": "01", "label": "AVANT DE COMMENCER", "title_html": "Préparez votre <em>boîte à outils</em>", "why": "Avant d'écrire quoi que ce soit, il vous faut une poignée d'outils, tous gratuits et désormais standard dans le monde du logiciel. Ce ne sont pas des applis au hasard : chacune a un rôle bien précis et s'emboîte avec les autres. Imaginez un atelier — <strong>GitHub</strong> est l'entrepôt en ligne, <strong>Visual Studio Code</strong> l'établi où vous ouvrez les fichiers, l'<strong>assistant IA</strong> votre apprenti qui écrit le code sous votre dictée, <strong>GitHub Desktop</strong> le chariot qui transporte les choses entre l'entrepôt et l'établi, <strong>Supabase</strong> le dépôt des données, <strong>Netlify</strong> le projecteur qui met tout en vitrine. Aujourd'hui : inscriptions et installations seulement. Pas une ligne de code.", "actions": ["Allez sur <strong>github.com</strong> et créez un compte gratuit (un email suffit). GitHub est le journal où chaque modification de votre code est datée et sauvegardée : si vous vous trompez, vous revenez à hier après-midi en un clic. Désormais, c'est l'ancrage auquel tout le reste va se rattacher.", "Téléchargez <strong>Visual Studio Code</strong> sur <a href=\"https://code.visualstudio.com\" target=\"_blank\" rel=\"noopener\">code.visualstudio.com</a> (Windows/Mac/Linux, ~100 Mo). C'est le programme avec lequel vous ouvrez, lisez et modifiez les fichiers du projet — voyez-le comme Word, mais pour du code. À la première ouverture il a l'air d'un éditeur de texte banal : la magie arrive à l'étape suivante, quand on lui greffe l'IA par-dessus.", "Dans VS Code, cliquez sur l'icône <em>Extensions</em> dans la barre latérale gauche (quatre carrés, raccourci <code>Ctrl+Shift+X</code> sur Windows/Linux, <code>Cmd+Shift+X</code> sur Mac). Cherchez un assistant IA gratuit : le plus simple est <strong>Gemini Code Assist</strong> de Google, mais <strong>Codeium</strong>, <strong>Continue</strong> ou <strong>Cody</strong> font aussi très bien l'affaire. Installez-le et connectez-vous avec un compte Google : à partir de maintenant vous avez un chat à l'intérieur de VS Code à qui donner des consignes en français courant.", "Téléchargez <strong>GitHub Desktop</strong> sur <a href=\"https://desktop.github.com\" target=\"_blank\" rel=\"noopener\">desktop.github.com</a> et connectez-vous avec le même compte qu'au point 1. C'est une appli qui fait le pont entre votre ordinateur et GitHub : en deux clics vos modifications locales filent dans le cloud (commit + push). Sans elle, il faudrait apprendre les commandes Git en ligne de commande — on s'en passe.", "Allez sur <strong>supabase.com</strong> et inscrivez-vous (avec Google ou GitHub c'est plus rapide). Supabase est l'entrepôt en ligne où votre appli stockera tout : utilisateurs, participants, mobilités, documents téléchargés. Pour l'instant il suffit d'avoir le compte ouvert — le projet réel, vous le créerez à l'étape 03, quand on aura besoin de ses identifiants.", "Allez sur <strong>netlify.com</strong> et inscrivez-vous — \"Sign up with GitHub\" est le chemin le plus rapide, les deux services se parleront automatiquement. Netlify, c'est ce qui transforme votre code en un site web accessible à tout le monde sur internet, gratuitement. Aucun serveur à configurer, pas de FTP, rien : il recompile et republie tout seul à chaque fois que vous poussez sur GitHub.", "Téléchargez <strong>Node.js</strong> en version <strong>LTS</strong> (Long Term Support, la version stable) sur <a href=\"https://nodejs.org\" target=\"_blank\" rel=\"noopener\">nodejs.org</a>. Node.js est le moteur qui fait tourner le site sur votre ordinateur pendant que vous le testez : sans lui, à l'étape 05 la commande <code>npm run dev</code> ne saurait pas quoi exécuter. L'installation est guidée — Suivant, Suivant, Terminé."], "tip_label": "Pas d'inquiétude pour les coûts", "tip_body": "Tous ces outils sont gratuits pour un usage personnel : aucune carte bancaire demandée pour commencer. Si à un moment on vous en demande une — arrêtez-vous et vérifiez : vous êtes sur le point d'activer une formule payante par erreur, et rien dans ce guide n'en a besoin."}, {"n": "02", "label": "FORK & CLONE", "title_html": "Faites votre <em>copie personnelle</em> du projet", "why": "\"Forker\", c'est faire une copie personnelle du projet Managemob sur GitHub : vous travaillez sur votre copie, l'original reste intact. \"Cloner\", c'est télécharger cette copie sur votre ordinateur pour l'ouvrir dans VS Code. Deux clics et une commande, et à la fin de cette étape vous avez le vrai projet sur votre disque, prêt à démarrer.", "actions": ["Allez sur la page GitHub du template Managemob — par ex. <a href=\"https://github.com/ETN-International/managemob-app\" target=\"_blank\" rel=\"noopener\">github.com/ETN-International/managemob-app</a>, ou l'URL du template qui vous a été fournie. En haut à droite, cliquez <strong>Fork</strong> : GitHub vous demande à quel compte attribuer la copie (le vôtre) et quel nom lui donner. Choisissez quelque chose de court et en minuscules, du genre <em>pessoa-mobility</em>. En quelques secondes la copie est à vous.", "Sur la page de votre nouveau fork, cliquez le bouton vert <strong>&lt;&gt; Code</strong> en haut à droite. Un menu s'ouvre : choisissez <strong>Open with GitHub Desktop</strong>. Le navigateur vous demandera l'autorisation de lancer l'appli — acceptez.", "GitHub Desktop vous propose un dossier local pour enregistrer le projet. Acceptez le chemin par défaut ou choisissez-en un pratique (par ex. <em>Documents</em> ou <em>Bureau/Projets</em>) et cliquez <strong>Clone</strong>. En quelques secondes tous les fichiers du projet sont sur votre ordinateur.", "En haut à droite dans GitHub Desktop, cliquez <strong>Open in Visual Studio Code</strong> : VS Code s'ouvre avec le bon dossier déjà chargé. À gauche, l'<em>Explorer</em> montre toute la structure du projet.", "Ouvrez le chat de l'assistant IA dans VS Code et collez ce prompt : <code>Installe les dépendances du projet</code>. L'IA téléchargera pour vous toutes les bibliothèques dont le projet dépend (deux ou trois minutes). Quand elle vous dit qu'elle a fini sans erreur, vous êtes prêt pour l'étape suivante."], "prompt_label": "Prompt à coller dans l'assistant IA", "prompt_body": "\"Explique-moi en un paragraphe ce que contient le dossier src/ — quels sont les sous-dossiers principaux et à quoi sert chacun. Ne modifie rien pour l'instant, je veux juste comprendre la carte du projet.\""}, {"n": "03", "label": "BASE DE DONNÉES SUPABASE", "title_html": "Préparez l'<em>entrepôt de données</em>", "why": "Supabase est l'entrepôt en ligne où l'appli stocke tout : utilisateurs, participants, mobilités, documents. Dans cette étape vous créez votre espace Supabase, vous récupérez les deux identifiants (URL + clé) dont le site a besoin pour lui parler, et vous créez votre premier utilisateur administrateur. Le reste — remplir la base avec les bonnes tables, verrouiller la sécurité — l'assistant IA le fera pour vous à l'étape suivante. Vous, vous cliquez.", "actions": ["Allez sur <a href=\"https://supabase.com\" target=\"_blank\" rel=\"noopener\">supabase.com</a>, connectez-vous (ou inscrivez-vous si c'est la première fois) et cliquez <strong>New project</strong>. Choisissez un nom (par ex. <em>pessoa-mobility</em>), une <strong>région en Europe</strong> (Frankfurt, Ireland ou Stockholm — plus c'est proche de vos utilisateurs, plus l'appli sera réactive) et un mot de passe robuste. <strong>Conservez ce mot de passe</strong> dans un endroit sûr : il ne se récupère pas, et vous pourriez en avoir besoin plus tard.", "Patientez 1-2 minutes. Supabase prépare un espace dédié rien que pour vous. C'est normal que le tableau de bord soit inactif quelques secondes — il n'est pas planté.", "Dans la barre latérale gauche, cliquez <strong>Project Settings → API</strong>. Vous trouvez deux valeurs en clair : <strong>Project URL</strong> (une adresse qui commence par <em>https://</em>) et <strong>anon public key</strong> (une longue chaîne de caractères). Copiez les deux dans un bloc-notes provisoire : vous en aurez besoin dans un instant, à l'étape 04. Rien de technique — juste deux copier-coller.", "Toujours dans la barre latérale, allez dans <strong>Authentication → Providers</strong>. Vérifiez que <strong>Email</strong> est activé (c'est généralement le cas par défaut). Pour les tests, désactivez <em>Confirm email</em> : ainsi, quand vous créerez votre utilisateur à l'action suivante, vous n'aurez pas à aller dans votre boîte mail pour cliquer un lien de confirmation. Vous le réactiverez avant le passage en production réelle (voir étape 10).", "Sidebar → <strong>Authentication → Users → Add user → Create new user</strong>. Créez votre premier accès administrateur : un email et un mot de passe que vous retiendrez. C'est l'utilisateur avec lequel vous vous connecterez à l'étape 05 pour tester le site."], "prompt_label": "Prompt à coller dans l'assistant IA"}, {"n": "04", "label": "CONFIGURER LE PROJET", "title_html": "Laissez l'<em>assistant IA</em> tout brancher", "why": "Le site sait maintenant qu'il existe un entrepôt Supabase, mais il n'a pas encore les identifiants pour lui parler, et l'entrepôt est vide. Dans cette étape, l'assistant IA fait pour vous trois choses techniques d'un seul coup : il enregistre vos identifiants au bon endroit, remplit la base de données avec les tables de l'appli, et active la sécurité. Vous, vous collez un seul prompt et vous dites \"oui\" quand il vous le demande.", "actions": ["Ouvrez le chat de l'assistant IA dans Visual Studio Code (dans Gemini Code Assist c'est l'icône étoile dans la barre latérale ; dans Cursor, appuyez sur <code>Ctrl+L</code> / <code>Cmd+L</code>). Si vous voyez une option du genre <em>Agent mode</em> ou <em>@workspace</em>, activez-la : ça veut dire que l'IA peut lire et modifier les fichiers du projet.", "Copiez ce prompt en entier (il est déjà rédigé, vous n'avez pas besoin de comprendre chaque mot) et collez-le dans le chat de l'IA :", "<code class=\"code-block\">Configure le projet Managemob avec ces identifiants Supabase :<br>URL = https://&lt;votre-projet&gt;.supabase.co<br>KEY = &lt;votre anon key&gt;<br><br>Trois choses, s'il te plaît : (1) crée le fichier .env avec ces deux variables (VITE_SUPABASE_URL et VITE_SUPABASE_ANON_KEY) et assure-toi que .env est dans .gitignore pour qu'il ne finisse jamais sur GitHub ; (2) exécute le fichier supabase/schema.sql sur ma base de données Supabase pour créer les tables de l'appli ; (3) active Row Level Security sur toutes les tables, pour que seuls les utilisateurs connectés puissent lire et écrire. Montre-moi étape par étape ce que tu vas faire et demande confirmation avant chaque action.</code>", "Remplacez <em>https://&lt;votre-projet&gt;.supabase.co</em> et <em>&lt;votre anon key&gt;</em> par les deux valeurs que vous avez copiées du tableau de bord Supabase à l'étape 03. Appuyez sur Entrée.", "L'IA vous montre chaque opération une par une : \"Je crée le fichier .env, ok ?\", \"J'exécute ce SQL, ok ?\", \"J'active la sécurité, ok ?\". À chaque question, répondez <strong>oui</strong> (ou acceptez le diff). Quand elle vous dit qu'elle a fini, c'est bon : le site est connecté à Supabase, la base contient les tables, la sécurité est active — et tout cela sans que vous ayez touché un seul fichier à la main."], "tip_label": "Si l'IA demande de faire quelque chose que vous ne comprenez pas", "tip_body": "Vous pouvez tout à fait lui dire \"explique-moi en français simple ce que tu vas faire, avant de le faire\". C'est son rôle — vous n'avez pas besoin d'apprendre le SQL ou les variables d'environnement pour finir ce guide. Si quelque chose vous semble bizarre (par ex. elle veut supprimer des fichiers sans rapport), dites \"arrête, je n'ai pas validé\" et reprenez avec des consignes plus précises."}, {"n": "05", "label": "TESTEZ EN LOCAL", "title_html": "Faites tourner le site <em>sur votre ordinateur</em>", "why": "Avant de mettre le site en ligne, il vaut mieux le tester sur votre machine. C'est le moment où vous découvrez si Supabase est bien branché, si la connexion fonctionne, si les données se sauvegardent vraiment. Si quelque chose cloche, vous le voyez ici — sans rien casser pour personne.", "actions": ["Dans VS Code, ouvrez le chat de l'assistant IA et collez : <code>Lance le site en local pour que je le voie dans le navigateur</code>. L'IA exécutera la bonne commande (c'est <code>npm run dev</code>, si ça vous intéresse). Si vous préférez le faire à la main, ouvrez le Terminal (<em>View → Terminal</em>), tapez <code>npm run dev</code> et appuyez sur Entrée.", "Dans le terminal, une ligne du genre <code>➜ Local: http://localhost:XXXX</code> va apparaître. Ouvrez cette adresse dans votre navigateur (en général c'est <code>http://localhost:3000</code> ; si le port est occupé, Vite en choisit un autre et vous le montre). Si l'IA l'a lancé pour vous, elle vous dit l'adresse directement dans le chat.", "Vous verrez l'écran de connexion. Connectez-vous avec l'email et le mot de passe de l'administrateur créé à l'étape 03. S'il vous renvoie \"Invalid login credentials\", demandez à l'IA : <code>La connexion ne fonctionne pas, vérifie les identifiants Supabase</code>. Neuf fois sur dix c'est une valeur mal copiée ou un espace en trop.", "Une fois entré, essayez de créer un participant test depuis l'accueil (juste prénom, nom, pays de destination). Sauvegardez, puis appuyez sur <code>F5</code> pour recharger : si le participant est toujours là, la base de données en ligne enregistre vraiment.", "Cliquez sur le sélecteur de langue (en haut, aussi bien sur la connexion que dans la barre latérale) : l'interface doit changer de langue instantanément dans les 7 langues. S'il manque une traduction ou si quelque chose détonne, vous le repérez ici."], "prompt_label": "Si ça plante, prompt utile", "prompt_body": "\"Si quelque chose ne fonctionne pas quand je lance le site, dis-moi ce qu'il y a dans le terminal et propose une correction simple. Ne modifie aucun fichier sans me demander avant.\""}, {"n": "06", "label": "TRADUISEZ LES TEXTES", "title_html": "Personnalisez en <em>7 langues</em>", "why": "Managemob parle déjà 7 langues par défaut. Vous n'avez pas à traduire depuis zéro — vous devez seulement réécrire les textes visibles (libellés, titres, intitulés de boutons) pour qu'ils correspondent à VOTRE organisation, et de manière naturelle dans chaque langue. L'assistant IA s'en charge avec un seul prompt : vous choisissez le ton, l'IA l'applique aux 7 fichiers d'un coup.", "actions": ["Dans VS Code, ouvrez le chat de l'assistant IA. Vous n'avez pas à ouvrir les 7 fichiers de langue un par un — il s'en occupe.", "Collez ce prompt (en remplaçant \"Pessoa Academy\" par le nom de votre organisation et en décrivant le ton souhaité) :", "<code class=\"code-block\">Réécris tous les textes visibles de l'application pour la marque 'Pessoa Academy', avec un ton chaleureux et professionnel (modifie ceci si tu veux un autre style). Ouvre les 7 fichiers dans src/locales/ (it.ts, en.ts, es.ts, fr.ts, de.ts, pt.ts, se.ts), modifie uniquement les valeurs (les chaînes entre guillemets), ne touche pas aux clés (les noms avant les deux-points). Traduis naturellement dans chaque langue, pas mot à mot. Montre-moi le diff avant d'appliquer.</code>", "L'IA vous propose toutes les modifications dans une seule revue. Parcourez le diff : si les phrases vous plaisent, validez. Si vous voulez un autre ton (plus formel, plus jeune, moins corporate), dites-le simplement — par exemple \"refais en plus formel, en vouvoyant\" — et elle refait le tout."], "prompt_label": "Prompt à coller dans l'assistant IA", "tip_label": "Ajouter une 8e langue", "tip_body": "Vous voulez une langue de plus (ex. polonais) ? Demandez à l'IA : <em>\"Ajoute le polonais comme 8e langue de l'application, en copiant depuis en.ts et en traduisant. Ajoute aussi le drapeau dans le sélecteur de langue.\"</em> Elle le fait en 30 secondes, sans que vous touchiez au code."}, {"n": "07", "label": "LOGO ET COULEURS", "title_html": "Donnez-lui <em>votre identité visuelle</em>", "why": "L'apparence est la première chose que voient vos utilisateurs. En changeant le logo, les couleurs et le titre du site, Managemob arrête de s'appeler Managemob et devient visiblement VOTRE plateforme. Ce sont des changements purement esthétiques — la logique reste intacte — mais ils transforment complètement le ressenti.", "actions": ["Préparez votre logo en fichier <code>logo.svg</code> (préféré, vectoriel, qui s'adapte à toutes les tailles) ou <code>logo.png</code> (format carré, au moins 256×256 pixels, fond transparent). Glissez le fichier dans le dossier <code>public/</code> du projet dans VS Code : vous verrez la nouvelle icône apparaître dans l'Explorer.", "Choisissez vos deux couleurs : la <strong>primaire</strong> (la couleur principale de l'appli, par ex. le bleu de votre organisation) et l'<strong>accent</strong> (une complémentaire pour les détails et les boutons). Si vous n'avez pas de palette toute prête, allez sur <a href=\"https://coolors.co\" target=\"_blank\" rel=\"noopener\">coolors.co</a>, jouez jusqu'à ce que ça vous plaise, et notez les deux codes hexadécimaux (par ex. #1D72B8 et #38BDF8).", "Ouvrez le chat de l'IA et collez ce prompt (en remplaçant le nom de l'organisation et les codes couleur) :", "<code class=\"code-block\">Rebrand complet de l'application pour mon organisation 'Pessoa Academy'. (1) Remplace le placeholder 'M' du logo par le fichier public/logo.svg dans Sidebar.tsx et Login.tsx. (2) Mets à jour les couleurs dans src/styles/main.css : --primary = #XXXXXX, --accent = #YYYYYY. (3) Change le titre du site (onglet du navigateur) en 'Pessoa Academy' dans index.html, et fais pointer la favicon vers mon nouveau logo. (4) Remplace le mot 'Managemob' par 'Pessoa Academy' dans les textes visibles des 7 fichiers de src/locales/. Montre-moi le diff avant d'appliquer chaque changement.</code>", "L'IA propose toutes les modifications. Validez. Rechargez le navigateur sur <code>localhost:3000</code> : votre identité visuelle est déjà appliquée."], "prompt_label": "Prompt à coller dans l'assistant IA"}, {"n": "08", "label": "MODÈLES WORD", "title_html": "Automatisez vos <em>documents</em>", "why": "L'une des choses les plus puissantes de Managemob : vous prenez n'importe quel document Word (Learning Agreement, Europass Mobility, contrat de mobilité…) et vous le transformez en un modèle qui se remplit automatiquement avec les données du participant que vous sélectionnez. La fin du copier-coller manuel : 50 participants, 50 documents, 30 secondes.", "actions": ["Ouvrez le document Word que vous voulez automatiser dans Microsoft Word, LibreOffice ou Google Docs. S'il est en PDF ou s'il s'agit d'une numérisation, il faudra d'abord le reconstruire en <code>.docx</code> — l'appli n'accepte que des fichiers .docx.", "Repérez les endroits où vont les données variables (nom du participant, dates, entreprise d'accueil, pays…) et remplacez-les par des balises entre accolades. Exemples concrets :<br>[Prénom] [Nom] → <code>{name} {surname}</code><br>[Date de début] → <code>{arrival_date}</code><br>[Email] → <code>{email}</code><br>[Entreprise d'accueil] → <code>{host_company_name}</code>. La liste complète des balises disponibles est sur la page <em>Documents</em> de l'appli, en cliquant \"Export Placeholders\".", "Enregistrez au format <strong>.docx</strong> (pas .doc, pas .pdf, pas Google Docs). Depuis Word : <em>Enregistrer sous → Document Word (*.docx)</em>.", "Dans l'appli Managemob : <em>Documents → Charger Modèle</em>. Donnez un nom au modèle (par ex. \"Learning Agreement FR\"), choisissez le fichier .docx, validez. Le modèle apparaît dans la liste.", "Sélectionnez-le, cherchez et cochez un ou plusieurs participants dans la liste, cliquez <strong>Générer</strong>. Pour un seul participant vous récupérez un fichier unique ; pour plusieurs, un ZIP avec un document par personne. La mise en forme (gras, italique, tableaux) est conservée : l'appli ne remplace que les balises."], "tip_label": "Règles importantes des balises", "tip_body": "Les balises sont sensibles à la casse : écrivez <code>{name}</code>, pas <code>{Name}</code>. Pas d'espaces dans les accolades (<code>{ name }</code> ne marche pas). Les balises inconnues restent dans le document en texte brut (\"{nomFaux}\") : si votre document généré a encore des accolades, c'est que vous avez mal orthographié un nom de champ. Pour la liste exacte, allez sur <em>Documents → Export Placeholders (CSV)</em>."}, {"n": "09", "label": "EN LIGNE", "title_html": "Publiez le site <em>sur Netlify</em>", "why": "Pour l'instant le site ne tourne que sur votre machine et personne d'autre ne le voit. Pour le partager avec le monde, vous le mettez sur Netlify, gratuitement, branché directement à votre dépôt GitHub. À partir de ce moment, à chaque fois que vous poussez des modifications sur GitHub, Netlify reconstruit le site et le redistribue automatiquement — pas de FTP, pas de commande de déploiement, rien du tout.", "subsections": [{"title": "A · Envoyez vos modifications sur GitHub (avec GitHub Desktop)", "items": ["Ouvrez GitHub Desktop. Si vous avez modifié des fichiers (et après les étapes 06-07 vous en avez modifié pas mal), en haut à gauche vous voyez la liste des fichiers changés avec un diff colorisé (vert = ajouté, rouge = retiré).", "En bas à gauche, il y a un champ pour le message de sauvegarde : écrivez une description brève de ce que vous avez fait (par ex. \"Personnalisation Pessoa Academy : logo, couleurs, textes\"). Cliquez <strong>Commit to main</strong> : vous avez scellé un point de sauvegarde.", "En haut, cliquez <strong>Push origin</strong>. Vos modifications viennent de monter sur votre dépôt GitHub — enfin sauvegardées, enfin prêtes pour Netlify."]}, {"title": "B · Publiez sur Netlify (relié à votre dépôt)", "items": ["Allez sur <a href=\"https://netlify.com\" target=\"_blank\" rel=\"noopener\">netlify.com</a> et connectez-vous (le plus rapide est <em>Sign up with GitHub</em>). Dashboard → <strong>Add new site → Import an existing project → Deploy with GitHub</strong>.", "La première fois, Netlify vous demande la permission de lire vos dépôts — accordez-la. Puis sélectionnez dans la liste le <strong>fork</strong> que vous avez créé à l'étape 02.", "Netlify détecte automatiquement que c'est un projet Vite et propose les bons réglages. Vérifiez seulement : <em>Build command :</em> <code>npm run build</code> · <em>Publish directory :</em> <code>dist</code> · <em>Branch :</em> <code>main</code>.", "Ouvrez <strong>Show advanced → Add environment variable</strong>. Ajoutez les DEUX variables que l'IA a mises dans votre <code>.env</code> à l'étape 04 : <code>VITE_SUPABASE_URL</code> et <code>VITE_SUPABASE_ANON_KEY</code> (avec les mêmes valeurs). Sans elles, l'appli en ligne ne saura pas comment parler à Supabase.", "Cliquez <strong>Deploy</strong>. Le premier build prend 1-3 minutes — vous pouvez voir le log défiler en direct. Quand il affiche \"Site is live\", c'est terminé.", "Netlify vous donne une adresse aléatoire du genre <code>https://&lt;mots-bizarres-123&gt;.netlify.app</code>. <strong>C'est votre site en ligne !</strong> Depuis <em>Site settings → Change site name</em> vous pouvez la renommer (par ex. <code>pessoa-mobility.netlify.app</code>) ; depuis <em>Domain management</em> vous pouvez brancher votre propre domaine si vous en avez un (par ex. <code>mobility.pessoa-academy.com</code>)."]}], "prompt_label": "Prompt à coller dans l'assistant IA", "prompt_body": "\"Ajoute au projet la configuration qui fait que toutes les pages internes fonctionnent correctement quand le site est en ligne sur Netlify (de sorte que, si je rafraîchis une page comme /dashboard, je n'aie pas l'erreur 404 Not Found). Montre-moi le fichier avant de le créer.\""}, {"n": "10", "label": "VÉRIFICATION FINALE", "title_html": "Vous êtes <em>en ligne</em>, dernière vérification", "why": "Vous êtes en ligne. Avant d'ouvrir le site aux vrais utilisateurs, on vérifie que tout fonctionne depuis l'URL publique de Netlify (et non plus localhost). Sept contrôles rapides : si tous passent, vous lancez. Si l'un échoue, il vous reste le temps de corriger — sans que personne ne s'en aperçoive.", "checklist": ["La connexion depuis l'URL publique Netlify fonctionne (avec l'administrateur créé à l'étape 03).", "Le sélecteur de langue affiche les 7 langues et les textes changent vraiment quand je clique.", "J'ajoute un participant test, j'appuie sur F5 : s'il est toujours là, la base en ligne enregistre.", "Je génère un document Word pour un participant : les balises <code>{name}</code> etc. dans le fichier téléchargé sont remplacées par des données réelles.", "Le Calendar affiche le participant aux bonnes dates.", "Rafraîchir une sous-page comme <code>/dashboard</code> ne donne pas d'erreur 404 (= le prompt de l'étape 09 a été appliqué).", "La déconnexion me ramène sur l'écran de connexion sans erreur."], "tip_label": "Avant le lancement officiel", "tip_body": "Quand vous passez de la bêta interne aux vrais utilisateurs, faites ce ménage dans Supabase : (1) <strong>réactivez Confirm email</strong> dans Authentication → Providers (les nouveaux inscrits devront confirmer leur email) ; (2) <strong>changez le mot de passe de la BD</strong> dans Project Settings → Database (remplacez celui que vous aviez sauvegardé à l'étape 03) ; (3) supprimez l'<strong>administrateur de test</strong> et créez les vrais ; (4) faites une <strong>sauvegarde</strong> de la base (Project Settings → Database → Backups). Vingt minutes de travail qui vous sauveront la mise des dizaines de fois."}], "conclusion_label": "Conclusion", "conclusion_title_html": "Une plateforme <em>à vous</em>, en 7 langues, sans code à la main", "conclusion_body": "Visual Studio Code ouvre les fichiers. L'assistant IA écrit le code. GitHub Desktop synchronise en ligne. Supabase conserve les données. Netlify met le site en vitrine. Vous orchestrez l'ensemble et vous gardez les décisions qui comptent : nom, couleurs, textes, documents automatisés, langues. C'est le Vibe Coding Workflow™ : zéro ligne de code écrite à la main, mais le résultat est une plateforme 100 % à vous.", "tags": ["Vibe Coding", "Pessoa Academy", "Managemob", "VS Code", "Gemini Code Assist", "GitHub Desktop", "Supabase", "Netlify", "Erasmus+", "Mobilité formative"], "footer_creator": "© Pessoa Academy", "footer_brand": "Managemob × Vibe Coding Workflow™"}, "de": {"lang": "de", "page_title": "Schritt-für-Schritt-Anleitung, um Ihre eigene angepasste Version der Plattform zu erstellen", "doc_title": "Erstellen Sie Ihre eigene Version von Managemob", "doc_subtitle": "Schritt-für-Schritt-Anleitung, in 7 Sprachen, ohne Code zu schreiben.", "creator_line": "Eine Anleitung von Pessoa Academy · Vibe Coding Workflow™", "tools_line": "Visual Studio Code + kostenloser KI-Assistent + GitHub Desktop + Supabase + Netlify", "hero_eyebrow": "Vibe Coding Workflow™", "hero_title_html": "Schritt-für-Schritt-<em>Anleitung</em> für Ihre eigene angepasste Version der Plattform", "hero_body": "Managemob ist eine Plattform zur Verwaltung von Bildungsmobilitäten (Erasmus+, ESC, Austauschprogramme). Diese Anleitung führt Sie Schritt für Schritt zu IHRER eigenen, angepassten Version: Logo, Farben, Texte in Ihren Sprachen, automatisierte Dokumente. Sie müssen nicht programmieren können – die KI tippt, Sie entscheiden.", "stats": [["10", "Schritte"], ["7", "Sprachen bereit"], ["0", "handgeschriebene Zeilen"], ["~2 Std.", "Durchschnittszeit"]], "principle_label": "Vibe-Coding-Prinzip", "principle_title_html": "Sie sind der <em>Regisseur</em>, die KI ist der Tippende", "principle_body": "Die ganze Anleitung beruht auf einer Idee: Sie beschreiben in einfachen Worten, was Sie wollen, der KI-Assistent schreibt den Code in Ihrem Editor. Wenn Sie einen PROMPT-Abschnitt sehen, kopieren Sie den Satz und fügen ihn in den Chat des KI-Assistenten in Visual Studio Code ein.", "lang_switch_label": "Sprache", "steps": [{"n": "01", "label": "BEVOR SIE STARTEN", "title_html": "Bereiten Sie Ihren <em>Werkzeugkasten</em> vor", "why": "Bevor Sie irgendetwas schreiben, brauchen Sie eine Handvoll Werkzeuge — alle kostenlos und längst Standard in der Software-Welt. Es sind keine zufälligen Apps: jedes hat eine ganz konkrete Aufgabe und greift in die anderen ein. Stellen Sie sich eine Werkstatt vor — <strong>GitHub</strong> ist das Online-Lager, <strong>Visual Studio Code</strong> die Werkbank, an der Sie die Dateien öffnen, der <strong>KI-Assistent</strong> Ihr Lehrling, der Code nach Diktat schreibt, <strong>GitHub Desktop</strong> der Wagen, der Material zwischen Lager und Werkbank bewegt, <strong>Supabase</strong> das Datenlager, <strong>Netlify</strong> der Scheinwerfer, der alles ins Schaufenster stellt. Heute: nur Anmeldungen und Installationen. Noch keine Zeile Code.", "actions": ["Gehen Sie auf <strong>github.com</strong> und legen Sie ein kostenloses Konto an (eine E-Mail genügt). GitHub ist das Tagebuch, in dem jede Änderung an Ihrem Code datiert und gespeichert wird: wenn Sie etwas verbocken, springen Sie mit einem Klick zurück auf den gestrigen Nachmittag. Ab jetzt ist es der Anker, an dem alles andere hängt.", "Laden Sie <strong>Visual Studio Code</strong> auf <a href=\"https://code.visualstudio.com\" target=\"_blank\" rel=\"noopener\">code.visualstudio.com</a> herunter (Windows/Mac/Linux, ~100 MB). Das ist das Programm, mit dem Sie die Projektdateien öffnen, lesen und bearbeiten — denken Sie an Word, aber für Code. Beim ersten Start sieht es aus wie ein gewöhnlicher Texteditor: die Magie kommt im nächsten Schritt, wenn Sie die KI obendrauf setzen.", "Klicken Sie in VS Code auf das <em>Extensions</em>-Symbol in der linken Seitenleiste (vier Quadrate, Tastenkürzel <code>Ctrl+Shift+X</code> auf Windows/Linux, <code>Cmd+Shift+X</code> auf Mac). Suchen Sie nach einem kostenlosen KI-Assistenten: am einfachsten ist <strong>Gemini Code Assist</strong> von Google, aber auch <strong>Codeium</strong>, <strong>Continue</strong> oder <strong>Cody</strong> tun's. Installieren und mit einem Google-Konto einloggen: ab jetzt haben Sie in VS Code einen Chat, dem Sie Anweisungen auf Deutsch geben können.", "Laden Sie <strong>GitHub Desktop</strong> auf <a href=\"https://desktop.github.com\" target=\"_blank\" rel=\"noopener\">desktop.github.com</a> herunter und melden Sie sich mit demselben Konto wie unter Punkt 1 an. Das ist eine kleine App, die als Brücke zwischen Ihrem Rechner und GitHub dient: mit zwei Klicks fliegen Ihre lokalen Änderungen in die Cloud (commit + push). Ohne diese App müssten Sie Git-Befehle im Terminal lernen — sparen wir uns.", "Gehen Sie auf <strong>supabase.com</strong> und melden Sie sich an (mit Google oder GitHub geht's am schnellsten). Supabase ist das Online-Lager, in dem Ihre App alles speichern wird: Benutzer, Teilnehmer, Mobilitäten, hochgeladene Dokumente. Vorerst genügt es, das Konto bereit zu haben — das eigentliche Projekt legen Sie in Schritt 03 an, wenn wir die Zugangsdaten brauchen.", "Gehen Sie auf <strong>netlify.com</strong> und melden Sie sich an — \"Sign up with GitHub\" ist der schnellste Weg, dann sprechen die beiden Dienste sofort miteinander. Netlify verwandelt Ihren Code in eine Website, die im Internet jeder erreichen kann, kostenlos. Kein Server zum Konfigurieren, kein FTP, gar nichts: er kompiliert und veröffentlicht selbst neu, jedes Mal wenn Sie etwas auf GitHub pushen.", "Laden Sie <strong>Node.js</strong> in der Version <strong>LTS</strong> (Long Term Support, die stabile) auf <a href=\"https://nodejs.org\" target=\"_blank\" rel=\"noopener\">nodejs.org</a> herunter. Node.js ist der Motor, der die Seite auf Ihrem Rechner laufen lässt, während Sie testen: ohne ihn wüsste der Befehl <code>npm run dev</code> in Schritt 05 nicht, was er ausführen soll. Die Installation ist geführt — Weiter, Weiter, Fertig."], "tip_label": "Keine Sorge wegen der Kosten", "tip_body": "All diese Werkzeuge sind für den persönlichen Gebrauch kostenlos: niemand verlangt eine Kreditkarte, um anzufangen. Wenn Sie irgendwann eine eingeben sollen — halten Sie inne und prüfen Sie nach: Sie sind dabei, versehentlich einen kostenpflichtigen Tarif zu aktivieren, und nichts in diesem Leitfaden braucht das."}, {"n": "02", "label": "FORK & CLONE", "title_html": "Erstellen Sie Ihre <em>persönliche Kopie</em>", "why": "\"Forken\" heißt, eine persönliche Kopie des Managemob-Projekts auf GitHub anzulegen: Sie arbeiten an Ihrer Kopie, das Original bleibt unangetastet. \"Klonen\" heißt, diese Kopie auf Ihren Rechner herunterzuladen, um sie in VS Code zu öffnen. Zwei Klicks und ein Befehl — am Ende dieses Schritts haben Sie das echte Projekt auf der Festplatte, startklar.", "actions": ["Gehen Sie auf die GitHub-Seite der Managemob-Vorlage — z.&nbsp;B. <a href=\"https://github.com/ETN-International/managemob-app\" target=\"_blank\" rel=\"noopener\">github.com/ETN-International/managemob-app</a>, oder die URL der Vorlage, die Ihnen bereitgestellt wurde. Klicken Sie oben rechts auf <strong>Fork</strong>: GitHub fragt, welchem Konto die Kopie gehören soll (Ihrem) und welchen Namen sie bekommen soll. Wählen Sie etwas Kurzes in Kleinbuchstaben, etwa <em>pessoa-mobility</em>. In wenigen Sekunden gehört die Kopie Ihnen.", "Auf der Seite Ihres neuen Forks klicken Sie oben rechts auf den grünen Button <strong>&lt;&gt; Code</strong>. Ein Menü öffnet sich: wählen Sie <strong>Open with GitHub Desktop</strong>. Der Browser fragt, ob er die App öffnen darf — erlauben.", "GitHub Desktop schlägt einen lokalen Ordner zum Speichern vor. Akzeptieren Sie den Standardpfad oder wählen Sie einen praktischen (z.&nbsp;B. <em>Dokumente</em> oder <em>Desktop/Projekte</em>) und klicken Sie <strong>Clone</strong>. In wenigen Sekunden liegen alle Projektdateien auf Ihrem Computer.", "Klicken Sie in GitHub Desktop oben rechts auf <strong>Open in Visual Studio Code</strong>: VS Code öffnet sich mit dem richtigen Ordner schon geladen. Links sehen Sie im <em>Explorer</em> die gesamte Projektstruktur.", "Öffnen Sie in VS Code den Chat des KI-Assistenten und fügen Sie diesen Prompt ein: <code>Installiere die Projektabhängigkeiten</code>. Die KI lädt für Sie alle Bibliotheken herunter, auf die das Projekt angewiesen ist (ein paar Minuten). Wenn sie meldet \"fertig, keine Fehler\", sind Sie bereit für den nächsten Schritt."], "prompt_label": "Prompt für den KI-Assistenten", "prompt_body": "\"Erkläre mir in einem Absatz, was im src/-Ordner enthalten ist — welche Hauptunterordner es gibt und wofür jeder zuständig ist. Verändere noch nichts, ich möchte nur die Projektkarte verstehen.\""}, {"n": "03", "label": "SUPABASE-DATENBANK", "title_html": "Bereiten Sie das <em>Datenlager</em> vor", "why": "Supabase ist das Online-Lager, in dem die App alles speichert: Benutzer, Teilnehmer, Mobilitäten, Dokumente. In diesem Schritt legen Sie Ihren Supabase-Bereich an, holen sich die zwei Zugangsdaten (URL + Schlüssel), die die Website braucht, um mit ihm zu sprechen, und legen Ihren ersten Administrator-Benutzer an. Den Rest — die Datenbank mit den richtigen Tabellen füllen, die Sicherheit verriegeln — erledigt der KI-Assistent für Sie im nächsten Schritt. Sie klicken nur.", "actions": ["Gehen Sie auf <a href=\"https://supabase.com\" target=\"_blank\" rel=\"noopener\">supabase.com</a>, melden Sie sich an (oder registrieren Sie sich, falls es das erste Mal ist) und klicken Sie <strong>New project</strong>. Wählen Sie einen Namen (z.&nbsp;B. <em>pessoa-mobility</em>), eine <strong>Region in Europa</strong> (Frankfurt, Ireland oder Stockholm — je näher an Ihren Nutzern, desto reaktionsschneller die App) und ein starkes Passwort. <strong>Bewahren Sie das Passwort</strong> sicher auf: Sie können es nicht wiederherstellen, und Sie könnten es später noch brauchen.", "Warten Sie 1-2 Minuten. Supabase richtet einen eigenen Bereich für Sie ein. Es ist normal, dass das Dashboard ein paar Sekunden lang nicht reagiert — es hängt nicht.", "Klicken Sie in der linken Seitenleiste auf <strong>Project Settings → API</strong>. Sie finden zwei Werte im Klartext: <strong>Project URL</strong> (eine Adresse, die mit <em>https://</em> beginnt) und <strong>anon public key</strong> (eine lange Zeichenkette). Kopieren Sie beide in einen temporären Notizblock: Sie brauchen sie gleich, in Schritt 04. Nichts Technisches — einfach zweimal Kopieren-Einfügen.", "Bleiben Sie in der Seitenleiste, gehen Sie zu <strong>Authentication → Providers</strong>. Stellen Sie sicher, dass <strong>Email</strong> aktiv ist (üblicherweise standardmäßig). Für die Tests deaktivieren Sie <em>Confirm email</em>: so müssen Sie beim Anlegen Ihres Benutzers im nächsten Schritt nicht ins Mail-Postfach, um einen Bestätigungslink zu klicken. Sie schalten es wieder ein, bevor Sie in den echten Produktivbetrieb gehen (siehe Schritt 10).", "Sidebar → <strong>Authentication → Users → Add user → Create new user</strong>. Legen Sie Ihren ersten Administrator-Zugang an: eine E-Mail und ein Passwort, das Sie sich merken. Mit diesem Benutzer melden Sie sich in Schritt 05 an, um die Seite zu testen."], "prompt_label": "Prompt für den KI-Assistenten"}, {"n": "04", "label": "DAS PROJEKT KONFIGURIEREN", "title_html": "Lassen Sie den <em>KI-Assistenten</em> alles verkabeln", "why": "Die Website weiß jetzt, dass es ein Supabase-Lager gibt, hat aber noch keine Zugangsdaten dafür — und das Lager ist leer. In diesem Schritt erledigt der KI-Assistent drei technische Dinge in einem Aufwasch: er speichert Ihre Zugangsdaten am richtigen Ort, befüllt die Datenbank mit den App-Tabellen und schaltet die Sicherheit ein. Sie fügen einen einzigen Prompt ein und sagen \"ja\", wenn er Sie um Bestätigung bittet.", "actions": ["Öffnen Sie den Chat des KI-Assistenten in Visual Studio Code (in Gemini Code Assist ist es das Stern-Symbol in der Seitenleiste; in Cursor drücken Sie <code>Ctrl+L</code> / <code>Cmd+L</code>). Wenn Sie eine Option wie <em>Agent mode</em> oder <em>@workspace</em> sehen, schalten Sie sie ein: das bedeutet, dass die KI die Projektdateien lesen und ändern darf.", "Kopieren Sie diesen ganzen Prompt (er ist schon fertig formuliert — Sie müssen nicht jedes Wort verstehen) und fügen Sie ihn in den KI-Chat ein:", "<code class=\"code-block\">Konfiguriere das Managemob-Projekt mit diesen Supabase-Zugangsdaten:<br>URL = https://&lt;ihr-projekt&gt;.supabase.co<br>KEY = &lt;ihr anon key&gt;<br><br>Bitte erledige drei Dinge: (1) lege die Datei .env mit diesen zwei Variablen an (VITE_SUPABASE_URL und VITE_SUPABASE_ANON_KEY) und stelle sicher, dass .env in .gitignore steht, damit sie nie auf GitHub landet; (2) führe die Datei supabase/schema.sql gegen meine Supabase-Datenbank aus, um die App-Tabellen zu erstellen; (3) aktiviere Row Level Security auf allen Tabellen, sodass nur eingeloggte Nutzer lesen und schreiben können. Zeige mir Schritt für Schritt, was du tust, und frag vor jeder Aktion um Bestätigung.</code>", "Ersetzen Sie <em>https://&lt;ihr-projekt&gt;.supabase.co</em> und <em>&lt;ihr anon key&gt;</em> durch die zwei Werte, die Sie im Schritt 03 aus dem Supabase-Dashboard kopiert haben. Drücken Sie Enter.", "Die KI zeigt Ihnen jeden Vorgang einzeln: \"Ich erstelle die .env-Datei, ok?\", \"Ich führe dieses SQL aus, ok?\", \"Ich aktiviere die Sicherheit, ok?\". Auf jede Frage antworten Sie <strong>ja</strong> (oder akzeptieren das Diff). Wenn sie meldet, sie sei fertig, sind Sie bereit: die Website ist mit Supabase verbunden, die Datenbank hat ihre Tabellen, die Sicherheit ist aktiv — und das alles, ohne dass Sie eine Datei von Hand angefasst hätten."], "tip_label": "Wenn die KI etwas tun will, das Sie nicht verstehen", "tip_body": "Es ist völlig in Ordnung zu sagen: \"erkläre mir auf einfachem Deutsch, was du gleich tust, bevor du es tust.\" Das ist ihr Job — Sie müssen nicht SQL oder Umgebungsvariablen lernen, um diesen Leitfaden abzuschließen. Wenn Ihnen etwas seltsam vorkommt (z.&nbsp;B. sie will Dateien löschen, die nichts damit zu tun haben), sagen Sie \"stopp, ich habe nicht zugestimmt\" und versuchen Sie es mit präziseren Anweisungen erneut."}, {"n": "05", "label": "LOKAL TESTEN", "title_html": "Lassen Sie die Site <em>lokal laufen</em>", "why": "Bevor Sie die Seite online stellen, lohnt es sich, sie auf Ihrem Rechner auszuprobieren. Hier merken Sie, ob Supabase richtig verkabelt ist, ob das Login funktioniert, ob Daten wirklich gespeichert werden. Falls etwas hakt, fällt es hier auf — ohne dass jemand etwas davon mitbekommt.", "actions": ["Öffnen Sie in VS Code den KI-Chat und fügen Sie ein: <code>Starte die Seite lokal, damit ich sie im Browser ansehen kann</code>. Die KI führt den richtigen Befehl aus (es ist <code>npm run dev</code>, falls Sie's wissen wollen). Wer es lieber selbst macht: Terminal öffnen (<em>View → Terminal</em>), <code>npm run dev</code> tippen, Enter drücken.", "Im Terminal erscheint eine Zeile wie <code>➜ Local: http://localhost:XXXX</code>. Öffnen Sie diese Adresse im Browser (meist <code>http://localhost:3000</code>; ist der Port belegt, wählt Vite einen anderen und zeigt ihn). Wenn die KI den Start für Sie übernommen hat, nennt sie die Adresse direkt im Chat.", "Sie sehen den Login-Bildschirm. Melden Sie sich mit der E-Mail und dem Passwort des in Schritt 03 angelegten Administrators an. Wenn die Antwort \"Invalid login credentials\" lautet, fragen Sie die KI: <code>Das Login klappt nicht, prüf die Supabase-Zugangsdaten</code>. Meistens ist es ein falsch kopierter Wert oder ein überflüssiges Leerzeichen.", "Einmal drin, legen Sie probehalber einen Test-Teilnehmer auf der Startseite an (Vorname, Nachname, Zielland reichen). Speichern, dann <code>F5</code> drücken zum Neuladen: ist der Teilnehmer noch da, speichert die Online-Datenbank tatsächlich.", "Klicken Sie auf den Sprachwähler (oben, sowohl auf dem Login als auch in der Sidebar): die Oberfläche muss in allen 7 Sprachen sofort umschalten. Fehlt eine Übersetzung oder sieht etwas schief aus, merken Sie es hier."], "prompt_label": "Wenn etwas fehlschlägt, nützlicher Prompt", "prompt_body": "\"Wenn beim Starten der Seite etwas schiefgeht, sag mir, was im Terminal steht, und schlage eine einfache Korrektur vor. Ändere keine Dateien, ohne mich vorher zu fragen.\""}, {"n": "06", "label": "TEXTE ÜBERSETZEN", "title_html": "Personalisieren in <em>7 Sprachen</em>", "why": "Managemob spricht ab Werk 7 Sprachen. Sie übersetzen nicht von Grund auf — Sie schreiben nur die sichtbaren Texte (Beschriftungen, Titel, Buttontexte) so um, dass sie zu IHRER Organisation passen, und in jeder Sprache natürlich klingen. Der KI-Assistent erledigt das mit einem einzigen Prompt: Sie wählen den Tonfall, die KI wendet ihn auf alle 7 Dateien gleichzeitig an.", "actions": ["Öffnen Sie in VS Code den Chat des KI-Assistenten. Sie müssen die 7 Sprachdateien nicht einzeln öffnen — das übernimmt sie.", "Fügen Sie diesen Prompt ein (\"Pessoa Academy\" durch den Namen Ihrer Organisation ersetzen, gewünschten Ton beschreiben):", "<code class=\"code-block\">Schreibe alle sichtbaren Texte der App für die Marke 'Pessoa Academy' um, mit einem warmen und professionellen Ton (anpassen, falls anderer Stil gewünscht). Öffne alle 7 Dateien in src/locales/ (it.ts, en.ts, es.ts, fr.ts, de.ts, pt.ts, se.ts), ändere ausschließlich die Werte (die Strings in Anführungszeichen), die Schlüssel (die Namen vor dem Doppelpunkt) bleiben unangetastet. Übersetze in jeder Sprache natürlich, nicht Wort für Wort. Zeige mir das Diff, bevor du es anwendest.</code>", "Die KI schlägt alle Änderungen in einer einzigen Übersicht vor. Gehen Sie das Diff durch: gefallen Ihnen die Formulierungen, akzeptieren Sie. Wollen Sie einen anderen Ton (förmlicher, jünger, weniger Corporate-Sprech), sagen Sie es einfach — z.&nbsp;B. \"schreib's förmlicher, mit Sie\" — und sie macht alles neu."], "prompt_label": "Prompt für den KI-Assistenten", "tip_label": "Eine 8. Sprache hinzufügen", "tip_body": "Sie wollen eine zusätzliche Sprache (z.&nbsp;B. Polnisch)? Bitten Sie die KI: <em>\"Füge Polnisch als 8. Sprache der App hinzu, indem du aus en.ts kopierst und übersetzt. Füge auch die Flagge im Sprachwähler hinzu.\"</em> Das macht sie in 30 Sekunden, ohne dass Sie Code anfassen."}, {"n": "07", "label": "LOGO UND FARBEN", "title_html": "Geben Sie ihr <em>Ihre visuelle Identität</em>", "why": "Das Aussehen ist das Erste, was Ihre Nutzer wahrnehmen. Sobald Sie Logo, Farben und Seitentitel ändern, hört Managemob auf, Managemob zu heißen, und wird sichtbar zu IHRER Plattform. Es sind rein optische Änderungen — die Logik bleibt, wie sie ist —, aber sie verändern den Gesamteindruck radikal.", "actions": ["Bereiten Sie Ihr Logo als <code>logo.svg</code>-Datei vor (bevorzugt — Vektor, skaliert perfekt) oder <code>logo.png</code> (quadratisches Format, mindestens 256×256 Pixel, transparenter Hintergrund). Ziehen Sie die Datei in den <code>public/</code>-Ordner des Projekts in VS Code: das neue Symbol erscheint im Explorer.", "Wählen Sie Ihre zwei Farben: die <strong>Primärfarbe</strong> (die Hauptfarbe der App, z.&nbsp;B. das Blau Ihrer Organisation) und die <strong>Akzentfarbe</strong> (eine ergänzende für Details und Buttons). Falls Sie keine Palette zur Hand haben, gehen Sie auf <a href=\"https://coolors.co\" target=\"_blank\" rel=\"noopener\">coolors.co</a>, spielen Sie, bis es passt, und notieren Sie sich die zwei Hex-Codes (z.&nbsp;B. #1D72B8 und #38BDF8).", "Öffnen Sie den KI-Chat und fügen Sie diesen Prompt ein (Organisationsname und Farb-Codes ersetzen):", "<code class=\"code-block\">Komplettes Rebranding der App für meine Organisation 'Pessoa Academy'. (1) Ersetze den Logo-Platzhalter 'M' durch die Datei public/logo.svg in Sidebar.tsx und Login.tsx. (2) Aktualisiere die Farben in src/styles/main.css: --primary = #XXXXXX, --accent = #YYYYYY. (3) Ändere den Seitentitel (Browser-Tab) zu 'Pessoa Academy' in index.html und lass das Favicon auf mein neues Logo zeigen. (4) Ersetze das Wort 'Managemob' durch 'Pessoa Academy' in den sichtbaren Texten der 7 Dateien in src/locales/. Zeige mir das Diff vor jeder Änderung.</code>", "Die KI schlägt alle Änderungen vor. Genehmigen. Browser auf <code>localhost:3000</code> neu laden: Ihre visuelle Identität ist bereits da."], "prompt_label": "Prompt für den KI-Assistenten"}, {"n": "08", "label": "WORD-VORLAGEN", "title_html": "Automatisieren Sie Ihre <em>Dokumente</em>", "why": "Eine der stärksten Eigenschaften von Managemob: Sie nehmen ein beliebiges Word-Dokument (Learning Agreement, Europass Mobility, Mobilitätsvertrag…) und verwandeln es in eine Vorlage, die sich automatisch mit den Daten des ausgewählten Teilnehmers füllt. Schluss mit händischem Copy-Paste: 50 Teilnehmer, 50 Dokumente, 30 Sekunden.", "actions": ["Öffnen Sie das zu automatisierende Word-Dokument in Microsoft Word, LibreOffice oder Google Docs. Liegt es als PDF oder Scan vor, müssen Sie es zuerst als <code>.docx</code> nachbauen — die App akzeptiert nur .docx-Dateien.", "Suchen Sie die Stellen, an denen variable Daten stehen (Teilnehmername, Daten, Aufnahmebetrieb, Land…) und ersetzen Sie sie durch Tags in geschweiften Klammern. Beispiele:<br>[Vorname] [Nachname] → <code>{name} {surname}</code><br>[Anfangsdatum] → <code>{arrival_date}</code><br>[E-Mail] → <code>{email}</code><br>[Aufnahmebetrieb] → <code>{host_company_name}</code>. Die vollständige Tag-Liste finden Sie auf der <em>Dokumente</em>-Seite der App, unter \"Export Placeholders\".", "Speichern Sie als <strong>.docx</strong> (nicht .doc, nicht .pdf, nicht Google Docs). In Word: <em>Speichern unter → Word-Dokument (*.docx)</em>.", "In der Managemob-App: <em>Dokumente → Vorlage hochladen</em>. Vergeben Sie einen Namen (z.&nbsp;B. \"Learning Agreement DE\"), wählen Sie die .docx-Datei aus, bestätigen. Die Vorlage erscheint in der Liste.", "Wählen Sie sie aus, suchen und markieren einen oder mehrere Teilnehmer, klicken Sie <strong>Generieren</strong>. Bei einem Teilnehmer laden Sie eine einzelne Datei herunter; bei mehreren ein ZIP mit je einem Dokument pro Person. Die Formatierung (fett, kursiv, Tabellen) bleibt erhalten: die App ersetzt nur die Tags."], "tip_label": "Wichtige Regeln zu den Tags", "tip_body": "Tags sind <strong>Groß-/Kleinschreibungs-empfindlich</strong>: schreiben Sie <code>{name}</code>, nicht <code>{Name}</code>. Keine Leerzeichen innerhalb der Klammern (<code>{ name }</code> funktioniert nicht). Unbekannte Tags bleiben als Klartext im Dokument (\"{falscherName}\"): wenn Ihr generiertes Dokument noch geschweifte Klammern enthält, haben Sie einen Feldnamen vertippt. Für die exakte Liste: <em>Dokumente → Export Placeholders (CSV)</em>."}, {"n": "09", "label": "ONLINE GEHEN", "title_html": "Veröffentlichen Sie die Site <em>auf Netlify</em>", "why": "Bisher läuft die Seite nur auf Ihrem Rechner und niemand sonst sieht sie. Um sie der Welt zu zeigen, stellen Sie sie auf Netlify, kostenlos, direkt mit Ihrem GitHub-Repository verbunden. Ab dann baut Netlify die Seite jedes Mal, wenn Sie etwas auf GitHub pushen, automatisch neu — kein FTP, keine Deploy-Befehle, gar nichts.", "subsections": [{"title": "A · Änderungen auf GitHub speichern (mit GitHub Desktop)", "items": ["Öffnen Sie GitHub Desktop. Falls Sie Dateien geändert haben (und nach den Schritten 06-07 sind das eine Menge), sehen Sie oben links die Liste der geänderten Dateien mit farbigem Diff (grün = hinzugefügt, rot = entfernt).", "Unten links gibt es ein Feld für die Speichernachricht: tippen Sie eine kurze Beschreibung ein (z.&nbsp;B. \"Personalisierung Pessoa Academy: Logo, Farben, Texte\"). Klicken Sie <strong>Commit to main</strong>: ein Speicherpunkt ist gesetzt.", "Oben klicken Sie <strong>Push origin</strong>. Ihre Änderungen sind jetzt in Ihrem GitHub-Repository — endlich gesichert, endlich bereit für Netlify."]}, {"title": "B · Auf Netlify veröffentlichen (mit Ihrem Repository verbunden)", "items": ["Gehen Sie auf <a href=\"https://netlify.com\" target=\"_blank\" rel=\"noopener\">netlify.com</a> und melden Sie sich an (am schnellsten via <em>Sign up with GitHub</em>). Dashboard → <strong>Add new site → Import an existing project → Deploy with GitHub</strong>.", "Beim ersten Mal fragt Netlify nach der Erlaubnis, Ihre Repositories zu lesen — erteilen. Wählen Sie dann aus der Liste den <strong>Fork</strong>, den Sie in Schritt 02 angelegt haben.", "Netlify erkennt automatisch, dass es ein Vite-Projekt ist, und schlägt die richtigen Build-Einstellungen vor. Prüfen Sie nur: <em>Build command:</em> <code>npm run build</code> · <em>Publish directory:</em> <code>dist</code> · <em>Branch:</em> <code>main</code>.", "Öffnen Sie <strong>Show advanced → Add environment variable</strong>. Fügen Sie die ZWEI Variablen hinzu, die die KI in Schritt 04 in Ihre <code>.env</code> geschrieben hat: <code>VITE_SUPABASE_URL</code> und <code>VITE_SUPABASE_ANON_KEY</code> (mit denselben Werten). Ohne diese kann die online deployte App nicht mit Supabase sprechen.", "Klicken Sie <strong>Deploy</strong>. Der erste Build dauert 1-3 Minuten — Sie können das Log live mitlesen. Wenn dort \"Site is live\" steht, sind Sie fertig.", "Netlify gibt Ihnen eine zufällige Adresse wie <code>https://&lt;komische-worte-123&gt;.netlify.app</code>. <strong>Das ist Ihre Live-Seite!</strong> Über <em>Site settings → Change site name</em> können Sie sie umbenennen (z.&nbsp;B. <code>pessoa-mobility.netlify.app</code>); über <em>Domain management</em> können Sie eine eigene Domain anschließen, falls Sie eine haben (z.&nbsp;B. <code>mobility.pessoa-academy.com</code>)."]}], "prompt_label": "Prompt für den KI-Assistenten", "prompt_body": "\"Füge dem Projekt die Konfiguration hinzu, damit alle inneren Seiten korrekt funktionieren, wenn die Seite online auf Netlify ist (sodass ich beim Neuladen einer Seite wie /dashboard keinen 404-Fehler bekomme). Zeige mir die Datei, bevor du sie anlegst.\""}, {"n": "10", "label": "ABSCHLUSSCHECK", "title_html": "Sie sind <em>online</em>, letzte Prüfung", "why": "Sie sind online. Bevor Sie die Seite für echte Nutzer öffnen, prüfen wir, dass alles über die öffentliche Netlify-URL funktioniert (nicht mehr über localhost). Sieben kurze Checks: gehen alle durch, geht's live. Scheitert einer, haben Sie noch Zeit nachzubessern — ohne dass jemand etwas merkt.", "checklist": ["Login über die öffentliche Netlify-URL funktioniert (mit dem in Schritt 03 angelegten Administrator).", "Der Sprachwähler zeigt alle 7 Sprachen, und die Texte ändern sich beim Klick wirklich.", "Ich lege einen Test-Teilnehmer an, drücke F5: ist er noch da, speichert die Online-Datenbank.", "Ich generiere ein Word-Dokument für einen Teilnehmer: die Tags <code>{name}</code> usw. in der heruntergeladenen Datei sind durch echte Daten ersetzt.", "Der Calendar zeigt den Teilnehmer an den richtigen Daten an.", "Eine Unterseite wie <code>/dashboard</code> neu laden ergibt keinen 404 (= der Prompt aus Schritt 09 wurde angewendet).", "Logout führt mich zurück zum Login-Bildschirm, ohne Fehler."], "tip_label": "Vor dem offiziellen Go-Live", "tip_body": "Beim Wechsel von der internen Beta zu echten Nutzern erledigen Sie diese Aufräumarbeit in Supabase: (1) <strong>schalten Sie Confirm email wieder ein</strong> in Authentication → Providers (so müssen Neuregistrierungen ihre E-Mail bestätigen); (2) <strong>rotieren Sie das DB-Passwort</strong> in Project Settings → Database (ersetzen Sie das in Schritt 03 gespeicherte); (3) löschen Sie den <strong>Test-Administrator</strong> und legen Sie die echten an; (4) erstellen Sie ein <strong>Backup</strong> der Datenbank (Project Settings → Database → Backups). Zwanzig Minuten Arbeit, die Ihnen hundertmal den Kopf retten werden."}], "conclusion_label": "Schluss", "conclusion_title_html": "Eine Plattform, die <em>Ihnen</em> gehört, in 7 Sprachen, ohne Handarbeit", "conclusion_body": "Visual Studio Code öffnet die Dateien. Der KI-Assistent schreibt den Code. GitHub Desktop synchronisiert online. Supabase verwahrt die Daten. Netlify stellt die Seite ins Schaufenster. Sie orchestrieren das Ganze und behalten die Entscheidungen, auf die es ankommt: Name, Farben, Texte, automatisierte Dokumente, Sprachen. Das ist der Vibe Coding Workflow™: keine einzige von Hand geschriebene Zeile Code, aber das Ergebnis ist eine Plattform, die zu 100 % Ihre ist.", "tags": ["Vibe Coding", "Pessoa Academy", "Managemob", "VS Code", "Gemini Code Assist", "GitHub Desktop", "Supabase", "Netlify", "Erasmus+", "Bildungsmobilität"], "footer_creator": "© Pessoa Academy", "footer_brand": "Managemob × Vibe Coding Workflow™"}, "pt": {"lang": "pt", "page_title": "Procedimento passo a passo para criar a tua própria versão personalizada da plataforma", "doc_title": "Crie a sua própria versão do Managemob", "doc_subtitle": "Procedimento passo a passo, em 7 línguas, sem escrever código.", "creator_line": "Um guia da Pessoa Academy · Vibe Coding Workflow™", "tools_line": "Visual Studio Code + assistente de IA gratuito + GitHub Desktop + Supabase + Netlify", "hero_eyebrow": "Vibe Coding Workflow™", "hero_title_html": "Procedimento passo a passo para criar a tua versão <em>personalizada</em> da plataforma", "hero_body": "Managemob é uma plataforma para gerir mobilidades formativas (Erasmus+, ESC, intercâmbios). Este guia leva-o passo a passo para criar a SUA versão personalizada: logótipo, cores, textos nas suas línguas, documentos automatizados. Não precisa saber programar: a IA escreve, você decide.", "stats": [["10", "passos"], ["7", "línguas prontas"], ["0", "linhas escritas à mão"], ["~2 h", "tempo médio"]], "principle_label": "Princípio Vibe Coding", "principle_title_html": "Você é o <em>realizador</em>, a IA é o dactilógrafo", "principle_body": "Todo o guia assenta numa só ideia: você descreve em linguagem clara o que quer, o assistente de IA escreve o código no seu editor. Sempre que vir uma secção PROMPT, copie a frase e cole-a no chat do assistente de IA dentro do Visual Studio Code.", "lang_switch_label": "Língua", "steps": [{"n": "01", "label": "ANTES DE COMEÇAR", "title_html": "Prepare a sua <em>caixa de ferramentas</em>", "why": "Antes de escrever o que quer que seja, precisas de um punhado de ferramentas, todas gratuitas e já standard no mundo do software. Não são apps ao acaso: cada uma tem uma função muito concreta e encaixa nas outras. Imagina uma oficina — o <strong>GitHub</strong> é o armazém online, o <strong>Visual Studio Code</strong> a bancada onde abres os ficheiros, o <strong>assistente de IA</strong> o teu aprendiz que escreve o código a ditado, o <strong>GitHub Desktop</strong> o carrinho que leva material entre o armazém e a bancada, o <strong>Supabase</strong> o depósito de dados, o <strong>Netlify</strong> o holofote que põe tudo na montra. Hoje só registos e instalações: ainda não há código.", "actions": ["Vai a <strong>github.com</strong> e cria uma conta gratuita (basta um email). O GitHub é o diário onde cada alteração ao teu código fica datada e guardada: se enganares-te, voltas a ontem à tarde com um clique. A partir daqui é a âncora a que tudo o resto se vai prender.", "Descarrega o <strong>Visual Studio Code</strong> em <a href=\"https://code.visualstudio.com\" target=\"_blank\" rel=\"noopener\">code.visualstudio.com</a> (Windows/Mac/Linux, ~100 MB). É o programa com que abres, lês e modificas os ficheiros do projeto — pensa nele como um Word para código. Ao abrir pela primeira vez parece um editor de texto qualquer: a magia chega no passo seguinte, quando lhe juntares a IA por cima.", "No VS Code clica no ícone <em>Extensions</em> na barra lateral esquerda (quatro quadrados, atalho <code>Ctrl+Shift+X</code> em Windows/Linux, <code>Cmd+Shift+X</code> em Mac). Procura um assistente de IA gratuito: o mais simples é o <strong>Gemini Code Assist</strong> da Google, mas também servem <strong>Codeium</strong>, <strong>Continue</strong> ou <strong>Cody</strong>. Instala e faz login com uma conta Google: a partir daqui passas a ter um chat dentro do VS Code a quem dás instruções em português corrente.", "Descarrega o <strong>GitHub Desktop</strong> em <a href=\"https://desktop.github.com\" target=\"_blank\" rel=\"noopener\">desktop.github.com</a> e faz login com a mesma conta do passo 1. É uma app que faz a ponte entre o teu computador e o GitHub: com dois cliques as tuas alterações locais voam para a cloud (commit + push). Sem esta app, terias de aprender comandos do Git pela linha de comandos — poupamo-nos isso.", "Vai a <strong>supabase.com</strong> e regista-te (com Google ou GitHub é mais rápido). O Supabase é o armazém online onde a tua app vai guardar tudo: utilizadores, participantes, mobilidades, documentos carregados. Por agora basta teres a conta aberta — o projeto a sério crias no passo 03, quando precisarmos das credenciais.", "Vai a <strong>netlify.com</strong> e regista-te — \"Sign up with GitHub\" é a via mais rápida, assim os dois serviços ficam logo a falar um com o outro. O Netlify é o que transforma o teu código num site a que qualquer pessoa na internet pode aceder, gratuitamente. Nada de servidores para configurar, nada de FTP, nada: ele recompila e republica sozinho sempre que fizeres push para o GitHub.", "Descarrega o <strong>Node.js</strong> versão <strong>LTS</strong> (Long Term Support, a estável) em <a href=\"https://nodejs.org\" target=\"_blank\" rel=\"noopener\">nodejs.org</a>. O Node.js é o motor que faz o site correr no teu computador enquanto o testas: sem ele, no passo 05 o comando <code>npm run dev</code> não saberia o que executar. A instalação é guiada — Seguinte, Seguinte, Concluído."], "tip_label": "Sossega quanto a custos", "tip_body": "Todas estas ferramentas são gratuitas para uso pessoal: ninguém te pede cartão de crédito para começar. Se em algum momento te pedirem — pára e revê: estás prestes a ativar um plano pago por engano, e nada nesta guia o exige."}, {"n": "02", "label": "FORK & CLONE", "title_html": "Crie a sua <em>cópia pessoal</em> do projeto", "why": "\"Forkar\" significa fazer uma cópia pessoal do projeto Managemob no GitHub: tu trabalhas na tua cópia, o original fica intacto. \"Clonar\" significa descarregar essa cópia para o teu computador para poderes abri-la no VS Code. Dois cliques e um comando, e no fim deste passo tens o projeto a sério no disco, pronto a arrancar.", "actions": ["Vai à página GitHub do template Managemob — ex. <a href=\"https://github.com/ETN-International/managemob-app\" target=\"_blank\" rel=\"noopener\">github.com/ETN-International/managemob-app</a>, ou o URL do template que te tenham fornecido. Em cima à direita clica <strong>Fork</strong>: o GitHub pergunta a que conta atribuir a cópia (à tua) e que nome lhe dar
