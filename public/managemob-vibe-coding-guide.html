kal laufen zu lassen."], "tip_label": "Bonus", "tip_body": "Alle diese Werkzeuge sind kostenlos. Keine Kreditkarte nötig zum Start."}, {"n": "02", "label": "FORK & CLONE", "title_html": "Erstellen Sie Ihre <em>persönliche Kopie</em>", "why": "\"Forken\" = persönliche Kopie des Projekts auf GitHub anlegen, ohne das Original zu berühren. \"Klonen\" = diese Kopie auf Ihren Computer herunterladen.", "actions": ["Auf die GitHub-Seite der Managemob-Vorlage gehen — z.&nbsp;B. <a href=\"https://github.com/ETN-International/managemob-app\" target=\"_blank\" rel=\"noopener\">github.com/ETN-International/managemob-app</a>, oder die URL der Vorlage, die Ihnen bereitgestellt wurde. Auf <strong>Fork</strong> klicken (oben rechts). Namen wählen (z.&nbsp;B. <em>pessoa-mobility</em>).", "Auf der Fork-Seite den grünen Button <strong>&lt;&gt; Code</strong> → <strong>Open with GitHub Desktop</strong>.", "GitHub Desktop fragt nach dem Speicherpfad. Wählen (z.&nbsp;B. Dokumente) → <strong>Clone</strong>.", "Oben rechts in GitHub Desktop <strong>Open in Visual Studio Code</strong>.", "In VS Code <strong>Terminal</strong> öffnen: <em>View → Terminal</em> (oder <code>Ctrl+`</code> / <code>Cmd+`</code>). Tippen Sie <code>npm install</code> und Enter. Wartet bis fertig – die Bibliotheken werden geladen."], "prompt_label": "Prompt für den KI-Assistenten", "prompt_body": "„Lies die Struktur des Ordners src/ und erkläre mir in einem Absatz, was jeder Top-Level-Ordner macht (pages, components, locales, lib, styles, data, types). Ändere noch nichts."}, {"n": "03", "label": "SUPABASE-DATENBANK", "title_html": "Bereiten Sie das <em>Datenlager</em> vor", "why": "Supabase ist das Online-Lager, in dem die App Benutzer, Teilnehmer und Mobilitäten speichert. Ohne Supabase hat die App keinen Speicherort.", "actions": ["supabase.com → einloggen → <strong>New project</strong>. Name, Region Europa, starkes Passwort wählen. <strong>Passwort sicher aufbewahren</strong>.", "1–2 Minuten warten.", "Sidebar → <strong>Project Settings → API</strong>. <strong>Project URL</strong> und <strong>anon public key</strong> kopieren – brauchen Sie für Schritt 04.", "Sidebar → <strong>SQL Editor → New query</strong>. In VS Code <code>supabase/schema.sql</code> öffnen, alles kopieren, in den SQL Editor einfügen, <strong>Run</strong>.", "Sidebar → <strong>Authentication → Providers</strong> → <strong>Email</strong> aktivieren. Für Tests <em>Confirm email</em> deaktivieren.", "Sidebar → <strong>Authentication → Users → Add user</strong>: ersten Administrator anlegen.", "<strong>Wichtig — nicht überspringen:</strong> KI-Assistent-Chat in VS Code öffnen, den unteren Prompt kopieren und einfügen, das zurückgegebene SQL im Supabase SQL Editor ausführen. Ohne diesen Schritt kann jeder mit dem anon-Key in Ihre Datenbank schreiben."], "prompt_label": "Prompt für den KI-Assistenten", "prompt_body": "„Erzeuge das SQL, um Row Level Security auf allen public-Tabellen von Managemob zu aktivieren, sodass nur authentifizierte Nutzer lesen/schreiben können. Output: ein einziger SQL-Block.“"}, {"n": "04", "label": ".env KONFIGURIEREN", "title_html": "Verbinden Sie die Site mit <em>Ihrer Datenbank</em>", "why": "Die Datei <code>.env</code> enthält die Zugangsdaten (URL und Key), die der Site sagen, wie sie mit Supabase spricht.", "actions": ["In VS Code im Explorer links <code>.env.example</code> finden.", "Rechtsklick auf <code>.env.example</code> → <strong>Copy</strong>. Rechtsklick im selben Ordner → <strong>Paste</strong>.", "Rechtsklick auf neue Datei → <strong>Rename</strong> → in <code>.env</code> umbenennen (mit Punkt vorne).", "Öffnen und ausfüllen:<br><code>VITE_SUPABASE_URL=https://&lt;ihr-projekt&gt;.supabase.co</code><br><code>VITE_SUPABASE_ANON_KEY=&lt;ihr anon key&gt;</code>", "Speichern (<code>Ctrl+S</code> / <code>Cmd+S</code>).", "<code>.gitignore</code> öffnen, Zeile <code>.env</code> prüfen. Fehlt sie, hinzufügen."]}, {"n": "05", "label": "LOKAL TESTEN", "title_html": "Lassen Sie die Site <em>lokal laufen</em>", "why": "Vor der Veröffentlichung lieber lokal testen. Wenn etwas schiefgeht, sehen Sie es sofort, ohne echte Nutzer zu beeinträchtigen.", "actions": ["In VS Code Terminal öffnen. <code>npm run dev</code> tippen, Enter.", "Im Terminal zeigt Vite eine Zeile wie <code>➜ Local: http://localhost:XXXX</code>. Öffnen Sie diese Adresse im Browser (meist <code>http://localhost:3000</code>; ist der Port belegt, wählt Vite einen anderen und zeigt ihn an).", "Mit dem Admin aus Schritt 03 einloggen.", "Test-Teilnehmer anlegen. F5 drücken: bleibt er, funktioniert Supabase.", "Sprachumschalter in Login und Sidebar testen."], "prompt_label": "Wenn etwas fehlschlägt, nützlicher Prompt", "prompt_body": "„Wenn npm run dev einen Fehler wirft, lies die Meldung im Terminal und schlage einen minimalen Fix vor. Ändere keine Datei ohne meine Freigabe.“"}, {"n": "06", "label": "TEXTE ÜBERSETZEN", "title_html": "Personalisieren in <em>7 Sprachen</em>", "why": "Managemob spricht bereits 7 Sprachen. Sie ändern nur die sichtbaren Texte für IHRE Organisation, ohne die technischen Schlüssel anzufassen.", "actions": ["In VS Code <code>src/locales/</code> öffnen. Sieben Dateien: <code>it.ts</code>, <code>en.ts</code>, <code>es.ts</code>, <code>fr.ts</code>, <code>de.ts</code>, <code>pt.ts</code>, <code>se.ts</code>.", "Eine Datei nach der anderen öffnen. Nur die <strong>Werte</strong> bearbeiten (nach dem Doppelpunkt). <strong>Keys</strong> nicht anfassen.", "Beispiel:<br>VORHER: <code>login_title: \"Bei Managemob anmelden\"</code><br>NACHHER: <code>login_title: \"Bei Pessoa Academy anmelden\"</code>"], "prompt_label": "Prompt für den KI-Assistenten", "prompt_body": "„Öffne src/locales/de.ts. Ohne die Schlüssel zu ändern, übersetze jeden sichtbaren String in einem brand-aligned Ton für 'Pessoa Academy'. Spiegele dieselben Änderungen in den anderen sechs Locale-Dateien (it, en, es, fr, pt, se).“", "tip_label": "Eine 8. Sprache hinzufügen", "tip_body": "<code>en.ts</code> als <code>pl.ts</code> duplizieren, Werte übersetzen, Locale registrieren, Flagge im Switcher hinzufügen. Lassen Sie es die KI machen."}, {"n": "07", "label": "LOGO UND FARBEN", "title_html": "Geben Sie ihr <em>Ihre visuelle Identität</em>", "why": "Das Aussehen ist, was Nutzer sehen. Logo und Farben machen die Site sichtbar zu IHRER.", "actions": ["In <code>public/</code> <code>logo.svg</code> durch Ihr Logo ersetzen. Quadratisch, mindestens 256×256 px.", "<code>src/components/Sidebar.tsx</code> und <code>src/pages/Login.tsx</code> öffnen. Den Platzhalter \"M\" ersetzen durch: <code>&lt;img src=\"/logo.svg\" alt=\"Pessoa Academy\" /&gt;</code>", "<code>src/styles/main.css</code> öffnen. Oben in der Datei, innerhalb von <code>:root { ... }</code>, finden Sie die Farbvariablen: <code>--primary</code> (Hauptfarbe, standardmäßig Blau), <code>--accent</code>, <code>--sidebar-bg</code> (Seitenleiste-Hintergrund, standardmäßig Teal) und <code>--teal</code>. Werte durch Ihre Palette ersetzen.", "<code>index.html</code> im Projekt-Root öffnen: den Text in <code>&lt;title&gt;...&lt;/title&gt;</code> ändern (z.&nbsp;B. \"Managemob\" → \"Pessoa Academy\") und in <code>&lt;link rel=\"icon\" ... href=\"/vite.svg\" /&gt;</code> <code>/vite.svg</code> durch den Pfad Ihres Logos ersetzen (z.&nbsp;B. <code>/logo.svg</code>)."], "prompt_label": "Prompt für den KI-Assistenten", "prompt_body": "„Rebrand für 'Pessoa Academy' mit Primärfarbe #XXXXXX und Sekundärfarbe #YYYYYY. Aktualisiere die CSS-Variablen, ersetze das M durch /logo.svg in Sidebar.tsx und Login.tsx, ändere den Title in index.html und aktualisiere login_title und login_footer in jedem File von src/locales/.“"}, {"n": "08", "label": "WORD-VORLAGEN", "title_html": "Automatisieren Sie Ihre <em>Dokumente</em>", "why": "Managemob kann ein Word-Dokument nehmen und es automatisch mit den Teilnehmerdaten füllen. Sie sagen ihm nur, welche \"Lücken\" auszufüllen sind.", "actions": ["Word-Dokument öffnen, das automatisiert werden soll.", "Variable Bereiche durch Tags in geschweiften Klammern ersetzen. Beispiele:<br>[Vorname] [Nachname] → <code>{name} {surname}</code><br>[Anreisedatum] → <code>{arrival_date}</code><br>[Email] → <code>{email}</code><br>[Gastunternehmen] → <code>{host_company_name}</code>", "Als <strong>.docx</strong> speichern.", "In der App: <em>Dokumente → Vorlage hochladen</em> → Name vergeben → Datei hochladen.", "Vorlage wählen, Teilnehmer auswählen, <strong>Generieren</strong>."], "tip_label": "Wichtige Regeln", "tip_body": "Tags sind case-sensitive: <code>{name}</code>, nicht <code>{Name}</code>. Keine Leerzeichen in den Klammern. Formatierung bleibt erhalten. Vollständige Liste auf der Dokumente-Seite."}, {"n": "09", "label": "ONLINE GEHEN", "title_html": "Veröffentlichen Sie die Site <em>auf Netlify</em>", "why": "Bisher läuft die Site nur auf Ihrem Computer. Um sie zu teilen, stellen Sie sie auf Netlify online – kostenlos, direkt mit Ihrem GitHub-Repository verbunden. Bei jedem Push baut Netlify automatisch neu.", "subsections": [{"title": "A · Änderungen zu GitHub pushen (mit GitHub Desktop)", "items": ["GitHub Desktop öffnen. Liste der geänderten Dateien.", "Unten links eine kurze Nachricht (\"Pessoa Academy Anpassung\") und <strong>Commit to main</strong>.", "Oben <strong>Push origin</strong>. Ihre Änderungen sind in IHREM GitHub-Repo."]}, {"title": "B · Auf Netlify veröffentlichen (mit Ihrem Repo verbunden)", "items": ["netlify.com → <strong>Add new site → Import an existing project</strong>. <strong>GitHub</strong> wählen.", "Berechtigung erlauben, <strong>Ihren Fork</strong> aus Schritt 02 wählen.", "Netlify erkennt Vite. Prüfen: <em>Build command</em> = <code>npm run build</code>, <em>Publish directory</em> = <code>dist</code>.", "<strong>Show advanced → Add environment variable</strong>. <code>VITE_SUPABASE_URL</code> und <code>VITE_SUPABASE_ANON_KEY</code> hinzufügen.", "<strong>Deploy</strong>. 1–3 Minuten warten.", "Netlify gibt eine URL <code>https://&lt;name&gt;.netlify.app</code>. Ihre Site ist live!", "<em>Site settings → Change site name</em> umbenennen. <em>Domain management</em> → eigene Domain anbinden."]}], "prompt_label": "Prompt für den KI-Assistenten", "prompt_body": "„Prüfe das SPA-Routing: brauche ich eine netlify.toml, damit Refresh auf /dashboard kein 404 ergibt?“"}, {"n": "10", "label": "ABSCHLUSSCHECK", "title_html": "Sie sind <em>online</em>, letzte Prüfung", "why": "Bevor Sie die Site echten Nutzern übergeben, prüfen Sie schnell, dass alles von der öffentlichen Netlify-URL aus funktioniert.", "checklist": ["Login auf der Netlify-URL funktioniert.", "Sprachumschalter funktioniert in allen 7 Sprachen.", "Teilnehmer hinzugefügt und nach F5 noch da.", "Word-Dokument mit Teilnehmer generiert: Tags ausgefüllt.", "Calendar zeigt Teilnehmer an den richtigen Daten.", "Refresh auf /dashboard kein 404.", "Logout führt zur Login-Maske zurück."], "tip_label": "Vor dem offiziellen Go-live", "tip_body": "<strong>E-Mail-Bestätigung</strong> in Supabase Auth wieder aktivieren. <strong>DB-Passwort</strong> rotieren. Echte Nutzer einladen. Test-Admin löschen. Backup machen."}], "conclusion_label": "Schluss", "conclusion_title_html": "Eine Plattform, die <em>Ihnen</em> gehört, in 7 Sprachen, ohne Handarbeit", "conclusion_body": "Visual Studio Code öffnet die Dateien. Die KI schreibt den Code. GitHub Desktop synchronisiert. Supabase speichert die Daten. Netlify stellt die Site online. Sie koordinieren alles und treffen die Entscheidungen, die zählen: Name, Farben, Texte, Dokumente. Das ist der Vibe Coding Workflow™.", "tags": ["Vibe Coding", "Pessoa Academy", "Managemob", "VS Code", "Gemini Code Assist", "GitHub Desktop", "Supabase", "Netlify", "Erasmus+", "Bildungsmobilität"], "footer_creator": "© Pessoa Academy", "footer_brand": "Managemob × Vibe Coding Workflow™"}, "pt": {"lang": "pt", "page_title": "Procedimento passo a passo · Crie a sua versão de Managemob", "doc_title": "Crie a sua própria versão do Managemob", "doc_subtitle": "Procedimento passo a passo, em 7 línguas, sem escrever código.", "creator_line": "Um guia da Pessoa Academy · Vibe Coding Workflow™", "tools_line": "Visual Studio Code + assistente de IA gratuito + GitHub Desktop + Supabase + Netlify", "hero_eyebrow": "Vibe Coding Workflow™", "hero_title_html": "Molde o <em>Managemob</em> à sua imagem", "hero_body": "Managemob é uma plataforma para gerir mobilidades formativas (Erasmus+, ESC, intercâmbios). Este guia leva-o passo a passo para criar a SUA versão personalizada: logótipo, cores, textos nas suas línguas, documentos automatizados. Não precisa saber programar: a IA escreve, você decide.", "stats": [["10", "passos"], ["7", "línguas prontas"], ["0", "linhas escritas à mão"], ["~2 h", "tempo médio"]], "principle_label": "Princípio Vibe Coding", "principle_title_html": "Você é o <em>realizador</em>, a IA é o dactilógrafo", "principle_body": "Todo o guia assenta numa só ideia: você descreve em linguagem clara o que quer, o assistente de IA escreve o código no seu editor. Sempre que vir uma secção PROMPT, copie a frase e cole-a no chat do assistente de IA dentro do Visual Studio Code.", "lang_switch_label": "Língua", "steps": [{"n": "01", "label": "ANTES DE COMEÇAR", "title_html": "Prepare a sua <em>caixa de ferramentas</em>", "why": "Só precisa de algumas ferramentas gratuitas. Pense nelas como uma caixa: GitHub guarda o código online, Visual Studio Code é onde edita os ficheiros, o assistente de IA escreve o código por si, GitHub Desktop move os ficheiros entre o seu computador e o GitHub sem terminal.", "actions": ["Crie uma conta gratuita em <strong>github.com</strong>. Será o \"armazém\" online do seu código.", "Descarregue e instale <strong>Visual Studio Code</strong> em code.visualstudio.com. É o programa que abre sempre que trabalhar no site.", "Abra o VS Code, clique no ícone Extensions à esquerda e procure um assistente de IA gratuito. Escolha simples: <strong>Gemini Code Assist</strong> da Google. Também servem <strong>Codeium</strong>, <strong>Continue</strong>, <strong>Cody</strong> da Sourcegraph ou qualquer outro assistente de IA gratuito. Instale e faça login.", "Descarregue e instale <strong>GitHub Desktop</strong> em desktop.github.com. Faça login com a mesma conta GitHub.", "Crie uma conta gratuita em <strong>supabase.com</strong>. Será o \"armazém\" onde a app guarda os dados.", "Crie uma conta gratuita em <strong>netlify.com</strong>. É o serviço que põe o site online.", "Descarregue e instale <strong>Node.js</strong> versão LTS em nodejs.org. Serve para correr o site no seu computador enquanto o testa."], "tip_label": "Bónus", "tip_body": "Todas estas ferramentas são gratuitas. Não é preciso cartão de crédito para começar."}, {"n": "02", "label": "FORK & CLONE", "title_html": "Crie a sua <em>cópia pessoal</em> do projeto", "why": "\"Forkar\" significa fazer uma cópia pessoal do projeto Managemob no GitHub, para o poder modificar sem tocar no original. \"Clonar\" é descarregar essa cópia para o seu computador.", "actions": ["Vá à página GitHub do template Managemob — ex. <a href=\"https://github.com/ETN-International/managemob-app\" target=\"_blank\" rel=\"noopener\">github.com/ETN-International/managemob-app</a>, ou o URL do template que lhe foi fornecido. Clique <strong>Fork</strong> no canto superior direito. Escolha um nome (ex. <em>pessoa-mobility</em>).", "Na página do seu fork, clique no botão verde <strong>&lt;&gt; Code</strong> e escolha <strong>Open with GitHub Desktop</strong>.", "GitHub Desktop pergunta onde guardar. Escolha um caminho (ex. Documentos) e clique <strong>Clone</strong>.", "No canto superior direito do GitHub Desktop, clique <strong>Open in Visual Studio Code</strong>.", "No VS Code abra o <strong>Terminal</strong>: <em>View → Terminal</em> (ou <code>Ctrl+`</code> / <code>Cmd+`</code>). Escreva <code>npm install</code> e Enter. Aguarde — está a descarregar as bibliotecas."], "prompt_label": "Prompt para colar no assistente de IA", "prompt_body": "\"Lê a estrutura da pasta src/ e explica-me num parágrafo o que faz cada pasta de primeiro nível (pages, components, locales, lib, styles, data, types). Não alteres nada por agora.\""}, {"n": "03", "label": "BASE DE DADOS SUPABASE", "title_html": "Prepare o <em>armazém de dados</em>", "why": "Supabase é o armazém online onde a app guarda utilizadores, participantes e mobilidades. Sem Supabase a app não tem onde guardar a informação.", "actions": ["Vá a supabase.com → entre → <strong>New project</strong>. Escolha nome, região Europa, palavra-passe forte. <strong>Guarde a palavra-passe</strong>.", "Aguarde 1–2 minutos até o projeto ficar pronto.", "Sidebar → <strong>Project Settings → API</strong>. Copie <strong>Project URL</strong> e <strong>anon public key</strong> — vai precisar no passo 04.", "Sidebar → <strong>SQL Editor → New query</strong>. No VS Code abra <code>supabase/schema.sql</code>, copie tudo, cole no SQL Editor, clique <strong>Run</strong>.", "Sidebar → <strong>Authentication → Providers</strong> → ative <strong>Email</strong>. Para testes, desative <em>Confirm email</em>.", "Sidebar → <strong>Authentication → Users → Add user</strong>: crie o primeiro administrador.", "<strong>Importante — não salte:</strong> abra o chat do assistente AI no VS Code, copie e cole o prompt abaixo, execute o SQL devolvido no SQL Editor do Supabase. Sem este passo, qualquer pessoa com a anon key pode escrever na sua base de dados."], "prompt_label": "Prompt para colar no assistente de IA", "prompt_body": "\"Gera o SQL para ativar Row Level Security em todas as tabelas públicas do Managemob, permitindo leitura/escrita só a utilizadores autenticados. Saída: um único bloco SQL.\""}, {"n": "04", "label": "CONFIGURAR .env", "title_html": "Ligue o site à <em>sua base de dados</em>", "why": "O ficheiro <code>.env</code> contém as credenciais (URL e chave) que dizem ao site como falar com Supabase.", "actions": ["No VS Code, no Explorer à esquerda, encontre <code>.env.example</code>.", "Botão direito em <code>.env.example</code> → <strong>Copy</strong>. Botão direito na mesma pasta → <strong>Paste</strong>.", "Botão direito no novo ficheiro → <strong>Rename</strong> → mude para <code>.env</code> (com o ponto à frente).", "Abra-o e preencha:<br><code>VITE_SUPABASE_URL=https://&lt;seu-projeto&gt;.supabase.co</code><br><code>VITE_SUPABASE_ANON_KEY=&lt;a sua anon key&gt;</code>", "Guarde (<code>Ctrl+S</code> / <code>Cmd+S</code>).", "Abra <code>.gitignore</code> e verifique que tem a linha <code>.env</code>. Se não, acrescente."]}, {"n": "05", "label": "TESTE NO SEU COMPUTADOR", "title_html": "Corra o site <em>localmente</em>", "why": "Antes de pôr online, convém testar no seu computador. Se algo falhar, vê logo, sem afetar utilizadores reais.", "actions": ["No VS Code abra o terminal. Escreva <code>npm run dev</code> e Enter.", "No terminal, o Vite mostrará uma linha tipo <code>➜ Local: http://localhost:XXXX</code>. Abra esse endereço no browser (normalmente <code>http://localhost:3000</code>; se a porta estiver ocupada, o Vite escolhe outra e mostra-a).", "Entre com o admin do passo 03.", "Crie um participante de teste. F5: se ficar lá, Supabase funciona.", "Teste o seletor de língua no login e na sidebar."], "prompt_label": "Se algo falhar, prompt útil", "prompt_body": "\"Se o npm run dev der erro, lê a mensagem no terminal e propõe-me uma correção mínima. Não alteres nenhum ficheiro sem a minha aprovação.\""}, {"n": "06", "label": "TRADUZA OS TEXTOS", "title_html": "Personalize em <em>7 línguas</em>", "why": "O Managemob já fala 7 línguas. Só precisa de mudar os textos visíveis para a SUA organização, sem mexer nas chaves técnicas.", "actions": ["No VS Code abra <code>src/locales/</code>. Sete ficheiros: <code>it.ts</code>, <code>en.ts</code>, <code>es.ts</code>, <code>fr.ts</code>, <code>de.ts</code>, <code>pt.ts</code>, <code>se.ts</code>.", "Abra um de cada vez. Edite só os <strong>valores</strong> (depois dos dois pontos). <strong>Não toque nas chaves</strong>.", "Exemplo:<br>ANTES: <code>login_title: \"Entrar no Managemob\"</code><br>DEPOIS: <code>login_title: \"Entrar na Pessoa Academy\"</code>"], "prompt_label": "Prompt para colar no assistente de IA", "prompt_body": "\"Abre src/locales/pt.ts. Sem alterar as chaves, reescreve cada string visível com um tom alinhado com a marca 'Pessoa Academy'. Replica as mesmas alterações nos outros seis ficheiros de língua (it, en, es, fr, de, se).\"", "tip_label": "Adicionar uma 8ª língua", "tip_body": "Duplique <code>en.ts</code> como <code>pl.ts</code> (polaco), traduza os valores, registe o locale e adicione a bandeira ao seletor. Peça à IA."}, {"n": "07", "label": "LOGÓTIPO E CORES", "title_html": "Dê-lhe <em>a sua identidade visual</em>", "why": "A aparência é o que os utilizadores vêem. Mudando logótipo e cores o site fica visivelmente \"seu\".", "actions": ["Em <code>public/</code> substitua <code>logo.svg</code> pelo seu. Quadrado, ≥256×256 px.", "Abra <code>src/components/Sidebar.tsx</code> e <code>src/pages/Login.tsx</code>. Substitua o \"M\" placeholder por: <code>&lt;img src=\"/logo.svg\" alt=\"Pessoa Academy\" /&gt;</code>", "Abra <code>src/styles/main.css</code>. No topo do ficheiro, dentro de <code>:root { ... }</code>, encontrará as variáveis de cor: <code>--primary</code> (cor principal, azul por defeito), <code>--accent</code>, <code>--sidebar-bg</code> (fundo da sidebar, teal por defeito) e <code>--teal</code>. Substitua os valores pelos da sua paleta.", "Abra <code>index.html</code> na raiz: altere o texto dentro de <code>&lt;title&gt;...&lt;/title&gt;</code> (ex. de \"Managemob\" para \"Pessoa Academy\") e em <code>&lt;link rel=\"icon\" ... href=\"/vite.svg\" /&gt;</code> substitua <code>/vite.svg</code> pelo caminho do seu logo (ex. <code>/logo.svg</code>)."], "prompt_label": "Prompt para colar no assistente de IA", "prompt_body": "\"Rebrand para 'Pessoa Academy' com primário #XXXXXX e secundário #YYYYYY. Atualiza as variáveis CSS, substitui o M por /logo.svg em Sidebar.tsx e Login.tsx, muda o title em index.html, atualiza login_title e login_footer em cada ficheiro de src/locales/.\""}, {"n": "08", "label": "MODELOS WORD", "title_html": "Automatize os seus <em>documentos</em>", "why": "Managemob pode pegar num documento Word e preenchê-lo automaticamente com os dados de cada participante. Só tem de lhe dizer quais os \"buracos\" a preencher.", "actions": ["Abra o documento Word a automatizar.", "Encontre as zonas onde vão dados. Substitua por tags entre chavetas. Exemplos:<br>[Nome] [Apelido] → <code>{name} {surname}</code><br>[Data início] → <code>{arrival_date}</code><br>[Email] → <code>{email}</code><br>[Empresa] → <code>{host_company_name}</code>", "Guarde como <strong>.docx</strong>.", "Na app: <em>Documentos → Carregar Modelo</em> → dê nome → upload.", "Selecione modelo, escolha participantes, clique <strong>Gerar</strong>."], "tip_label": "Regras importantes", "tip_body": "Tags são case-sensitive: <code>{name}</code>, não <code>{Name}</code>. Sem espaços dentro das chavetas. Formatação preservada. Lista completa na página Documentos."}, {"n": "09", "label": "PÔR ONLINE", "title_html": "Publique o site <em>no Netlify</em>", "why": "Por agora o site só corre no seu computador. Para o partilhar, publica-o no Netlify, gratuito, ligado diretamente ao seu repositório GitHub. Cada vez que faça push para o GitHub, o Netlify reconstrói automaticamente.", "subsections": [{"title": "A · Faça push das alterações para o GitHub (com GitHub Desktop)", "items": ["Abra o GitHub Desktop. Verá a lista dos ficheiros alterados.", "Em baixo à esquerda, escreva uma mensagem curta (\"Personalização Pessoa Academy\") e clique <strong>Commit to main</strong>.", "No topo, clique <strong>Push origin</strong>. As alterações estão no SEU repositório GitHub."]}, {"title": "B · Publicar no Netlify (ligado ao seu repositório)", "items": ["netlify.com → <strong>Add new site → Import an existing project</strong>. Escolha <strong>GitHub</strong>.", "Aceite a autorização e selecione <strong>o seu fork</strong> do passo 02.", "Netlify deteta Vite. Verifique <em>Build command</em> = <code>npm run build</code> e <em>Publish directory</em> = <code>dist</code>.", "<strong>Show advanced → Add environment variable</strong>. Adicione <code>VITE_SUPABASE_URL</code> e <code>VITE_SUPABASE_ANON_KEY</code>.", "Clique <strong>Deploy</strong>. Aguarde 1–3 minutos.", "Netlify dá-lhe um URL <code>https://&lt;nome&gt;.netlify.app</code>. O seu site está online!", "<em>Site settings → Change site name</em> para renomear. <em>Domain management</em> para ligar o seu próprio domínio."]}], "prompt_label": "Prompt para colar no assistente de IA", "prompt_body": "\"Verifica o routing SPA: preciso de um netlify.toml para evitar erros 404 ao recarregar /dashboard?\""}, {"n": "10", "label": "VERIFICAÇÃO FINAL", "title_html": "Está <em>online</em>, última verificação", "why": "Antes de entregar o site a utilizadores reais, verifique rápido que tudo funciona a partir do URL público do Netlify.", "checklist": ["Login pelo URL Netlify funciona.", "O seletor de língua funciona nas 7 línguas.", "Adiciono um participante e após F5 continua lá.", "Gero um Word com um participante: tags preenchidas.", "O Calendar mostra o participante nas datas certas.", "Recarregar /dashboard não dá 404.", "Logout volta ao ecrã de login."], "tip_label": "Antes do go-live oficial", "tip_body": "Reative a <strong>confirmação de email</strong> em Supabase Auth. Rotacione a <strong>palavra-passe DB</strong>. Convide os utilizadores reais. Apague o admin de teste. Faça backup."}], "conclusion_label": "Conclusão", "conclusion_title_html": "Uma plataforma <em>sua</em>, em 7 línguas, sem código à mão", "conclusion_body": "Visual Studio Code abre os ficheiros. A IA escreve o código. GitHub Desktop sincroniza. Supabase guarda os dados. Netlify põe o site online. Você coordena tudo e toma as decisões importantes: nome, cores, textos, documentos. É o Vibe Coding Workflow™.", "tags": ["Vibe Coding", "Pessoa Academy", "Managemob", "VS Code", "Gemini Code Assist", "GitHub Desktop", "Supabase", "Netlify", "Erasmus+", "Mobilidade formativa"], "footer_creator": "© Pessoa Academy", "footer_brand": "Managemob × Vibe Coding Workflow™"}, "sv": {"lang": "sv", "page_title": "Steg-för-steg-guide · Bygg din egen Managemob", "doc_title": "Bygg din egen version av Managemob", "doc_subtitle": "Steg-för-steg-guide, på 7 språk, utan att skriva kod.", "creator_line": "En guide från Pessoa Academy · Vibe Coding Workflow™", "tools_line": "Visual Studio Code + gratis AI-assistent + GitHub Desktop + Supabase + Netlify", "hero_eyebrow": "Vibe Coding Workflow™", "hero_title_html": "Forma <em>Managemob</em> efter dig", "hero_body": "Managemob är en plattform för att hantera utbildningsmobilitet (Erasmus+, ESC, utbyten). Den här guiden tar dig steg för steg till DIN egen anpassade version: logotyp, färger, texter på dina språk, automatiserade dokument. Du behöver inte kunna programmera – AI:n skriver, du bestämmer.", "stats": [["10", "steg"], ["7", "språk klara"], ["0", "rader skrivna för hand"], ["~2 h", "snittid"]], "principle_label": "Vibe Coding-principen", "principle_title_html": "Du är <em>regissören</em>, AI:n är skrivmaskinisten", "principle_body": "Hela guiden vilar på en idé: du beskriver i vanligt språk vad du vill ha, AI-assistenten skriver koden i din editor. När du ser ett PROMPT-avsnitt, kopiera meningen och klistra in den i AI-assistentens chatt i Visual Studio Code.", "lang_switch_label": "Språk", "steps": [{"n": "01", "label": "INNAN DU BÖRJAR", "title_html": "Förbered din <em>verktygslåda</em>", "why": "Du behöver bara några gratisverktyg. Tänk dem som en verktygslåda: GitHub lagrar koden online, Visual Studio Code är där du redigerar filerna, AI-assistenten skriver koden åt dig, GitHub Desktop flyttar filer mellan din dator och GitHub utan terminal.", "actions": ["Skapa ett gratiskonto på <strong>github.com</strong>. Det blir din kods online-\"lager\".", "Ladda ner och installera <strong>Visual Studio Code</strong> från code.visualstudio.com.", "Öppna VS Code, klicka på Extensions-ikonen till vänster och sök efter en gratis AI-assistent. Enkel: <strong>Gemini Code Assist</strong> från Google. Även <strong>Codeium</strong>, <strong>Continue</strong>, <strong>Cody</strong> från Sourcegraph eller någon annan gratis AI-assistent fungerar. Installera och logga in.", "Ladda ner och installera <strong>GitHub Desktop</strong> från desktop.github.com. Logga in med samma GitHub-konto.", "Skapa ett gratiskonto på <strong>supabase.com</strong>. Blir lagret där appen sparar data.", "Skapa ett gratiskonto på <strong>netlify.com</strong>. Tjänsten som lägger ut din sajt online.", "Ladda ner och installera <strong>Node.js</strong> LTS från nodejs.org. Behövs för att köra sajten på din dator under tester."], "tip_label": "Bonus", "tip_body": "Alla dessa verktyg är gratis. Inget kreditkort behövs."}, {"n": "02", "label": "FORK & CLONE", "title_html": "Skapa din <em>personliga kopia</em> av projektet", "why": "\"Forka\" = göra en personlig kopia av Managemob-projektet på GitHub. Du kan ändra utan att röra originalet. \"Klona\" = ladda ner kopian till din dator.", "actions": ["Gå till GitHub-sidan för Managemob-mallen — t.ex. <a href=\"https://github.com/ETN-International/managemob-app\" target=\"_blank\" rel=\"noopener\">github.com/ETN-International/managemob-app</a>, eller den mall-URL du fått. Klicka <strong>Fork</strong> (uppe till höger). Välj namn (t.ex. <em>pessoa-mobility</em>).", "På din fork-sida klicka gröna knappen <strong>&lt;&gt; Code</strong> → <strong>Open with GitHub Desktop</strong>.", "GitHub Desktop frågar var du vill spara. Välj sökväg (t.ex. Dokument) → <strong>Clone</strong>.", "Uppe till höger i GitHub Desktop, klicka <strong>Open in Visual Studio Code</strong>.", "I VS Code öppna <strong>Terminal</strong>: <em>View → Terminal</em> (eller <code>Ctrl+`</code> / <code>Cmd+`</code>). Skriv <code>npm install</code> och Enter. Vänta tills klart – biblioteken laddas ner."], "prompt_label": "Prompt att klistra in i AI-assistenten", "prompt_body": "\"Läs strukturen i mappen src/ och förklara i ett stycke vad varje toppnivåmapp gör (pages, components, locales, lib, styles, data, types). Ändra inget än.\""}, {"n": "03", "label": "SUPABASE-DATABAS", "title_html": "Förbered <em>datalagret</em>", "why": "Supabase är online-lagret där appen sparar användare, deltagare och mobiliteter. Utan Supabase har appen ingenstans att spara informationen.", "actions": ["supabase.com → logga in → <strong>New project</strong>. Välj namn, region Europa, starkt lösenord. <strong>Spara lösenordet</strong> säkert.", "Vänta 1–2 minuter.", "Sidebar → <strong>Project Settings → API</strong>. Kopiera <strong>Project URL</strong> och <strong>anon public key</strong> – behövs i steg 04.", "Sidebar → <strong>SQL Editor → New query</strong>. I VS Code öppna <code>supabase/schema.sql</code>, kopiera allt, klistra in i SQL Editor och klicka <strong>Run</strong>.", "Sidebar → <strong>Authentication → Providers</strong> → aktivera <strong>Email</strong>. För tester, stäng av <em>Confirm email</em>.", "Sidebar → <strong>Authentication → Users → Add user</strong>: skapa första administratören.", "<strong>Viktigt — hoppa inte över:</strong> öppna AI-assistentchatten i VS Code, kopiera och klistra in prompten nedan, kör SQL:en som returneras i Supabase SQL Editor. Utan detta steg kan vem som helst med anon-nyckeln skriva i din databas."], "prompt_label": "Prompt att klistra in i AI-assistenten", "prompt_body": "\"Generera SQL för att aktivera Row Level Security på alla publika Managemob-tabeller, så att bara autentiserade användare kan läsa/skriva. Output: ett enda SQL-block.\""}, {"n": "04", "label": "KONFIGURERA .env", "title_html": "Koppla sajten till <em>din databas</em>", "why": "Filen <code>.env</code> innehåller credentials (URL och nyckel) som talar om för sajten hur den pratar med Supabase.", "actions": ["I VS Code, i Explorer till vänster, hitta <code>.env.example</code>.", "Högerklick på <code>.env.example</code> → <strong>Copy</strong>. Högerklick i samma mapp → <strong>Paste</strong>.", "Högerklick på den nya filen → <strong>Rename</strong> → byt namn till <code>.env</code> (med punkt först).", "Öppna och fyll i:<br><code>VITE_SUPABASE_URL=https://&lt;ditt-projekt&gt;.supabase.co</code><br><code>VITE_SUPABASE_ANON_KEY=&lt;din anon key&gt;</code>", "Spara (<code>Ctrl+S</code> / <code>Cmd+S</code>).", "Öppna <code>.gitignore</code> och kontrollera att raden <code>.env</code> finns. Annars lägg till."]}, {"n": "05", "label": "TESTA PÅ DIN DATOR", "title_html": "Kör sajten <em>lokalt</em>", "why": "Innan du publicerar är det bra att testa lokalt. Om något inte fungerar ser du det direkt utan att påverka riktiga användare.", "actions": ["I VS Code öppna terminalen. Skriv <code>npm run dev</code> och Enter.", "I terminalen visar Vite en rad som <code>➜ Local: http://localhost:XXXX</code>. Öppna den adressen i webbläsaren (vanligen <code>http://localhost:3000</code>; om porten är upptagen väljer Vite en annan och visar den).", "Logga in med admin från steg 03.", "Skapa en testdeltagare. F5: om den finns kvar fungerar Supabase.", "Testa språkväljaren i login och sidebar."], "prompt_label": "Om något fallerar, användbar prompt", "prompt_body": "\"Om npm run dev ger fel, läs meddelandet i terminalen och föreslå en minimal fix. Ändra ingen fil utan mitt godkännande.\""}, {"n": "06", "label": "ÖVERSÄTT TEXTERNA", "title_html": "Anpassa på <em>7 språk</em>", "why": "Managemob talar redan 7 språk. Du behöver bara byta de synliga texterna för DIN organisation, utan att röra de tekniska nycklarna.", "actions": ["I VS Code öppna mappen <code>src/locales/</code>. Sju filer: <code>it.ts</code>, <code>en.ts</code>, <code>es.ts</code>, <code>fr.ts</code>, <code>de.ts</code>, <code>pt.ts</code>, <code>se.ts</code>.", "Öppna en fil i taget. Ändra bara <strong>värdena</strong> (efter kolon). <strong>Rör inte nycklarna</strong>.", "Exempel:<br>FÖRE: <code>login_title: \"Logga in på Managemob\"</code><br>EFTER: <code>login_title: \"Logga in på Pessoa Academy\"</code>"], "prompt_label": "Prompt att klistra in i AI-assistenten", "prompt_body": "\"Öppna src/locales/se.ts. Utan att ändra nycklarna, skriv om varje synlig sträng med en ton som passar varumärket 'Pessoa Academy'. Spegla samma ändringar i de andra sex språkfilerna (it, en, es, fr, de, pt).\"", "tip_label": "Lägga till ett 8:e språk", "tip_body": "Duplicera <code>en.ts</code> som <code>pl.ts</code> (polska), översätt värdena, registrera locale, lägg till flagga i väljaren. Be AI:n göra det."}, {"n": "07", "label": "LOGOTYP OCH FÄRGER", "title_html": "Ge den <em>din visuella identitet</em>", "why": "Utseendet är vad användarna ser. Logotyp och färger gör sajten synligt \"din\".", "actions": ["I <code>public/</code> ersätt <code>logo.svg</code> med din. Kvadratisk, minst 256×256 px.", "Öppna <code>src/components/Sidebar.tsx</code> och <code>src/pages/Login.tsx</code>. Ersätt placeholder-\"M\" med: <code>&lt;img src=\"/logo.svg\" alt=\"Pessoa Academy\" /&gt;</code>", "Öppna <code>src/styles/main.css</code>. Högst upp i filen, inuti <code>:root { ... }</code>, hittar du färgvariablerna: <code>--primary</code> (huvudfärg, blå som standard), <code>--accent</code>, <code>--sidebar-bg</code> (sidopanel-bakgrund, teal som standard) och <code>--teal</code>. Ersätt värdena med din palett.", "Öppna <code>index.html</code> i projektroten: ändra texten i <code>&lt;title&gt;...&lt;/title&gt;</code> (t.ex. från \"Managemob\" till \"Pessoa Academy\") och i <code>&lt;link rel=\"icon\" ... href=\"/vite.svg\" /&gt;</code> ersätt <code>/vite.svg</code> med sökvägen till din logga (t.ex. <code>/logo.svg</code>)."], "prompt_label": "Prompt att klistra in i AI-assistenten", "prompt_body": "\"Rebrand för 'Pessoa Academy' med primär #XXXXXX och sekundär #YYYYYY. Uppdatera CSS-variablerna, ersätt M med /logo.svg i Sidebar.tsx och Login.tsx, ändra title i index.html, uppdatera login_title och login_footer i varje fil i src/locales/.\""}, {"n": "08", "label": "WORD-MALLAR", "title_html": "Automatisera dina <em>dokument</em>", "why": "Managemob kan ta ett Word-dokument och fylla det automatiskt med varje deltagares data. Du behöver bara säga vilka \"hål\" som ska fyllas.", "actions": ["Öppna Word-dokumentet som ska automatiseras.", "Hitta zonerna där data ska in. Ersätt med taggar i klammerparenteser. Exempel:<br>[Förnamn] [Efternamn] → <code>{name} {surname}</code><br>[Startdatum] → <code>{arrival_date}</code><br>[Email] → <code>{email}</code><br>[Företag] → <code>{host_company_name}</code>", "Spara som <strong>.docx</strong>.", "I appen: <em>Dokument → Ladda upp mall</em> → ge namn → ladda upp.", "Välj mall, välj deltagare, klicka <strong>Generera</strong>."], "tip_label": "Viktiga regler", "tip_body": "Taggar är skiftlägeskänsliga: <code>{name}</code>, inte <code>{Name}</code>. Inga mellanslag inom klammerparenteserna. Formatering bevaras. Full lista finns på Dokument-sidan."}, {"n": "09", "label": "GÅ LIVE", "title_html": "Publicera sajten <em>på Netlify</em>", "why": "Just nu körs sajten bara på din dator. För att dela med världen publicerar du på Netlify – gratis, direktkopplat till ditt GitHub-repo. Varje gång du pushar till GitHub bygger Netlify om automatiskt.", "subsections": [{"title": "A · Pusha ändringar till GitHub (med GitHub Desktop)", "items": ["Öppna GitHub Desktop. Lista över ändrade filer.", "Nere till vänster, kort meddelande (\"Pessoa Academy-anpassning\") och <strong>Commit to main</strong>.", "Uppe, klicka <strong>Push origin</strong>. Dina ändringar ligger nu på DITT GitHub-repo."]}, {"title": "B · Publicera på Netlify (kopplat till ditt repo)", "items": ["netlify.com → <strong>Add new site → Import an existing project</strong>. Välj <strong>GitHub</strong>.", "Acceptera tillstånd, välj <strong>din fork</strong> från steg 02.", "Netlify upptäcker Vite. Verifiera <em>Build command</em> = <code>npm run build</code> och <em>Publish directory</em> = <code>dist</code>.", "<strong>Show advanced → Add environment variable</strong>. Lägg till <code>VITE_SUPABASE_URL</code> och <code>VITE_SUPABASE_ANON_KEY</code>.", "Klicka <strong>Deploy</strong>. Vänta 1–3 minuter.", "Netlify ger en URL <code>https://&lt;namn&gt;.netlify.app</code>. Din sajt är live!", "<em>Site settings → Change site name</em> för att byta namn. <em>Domain management</em> för egen domän."]}], "prompt_label": "Prompt att klistra in i AI-assistenten", "prompt_body": "\"Kontrollera SPA-routningen: behöver jag en netlify.toml för att slippa 404 vid omladdning av /dashboard?\""}, {"n": "10", "label": "SLUTKONTROLL", "title_html": "Du är <em>online</em>, sista verifikationen", "why": "Innan du lämnar sajten till riktiga användare, kontrollera snabbt att allt fungerar från den publika Netlify-URL:en.", "checklist": ["Login på Netlify-URL:en fungerar.", "Språkväljaren fungerar för alla 7 språk.", "Lägger till en deltagare och efter F5 finns den kvar.", "Genererar Word med deltagare: taggar fyllda.", "Calendar visar deltagaren på rätt datum.", "Omladdning av /dashboard ger inte 404.", "Logout återgår till login-skärmen."], "tip_label": "Innan officiell go-live", "tip_body": "Aktivera <strong>email-bekräftelse</strong> i Supabase Auth igen. Rotera <strong>DB-lösenordet</strong>. Bjud in riktiga användare. Radera test-admin. Ta backup."}], "conclusion_label": "Avslutning", "conclusion_title_html": "En plattform <em>som är din</em>, på 7 språk, utan handskriven kod", "conclusion_body": "Visual Studio Code öppnar filerna. AI:n skriver koden. GitHub Desktop synkar. Supabase lagrar datan. Netlify lägger sajten online. Du koordinerar allt och tar besluten som spelar roll: namn, färger, texter, dokument. Det är Vibe Coding Workflow™.", "tags": ["Vibe Coding", "Pessoa Academy", "Managemob", "VS Code", "Gemini Code Assist", "GitHub Desktop", "Supabase", "Netlify", "Erasmus+", "Utbildningsmobilitet"], "footer_creator": "© Pessoa Academy", "footer_brand": "Managemob × Vibe Coding Workflow™"}};
  const ORDER = ["it", "en", "es", "fr", "de", "pt", "sv"];
  const NAMES = {"it": "Italiano", "en": "English", "es": "Español", "fr": "Français", "de": "Deutsch", "pt": "Português", "sv": "Svenska"};

  function $(sel) { return document.querySelector(sel); }
  function $all(sel) { return Array.from(document.querySelectorAll(sel)); }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // Render an inline action that may contain trusted HTML (the content
  // dictionaries supply pre-marked-up strings with <strong>, <code>, <em>,
  // <br>). We pass them through unchanged.
  function actionHtml(s) { return s; }

  function renderStep(step, loc) {
    const subsections = (step.subsections || []).map(sub => {
      const items = sub.items.map(it => `<li>${actionHtml(it)}</li>`).join('');
      return `
        <div class="subsec">
          <div class="subsec-title">${escapeHtml(sub.title)}</div>
          <ol class="actions">${items}</ol>
        </div>`;
    }).join('');

    const actions = (step.actions || []).map(a => `<li>${actionHtml(a)}</li>`).join('');
    const actionsBlock = step.actions
      ? `<div class="actions-label">${escapeHtml(loc.actions)}</div>
         <ol class="actions">${actions}</ol>`
      : '';

    const promptBlock = step.prompt_body
      ? `<div class="prompt-box" data-label="${escapeHtml(step.prompt_label || loc.prompt)}">
           <div class="prompt-text">${actionHtml(step.prompt_body)}</div>
         </div>`
      : '';

    const tipBlock = step.tip_body
      ? `<div class="tip-box">
           <span class="tip-label">${escapeHtml(step.tip_label || loc.tip)}</span>
           ${actionHtml(step.tip_body)}
         </div>`
      : '';

    const checklistBlock = step.checklist
      ? `<div class="checklist-box">
           <div class="checklist-label">${escapeHtml(loc.checklist)}</div>
           <ul class="checklist-list">
             ${step.checklist.map(c => `<li>${actionHtml(c)}</li>`).join('')}
           </ul>
         </div>`
      : '';

    return `
      <section class="step" id="step-${step.n}">
        <div class="step-head">
          <div class="step-num">${escapeHtml(step.n)}</div>
          <div class="step-meta">
            <div class="step-label">${escapeHtml(step.label)}</div>
            <h2 class="step-title">${actionHtml(step.title_html)}</h2>
          </div>
        </div>
        <div class="step-body">
          <div class="why-block">
            <div class="why-label">${escapeHtml(loc.why)}</div>
            <div class="why-text">${actionHtml(step.why)}</div>
          </div>
          ${actionsBlock}
          ${subsections}
          ${promptBlock}
          ${tipBlock}
          ${checklistBlock}
        </div>
      </section>`;
  }

  function renderNav(content) {
    const items = content.steps.map(s => `
      <li class="nav-item" data-target="step-${s.n}">
        <span class="nav-num">${escapeHtml(s.n)}</span>
        <span class="nav-text">${escapeHtml(s.label)}</span>
      </li>
    `).join('');
    return `
      <div class="sidebar-eyebrow">${escapeHtml(content.lang_switch_label || 'Index')}</div>
      <ul class="nav-list">${items}</ul>
      <div class="sidebar-foot">
        ${escapeHtml(content.footer_creator)}<br>
        ${escapeHtml(content.footer_brand)}
      </div>
    `;
  }

  function applyLang(lang) {
    const c = DATA[lang];
    if (!c) return;
    document.documentElement.lang = lang;
    document.title = c.page_title;

    // Header brand stays static; just switch lang pill state
    $all('.lang-pill').forEach(p => p.classList.toggle('active', p.dataset.lang === lang));

    // Sidebar
    $('#sidebar-inner').innerHTML = renderNav(c);

    // Hero
    $('#hero-eyebrow').textContent = c.hero_eyebrow;
    $('#hero-title').innerHTML = c.hero_title_html;
    $('#hero-body').textContent = c.hero_body;
    $('#creator-line').textContent = c.creator_line;
    $('#tools-line').textContent = c.tools_line;

    // Stats
    $('#stats').innerHTML = c.stats.map(([num, label]) => `
      <div>
        <div class="stat-num">${escapeHtml(num)}</div>
        <div class="stat-label">${escapeHtml(label)}</div>
      </div>
    `).join('');

    // Principle
    $('#principle-label').textContent = c.principle_label;
    $('#principle-title').innerHTML = c.principle_title_html;
    $('#principle-body').textContent = c.principle_body;

    // Steps
    const localized = {
      why: ({it:'Perché lo fai',en:'Why',es:'Por qué',fr:'Pourquoi',de:'Warum',pt:'Porquê',sv:'Varför'})[lang],
      actions: ({it:'Cosa fai',en:'What you do',es:'Qué haces',fr:'Ce que tu fais',de:'Was du tust',pt:'O que fazer',sv:'Vad du gör'})[lang],
      prompt: ({it:'Prompt da incollare',en:'Prompt to paste',es:'Prompt para pegar',fr:'Prompt à coller',de:'Prompt zum Einfügen',pt:'Prompt para colar',sv:'Prompt att klistra in'})[lang],
      tip: ({it:'Suggerimento',en:'Tip',es:'Consejo',fr:'Astuce',de:'Tipp',pt:'Dica',sv:'Tips'})[lang],
      checklist: ({it:'Checklist finale',en:'Final checklist',es:'Lista final',fr:'Checklist finale',de:'Abschlussliste',pt:'Checklist final',sv:'Slutlig checklista'})[lang],
    };

    $('#steps').innerHTML = c.steps.map(s => renderStep(s, localized)).join('');

    // Conclusion
    $('#conclusion-label').textContent = c.conclusion_label;
    $('#conclusion-title').innerHTML = c.conclusion_title_html;
    $('#conclusion-body').textContent = c.conclusion_body;

    // Tags
    $('#tags').innerHTML = c.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');

    // Footer
    $('#footer-creator').textContent = c.footer_creator;
    $('#footer-brand').textContent = c.footer_brand;

    // Wire nav clicks
    $all('.nav-item').forEach(it => {
      it.addEventListener('click', () => {
        const target = document.getElementById(it.dataset.target);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // Wire checklist toggle
    $all('.checklist-list li').forEach(li => {
      li.addEventListener('click', () => li.classList.toggle('checked'));
    });

    // Persist language
    try { localStorage.setItem('mm_lang', lang); } catch (e) {}
    // Update URL hash for share
    if (location.hash !== '#' + lang) history.replaceState(null, '', '#' + lang);

    // Reset scroll-spy active item to first
    setActiveNav('step-01');
  }

  function setActiveNav(targetId) {
    $all('.nav-item').forEach(n =>
      n.classList.toggle('active', n.dataset.target === targetId)
    );
  }

  // Scroll spy
  function initScrollSpy() {
    const observer = new IntersectionObserver((entries) => {
      let topMost = null;
      entries.forEach(en => {
        if (en.isIntersecting) {
          if (!topMost || en.boundingClientRect.top < topMost.boundingClientRect.top) {
            topMost = en;
          }
        }
      });
      if (topMost) setActiveNav(topMost.target.id);
    }, { rootMargin: '-100px 0px -60% 0px' });

    $all('.step').forEach(s => observer.observe(s));
  }

  function init() {
    // Build language pill bar
    const ls = $('#lang-switch');
    ls.innerHTML = ORDER.map(l => `<button class="lang-pill" data-lang="${l}">${l.toUpperCase()}</button>`).join('');
    ls.addEventListener('click', (e) => {
      const btn = e.target.closest('.lang-pill');
      if (!btn) return;
      applyLang(btn.dataset.lang);
      // Re-init scroll spy since DOM was rebuilt
      initScrollSpy();
    });

    // Determine starting lang: hash > localStorage > navigator > 'it'
    let lang = (location.hash || '').replace('#', '');
    if (!DATA[lang]) {
      try { lang = localStorage.getItem('mm_lang') || ''; } catch (e) { lang = ''; }
    }
    if (!DATA[lang]) {
      const navLang = (navigator.language || 'it').slice(0, 2);
      lang = DATA[navLang] ? navLang : 'it';
    }
    applyLang(lang);
    initScrollSpy();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
